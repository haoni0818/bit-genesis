  apply_a1:{id:'A1',rank:3,prompt:'Compare 1 GiB with 1 GB after expressing both in bytes.',fields:[{key:'larger',label:'LARGER QUANTITY',options:[['GIB','1 GiB'],['GB','1 GB'],['EQUAL','EQUAL']]},{key:'differenceBytes',label:'DIFFERENCE',options:[[73741824,'73,741,824 B'],[24,'24 B'],[1073741824,'1,073,741,824 B']]}],expected:{larger:'GIB',differenceBytes:73741824},success:'1 GiB is larger than 1 GB by exactly 73,741,824 B.'},

  checkpoint_p3:{id:'P3',rank:3,prompt:'Which is larger, 1 GiB or 1 GB, and by how many bytes?',fields:[{key:'larger',label:'LARGER QUANTITY',options:[['GIB','1 GiB'],['GB','1 GB'],['EQUAL','EQUAL']]},{key:'differenceBytes',label:'DIFFERENCE',options:[[73741824,'73,741,824 B'],[24,'24 B'],[741824,'741,824 B']]}],expected:{larger:'GIB',differenceBytes:73741824}},
  checkpoint_p4:{id:'P4',rank:4,prompt:'How should 2 × 2^40 B be written as a byte label?',fields:[{key:'label',label:'BYTE LABEL',options:[['2 TiB','2 TiB'],['2 TB','2 TB'],['2 GiB','2 GiB']]},{key:'family',label:'PREFIX FAMILY',options:[['BINARY','BINARY'],['DECIMAL','DECIMAL']]}],expected:{label:'2 TiB',family:'BINARY'}}

  RANK:'RANK MISMATCH · each step raises the binary exponent by 10 or the decimal exponent by 3.',
  MAGNITUDE:'MAGNITUDE MISMATCH · convert this prefix to its power before choosing the byte count.',
  SYMBOL:'LABEL MISMATCH · KiB represents kibi bytes here; kB represents kilo bytes.',
  AMBIGUOUS:'AMBIGUOUS LABEL · KB is not a third magnitude. Use the stated prefix name.',
  COMPARE:'COMPARE IN ONE UNIT · express both quantities in bytes, then compare.',
  DIFFERENCE:'DIFFERENCE MISMATCH · subtract the smaller byte count from the larger byte count.',
  INCOMPLETE:'CALIBRATION INCOMPLETE · finish every required field before submitting.'
};
const NEXT_STAGE={guided_g1:'guided_g2',guided_g2:'apply_a1',apply_a1:'apply_a2',apply_a2:'checkpoint_p1',checkpoint_p1:'checkpoint_p2',checkpoint_p2:'checkpoint_p3',checkpoint_p3:'checkpoint_p4'};
function defaultState(){return{version:1,stage:'course_card',teachStep:0,taskSelections:{},guidedPassed:{G1:false,G2:false},applyPassed:{A1:false,A2:false},checkpointAnswers:{},checkpointAttempts:0,errorsByTaskAndType:{},hintLevelByTaskAndType:{},guideSeen:[],startedAt:Date.now(),accumulatedGuideMs:0,completedLocally:false,evidenceRecorded:false,fails:0,hints:0,recorded:false,usedSafetyNet:false,activeField:0,lastError:null}}
let S=defaultState(),validatedSubmission=null,validatedRuntime=null,guideOpenedAt=0,overlayKind='',overlayReturn='',previousFocus=null,toastTimer=0;
const qs=new URLSearchParams(location.search);
function isNormalEvidenceRoute(search){const q=new URLSearchParams(search),entries=[...q.entries()];return entries.length===0||(entries.length===1&&entries[0][0]==='from'&&entries[0][1]==='course-map')}
const NORMAL_ROUTE=isNormalEvidenceRoute(location.search);
function sameValue(a,b){return typeof a===typeof b&&a===b}
function sameObject(a,b){const ak=Object.keys(a).sort(),bk=Object.keys(b).sort();return JSON.stringify(ak)===JSON.stringify(bk)&&ak.every(k=>sameValue(a[k],b[k]))}
function judgePrefixCheckpoint(submission){if(!submission||submission.answerSetVersion!==1)return{passed:false,checks:[]};const tasks=Array.isArray(submission.tasks)?submission.tasks:[];if(tasks.length!==EXPECTED_PREFIX_CHECKPOINT.length)return{passed:false,checks:[]};const checks=EXPECTED_PREFIX_CHECKPOINT.map((expected,index)=>{const actual=tasks[index];if(!actual||actual.id!==expected.id)return false;const expectedKeys=Object.keys(expected).sort(),actualKeys=Object.keys(actual).sort();if(JSON.stringify(actualKeys)!==JSON.stringify(expectedKeys))return false;return Object.keys(expected).every(key=>sameValue(actual[key],expected[key]))});return{passed:checks.length===4&&checks.every(Boolean),checks}}
function newCourseMap(now){return{version:1,syllabus:'CAIE 9618 2026',chapters:{},repairs:{prefixes:false,hexAndApplications:false,signedArithmeticAndOverflow:false,extendedAscii:false,graphicsTerminology:false},repairEvidence:{},guide:{courseCardSeen:{},accumulatedGuideMs:{}},updatedAt:now}}
function parseCourseMapRaw(raw,now){if(raw===null)return newCourseMap(now);let value;try{value=JSON.parse(raw)}catch(e){return null}return value&&typeof value==='object'&&value.version===1?value:null}
function commitPrefixEvidence(submission,runtime,storage,now=Date.now()){const judged=judgePrefixCheckpoint(submission);if(!runtime||runtime.phase!=='CHECKPOINT'||runtime.stage!=='checkpoint_p4')return false;if(runtime.inputSource!=='PLAYER_CALIBRATE'||!isNormalEvidenceRoute(runtime.search||''))return false;if(!judged.passed||judged.checks.length!==4)return false;let firstRaw;try{firstRaw=storage.getItem(COURSE_KEY)}catch(e){return false}if(!parseCourseMapRaw(firstRaw,now))return false;let latestRaw;try{latestRaw=storage.getItem(COURSE_KEY)}catch(e){return false}const previous=parseCourseMapRaw(latestRaw,now);if(!previous)return false;const oldEvidence=previous.repairEvidence&&previous.repairEvidence.prefixes;const next=Object.assign({},previous,{repairs:Object.assign({},previous.repairs||{},{prefixes:true}),repairEvidence:Object.assign({},previous.repairEvidence||{},{prefixes:{checkpointId:'prefix_magnitudes_v1',answerSetVersion:1,passed:true,scaffolded:Boolean(oldEvidence&&oldEvidence.scaffolded)||Boolean(runtime.usedSafetyNet),attempts:Math.max(1,Number(oldEvidence&&oldEvidence.attempts)||0,Number(runtime.attempts)||0),passedAt:(oldEvidence&&oldEvidence.passedAt)||now,lastPassedAt:now,facts:{prefixFamilies:true,magnitudes:true,comparisonInBytes:true}}}),updatedAt:now});try{storage.setItem(COURSE_KEY,JSON.stringify(next));const verify=JSON.parse(storage.getItem(COURSE_KEY));return verify.version===1&&verify.repairs&&verify.repairs.prefixes===true&&verify.repairEvidence&&verify.repairEvidence.prefixes&&verify.repairEvidence.prefixes.passed===true}catch(e){return false}}
function hasMapEvidence(){try{const m=JSON.parse(localStorage.getItem(COURSE_KEY)||'null');return Boolean(m&&m.version===1&&m.repairs&&m.repairs.prefixes===true&&m.repairEvidence&&m.repairEvidence.prefixes&&m.repairEvidence.prefixes.passed===true)}catch(e){return false}}
function cleanSelections(raw){const out={};for(const [stage,task] of Object.entries(TASKS)){const source=raw&&raw[stage];if(!source||typeof source!=='object')continue;out[stage]={};for(const f of task.fields){const v=source[f.key];if(f.options.some(o=>sameValue(o[0],v)))out[stage][f.key]=v}}return out}
function load(){if(!NORMAL_ROUTE)return;try{const x=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');if(!x||x.version!==1||!STAGES.includes(x.stage))return;S=Object.assign(defaultState(),x);S.taskSelections=cleanSelections(x.taskSelections);S.guidedPassed={G1:Boolean(x.guidedPassed&&x.guidedPassed.G1),G2:Boolean(x.guidedPassed&&x.guidedPassed.G2)};S.applyPassed={A1:Boolean(x.applyPassed&&x.applyPassed.A1),A2:Boolean(x.applyPassed&&x.applyPassed.A2)};S.checkpointAnswers={};for(const expected of EXPECTED_PREFIX_CHECKPOINT){const a=x.checkpointAnswers&&x.checkpointAnswers[expected.id];if(a&&a.id===expected.id)S.checkpointAnswers[expected.id]=a}S.checkpointAttempts=Math.max(0,Number(x.checkpointAttempts)||0);S.errorsByTaskAndType=Object.assign({},x.errorsByTaskAndType||{});S.hintLevelByTaskAndType=Object.assign({},x.hintLevelByTaskAndType||{});S.activeField=Math.max(0,Number(x.activeField)||0);S.startedAt=Number.isFinite(x.startedAt)?x.startedAt:Date.now();S.accumulatedGuideMs=Math.max(0,Number(x.accumulatedGuideMs)||0);const checkpointRestore=S.stage.startsWith('checkpoint_')||['commit_evidence','evidence_retry','evidence'].includes(S.stage);if(checkpointRestore&&!hasMapEvidence()){S.stage='checkpoint_p1';S.checkpointAnswers={};S.completedLocally=false;S.evidenceRecorded=false}}catch(e){S=defaultState()}}

function activeSeconds(){const guideOpen=guideOpenedAt?Date.now()-guideOpenedAt:0;return Math.max(1,Math.round((Date.now()-S.startedAt-S.accumulatedGuideMs-guideOpen)/1000))}
function addRecord(){if(!NORMAL_ROUTE||S.recorded)return;const a=records();a.push({sec:activeSeconds(),fails:S.fails,hints:S.hints,attempts:S.checkpointAttempts,scaffolded:S.usedSafetyNet,ts:Date.now()});a.sort((x,y)=>x.sec-y.sec||x.fails-y.fails||x.hints-y.hints||x.attempts-y.attempts);try{localStorage.setItem(RECORDS_KEY,JSON.stringify(a.slice(0,5)));S.recorded=true;save()}catch(e){}}
function phaseFor(stage){if(stage==='course_card')return'COURSE CARD';if(stage==='teach')return'TEACH';if(stage.startsWith('guided_'))return'GUIDED PRACTICE';if(stage.startsWith('apply_'))return'APPLY';if(stage.startsWith('checkpoint_')||stage==='commit_evidence')return'CHECKPOINT';return'EVIDENCE'}

function stageContract(){if(S.stage==='teach')return'TEACHING MODEL · 61/64 is a fixed archive fixture, not a byte-prefix conversion.';if(S.stage.startsWith('checkpoint_'))return'FIXED CHECKPOINT · '+S.stage.slice(-2).toUpperCase()+' · EXACT FIELDS REQUIRED';return'DECIMAL ×1000 EACH TIER · BINARY ×1024 EACH TIER'}

function prepareDebug(stage){S=defaultState();S.stage=stage;if(stage==='teach')S.teachStep=3;if(['guided_g2','apply_a1','apply_a2','checkpoint_p1','checkpoint_p2','checkpoint_p3','checkpoint_p4','evidence','evidence_retry'].includes(stage))S.guidedPassed={G1:true,G2:true};if(['checkpoint_p1','checkpoint_p2','checkpoint_p3','checkpoint_p4','evidence','evidence_retry'].includes(stage))S.applyPassed={A1:true,A2:true};const index=['checkpoint_p1','checkpoint_p2','checkpoint_p3','checkpoint_p4'].indexOf(stage);for(let i=0;i<index;i++)S.checkpointAnswers[EXPECTED_PREFIX_CHECKPOINT[i].id]=Object.assign({},EXPECTED_PREFIX_CHECKPOINT[i]);if(stage==='evidence'||stage==='evidence_retry'){S.completedLocally=true;for(const x of EXPECTED_PREFIX_CHECKPOINT)S.checkpointAnswers[x.id]=Object.assign({},x)}}

function runTests(){const assert=(v,m)=>console.assert(v,m);assert(2**10===1024&&10**3===1000,'M1 tier1');assert(2**20===1048576&&10**6===1000000,'M2 tier2');assert(2**30===1073741824&&10**9===1000000000,'M3 tier3');assert(2**40===1099511627776&&10**12===1000000000000,'M4 tier4');assert(TIERS.every(t=>t.binary.bytes>t.decimal.bytes),'M5 binary same-tier larger');assert(1073741824-1000000000===73741824,'M6 difference');const exact={answerSetVersion:1,tasks:EXPECTED_PREFIX_CHECKPOINT.map(x=>Object.assign({},x))};assert(judgePrefixCheckpoint(exact).passed&&judgePrefixCheckpoint(exact).checks.length===4,'C1 exact 4/4');const wrong=JSON.parse(JSON.stringify(exact));wrong.tasks[0].bytes=1000;wrong.passed=true;assert(!judgePrefixCheckpoint(wrong).passed,'C2/C4 wrong raw field rejects caller flag');assert(!judgePrefixCheckpoint({answerSetVersion:1,tasks:exact.tasks.slice(0,3)}).passed,'C3 missing');const swapped={answerSetVersion:1,tasks:exact.tasks.slice()};[swapped.tasks[0],swapped.tasks[1]]=[swapped.tasks[1],swapped.tasks[0]];assert(!judgePrefixCheckpoint(swapped).passed,'C3 order');const str=JSON.parse(JSON.stringify(exact));str.tasks[0].bytes='1024';assert(!judgePrefixCheckpoint(str).passed,'C5 strict types');const runtime={phase:'CHECKPOINT',stage:'checkpoint_p4',inputSource:'PLAYER_CALIBRATE',search:'',usedSafetyNet:false,attempts:1},store1=memoryStorage();assert(commitPrefixEvidence(exact,runtime,store1,100)&&JSON.parse(store1.getItem(COURSE_KEY)).repairs.prefixes===true,'E1 normal write');const store2=memoryStorage();assert(!commitPrefixEvidence(exact,Object.assign({},runtime,{search:'?test'}),store2,100)&&store2.getItem(COURSE_KEY)===null,'E2 test no write');const store3=memoryStorage();assert(!commitPrefixEvidence(exact,Object.assign({},runtime,{stage:'end'}),store3,100),'E3 stage guard');const malformed=memoryStorage({[COURSE_KEY]:'{bad'});assert(!commitPrefixEvidence(exact,runtime,malformed,100)&&malformed.getItem(COURSE_KEY)==='{bad','E4 malformed preserved');const seed={version:1,chapters:{ch4:{checkpoint:{passed:true}}},repairs:{hexAndApplications:true},repairEvidence:{other:{passed:true}},guide:{x:1},unknown:{keep:true}};const store5=memoryStorage({[COURSE_KEY]:JSON.stringify(seed)});assert(commitPrefixEvidence(exact,runtime,store5,100)&&JSON.parse(store5.getItem(COURSE_KEY)).chapters.ch4.checkpoint.passed&&JSON.parse(store5.getItem(COURSE_KEY)).unknown.keep,'E5 merge preserve');const store6=memoryStorage({},true);assert(!commitPrefixEvidence(exact,runtime,store6,100),'E6 set failure');const store7=memoryStorage();assert(commitPrefixEvidence(exact,Object.assign({},runtime,{usedSafetyNet:true}),store7,100)&&JSON.parse(store7.getItem(COURSE_KEY)).repairEvidence.prefixes.scaffolded,'E7 scaffold');const preserved=memoryStorage({[COURSE_KEY]:store1.getItem(COURSE_KEY)});assert(!commitPrefixEvidence(wrong,runtime,preserved,200)&&JSON.parse(preserved.getItem(COURSE_KEY)).repairs.prefixes===true,'E8 failure cannot regress');assert(isNormalEvidenceRoute('')&&isNormalEvidenceRoute('?from=course-map')&&!isNormalEvidenceRoute('?stage=end')&&!isNormalEvidenceRoute('?from=course-map&test'),'ROUTE strict');console.info('[REPAIR1 TEST] prefix magnitude and evidence assertions completed')}
