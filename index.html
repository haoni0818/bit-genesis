<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>BIT://GENESIS</title>
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;height:100%;
    font-family:"Cascadia Mono","Consolas","Courier New",monospace;}
  #cv{display:block;position:fixed;inset:0;}

  /* 内心独白（底部） */
  #narr{position:fixed;left:50%;bottom:9%;transform:translateX(-50%);
    max-width:640px;width:86%;text-align:center;color:#9db8a0;font-style:italic;
    font-size:17px;line-height:1.9;text-shadow:0 0 12px rgba(80,255,120,.15);
    display:none;cursor:pointer;user-select:none;}
  #narr .cont{color:#476b4d;font-size:12px;margin-top:10px;font-style:normal;
    animation:blink 1.2s infinite;}
  @keyframes blink{50%{opacity:.15}}

  /* 谜题面板 */
  #overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,.55);}
  .panel{background:#050a06;border:1px solid #1d4d28;border-radius:6px;
    padding:26px 34px;color:#b8e6c0;max-width:620px;width:90%;
    box-shadow:0 0 40px rgba(40,220,90,.12), inset 0 0 60px rgba(20,120,50,.05);}
  .panel h2{margin:0 0 6px;font-size:15px;font-weight:normal;color:#5ad477;
    letter-spacing:3px;}
  .panel .desc{font-size:13px;color:#7fa886;line-height:1.8;margin-bottom:18px;}
  .panel .esc{float:right;color:#3a5c40;font-size:11px;}

  .bitrow{display:flex;gap:10px;justify-content:center;margin:14px 0;flex-wrap:wrap;}
  .bitcol{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .bit{width:46px;height:56px;border:1px solid #1d4d28;border-radius:4px;
    background:#060d08;color:#2a4a30;font-size:26px;cursor:pointer;
    font-family:inherit;}   /* 不做过渡：数字与亮灯必须同一帧 */
  .bit.sm{width:34px;height:40px;font-size:18px;}
  @keyframes askpulse{50%{border-color:#5ad477;}}
  .askrow .bit{animation:askpulse 1.1s infinite;}
  #seqtbl{scrollbar-width:none;}              /* 滚动条太丑，藏掉 */
  #seqtbl::-webkit-scrollbar{display:none;}
  /* 只在内容真溢出时开启，且只淡顶部——滚出区域的旧行渐隐；底部正要填的行永远完整 */
  #seqtbl.fadetop{
    -webkit-mask-image:linear-gradient(to bottom,transparent 0,#000 48px);
    mask-image:linear-gradient(to bottom,transparent 0,#000 48px);}
  .bit.on{background:#0d2d14;color:#7dffa0;border-color:#3fae5c;
    box-shadow:0 0 14px rgba(80,255,130,.35);}
  .bit.locked{opacity:.55;cursor:default;}
  .bit.bad{border-color:#8a3a32;color:#d96a5c;}
  .panel.bare{background:none;border:none;box-shadow:none;padding:10px;}
  .seqcap{text-align:center;color:#4a7050;font-size:13px;margin-top:18px;
    font-style:italic;min-height:18px;}
  .wlabel{font-size:12px;color:#4a7050;height:16px;}
  .wdots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:46px;min-height:16px;}
  .wdots i{width:5px;height:5px;background:#2a4a30;border-radius:1px;}
  .bitcol.on .wdots i{background:#7dffa0;box-shadow:0 0 4px rgba(80,255,130,.6);}

  .tally{display:flex;gap:26px;justify-content:center;align-items:center;
    margin:16px 0 4px;font-size:14px;}
  .tally .lab{color:#4a7050;font-size:12px;}
  .dotbar{display:flex;gap:3px;flex-wrap:wrap;max-width:300px;}
  .dotbar i{width:8px;height:8px;border-radius:2px;background:#123018;}
  .dotbar i.lit{background:#ffd97d;box-shadow:0 0 5px rgba(255,210,120,.5);}
  .dotbar.cur i.lit{background:#7dffa0;box-shadow:0 0 5px rgba(80,255,130,.5);}
  .numval{font-size:22px;color:#7dffa0;}
  .numval.bad{color:#ff6a5c;}
  .target{font-size:22px;color:#ffd97d;}

  .ghost{font-size:34px;color:#33463a;letter-spacing:2px;}
  .bcdcols{display:flex;gap:18px;justify-content:center;align-items:flex-start;}
  .bcdsep{font-size:30px;color:#3fae5c;margin-top:60px;animation:blink 2s infinite;}
  .digit{font-size:24px;height:30px;color:#7dffa0;}
  .digit.bad{color:#ff6a5c;}

  .bytes{display:flex;gap:24px;justify-content:center;font-size:24px;
    color:#ffd97d;letter-spacing:3px;margin:14px 0;text-shadow:0 0 10px rgba(255,210,120,.3);}
  .ref{font-size:12px;color:#5a8a62;text-align:center;margin-bottom:14px;}
  .ansrow{text-align:center;margin-top:6px;}
  .ansrow input{background:#060d08;border:1px solid #1d4d28;color:#7dffa0;
    font-family:inherit;font-size:22px;letter-spacing:6px;text-align:center;
    width:140px;padding:8px;border-radius:4px;outline:none;text-transform:uppercase;}
  .ansrow input:focus{border-color:#3fae5c;}

  .hintbox{margin-top:18px;border-top:1px dashed #1d4d28;padding-top:10px;
    font-size:12px;color:#8aa88f;line-height:1.7;min-height:18px;}
  .hintbtn{background:none;border:1px solid #1d4d28;color:#4a7050;font-family:inherit;
    font-size:11px;padding:3px 10px;border-radius:3px;cursor:pointer;}
  .hintbtn:hover{color:#7dffa0;border-color:#3fae5c;}

  /* 章末卡 */
  .endcard{text-align:center;}
  .endcard h2{font-size:18px;letter-spacing:6px;margin-bottom:18px;}
  .endcard .got{color:#7fa886;font-size:13px;line-height:2.2;margin:14px 0;}
  .endcard .got b{color:#7dffa0;font-weight:normal;}
  .endcard .next{color:#4a7050;font-size:12px;line-height:2;margin:18px 0;}
  .endcard button{background:#0d2d14;border:1px solid #3fae5c;color:#7dffa0;
    font-family:inherit;font-size:13px;padding:8px 22px;border-radius:4px;
    cursor:pointer;margin:4px 8px;}
  .endcard button:hover{box-shadow:0 0 14px rgba(80,255,130,.35);}
  .endcard .sub{background:none;border-color:#1d4d28;color:#4a7050;}

  .choosable{cursor:pointer;border-radius:6px;animation:choicep 1.1s infinite;}
  @keyframes choicep{50%{background:rgba(125,255,160,.08);}}
  .flash{animation:okflash .5s;}
  @keyframes okflash{0%{box-shadow:0 0 0 rgba(80,255,130,0);}
    40%{box-shadow:0 0 60px rgba(80,255,130,.55);}100%{box-shadow:0 0 40px rgba(40,220,90,.12);}}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="narr"></div>
<div id="overlay"></div>
<script>
'use strict';
/* ================= 基础 ================= */
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
let VW=0, VH=0;
const FONT='"Cascadia Mono","Consolas","Courier New",monospace';   // 全局统一字体(canvas 与 DOM 一致)
/* 按屏幕像素比缩放画布→高清屏也清晰不糊；VW/VH 仍用 CSS 像素, 绘制逻辑不变 */
function resize(){ const dpr=Math.min(2, window.devicePixelRatio||1);
  VW=innerWidth; VH=innerHeight;
  cv.width=Math.round(VW*dpr); cv.height=Math.round(VH*dpr);
  cv.style.width=VW+'px'; cv.style.height=VH+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0); }
addEventListener('resize', resize); resize();

const SAVE_KEY='genesis_mvp_v1';
const WORLD_W=9600, SPAWN=2800;          // 出生点固定 2800(不跟 WORLD_W 走)
const TERMINUS4_X=9400;                  // 祭坛法阵世界 x；提前声明供调试入口使用
/* 章末祭坛插画(有版权, 已 .gitignore)。图内: 左砖路x208起 → 台阶 → 圆台法阵(圆心≈img770,215) */
const ALTAR_IMG=new Image(); let altarReady=false, altarPix=null;
ALTAR_IMG.onload=()=>{ altarReady=true;
  try{ const c=document.createElement('canvas'); c.width=1080; c.height=603;
    const g=c.getContext('2d'); g.drawImage(ALTAR_IMG,0,0); altarPix=g.getImageData(0,0,1080,603).data; }catch(e){} };
ALTAR_IMG.src='altar_edit.webp';
/* 可行走遮罩(白=能站)。运行时按角色脚底采样→真·按脚碰撞 */
const WALK_MASK=new Image(); let maskData=null, maskFailed=false;
WALK_MASK.onload=()=>{ try{ const c=document.createElement('canvas'); c.width=1080; c.height=603;
  const g=c.getContext('2d'); g.drawImage(WALK_MASK,0,0); maskData=g.getImageData(0,0,1080,603).data; }
  catch(e){ maskFailed=true; console.warn('walk mask unavailable, using geometry fallback', e); } };
WALK_MASK.onerror=()=>{ maskFailed=true; };
WALK_MASK.src='walk_mask.png';
function maskFallback(fx,fy){
  if(fx<208||fy<0||fx>=1080||fy>=603) return false;
  if(fx>=208&&fx<=410&&fy>=324&&fy<=397) return true;
  if(fx>=548&&fx<=1012){
    const nx=(fx-780)/232, ny=(fy-230)/94;
    if(nx*nx+ny*ny<=1) return true;
  }
  const top=[
    [410,324],[438,299],[468,274],[500,247],[536,218],[574,193],[612,180],[652,188],
    [708,250],[700,292],[640,306],[600,288],[560,270],[520,298],[480,330],[440,365],[410,397]
  ];
  let inside=false;
  for(let i=0,j=top.length-1;i<top.length;j=i++){
    const xi=top[i][0], yi=top[i][1], xj=top[j][0], yj=top[j][1];
    if(((yi>fy)!==(yj>fy)) && fx<(xj-xi)*(fy-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}
function maskWalk(fx,fy){ const x=fx|0,y=fy|0;
  if(x<0||y<0||x>=1080||y>=603) return false;
  if(!maskData) return maskFallback(fx,fy);
  return maskData[(y*1080+x)*4+3]>40; }
const AIMG_W=1080, AIMG_H=603, AIMG_CIRCLE_X=775, AIMG_CIRCLE_Y=222, AIMG_EDGE=208;
const AIMG_SCALE=0.8, AIMG_YOFF=252;                          // 插画缩放+竖直落位(IMG_Y0=midY-AIMG_YOFF)
const IMG_LTOP=324, IMG_LBOT=448;                             // 图左缘石板路横截面上下沿: 顶面上沿→侧面下沿
/* 三段可走区(图内坐标, fx=图内x, fy=脚的图内y):
   平路 fx[208,425]=上下带[318,400]自由; 台阶 fx[425,640]=踩亮色台阶顶(锁线); 圆盘 fx≥640=椭圆内自由(按脚碰撞) */
const FLAT_X1=425, STAIR_X1=640, FLAT_TOP=318, FLAT_BOT=400;
const DISC_CX=770, DISC_CY=235, DISC_RX=168, DISC_RY=62;
const STAIR_FY0=360, STAIR_FY1=245;                            // 台阶脚线两端 fy(中心线)
function discTop(fx){ const nx=(fx-DISC_CX)/DISC_RX; return DISC_CY-DISC_RY*Math.sqrt(Math.max(0,1-nx*nx)); }
function discBot(fx){ const nx=(fx-DISC_CX)/DISC_RX; return DISC_CY+DISC_RY*Math.sqrt(Math.max(0,1-nx*nx)); }
function stairFy(fx){ return STAIR_FY0+(STAIR_FY1-STAIR_FY0)*((fx-FLAT_X1)/(STAIR_X1-FLAT_X1)); }
/* 图内 fy ↔ G.py：脚屏幕y = (midY-AIMG_YOFF)+fy*AIMG_SCALE = midY+py+8 */
const fyToPy=fy=>fy*AIMG_SCALE-(AIMG_YOFF+8), pyToFy=py=>(py+AIMG_YOFF+8)/AIMG_SCALE;
const altarImgLeft=()=>TERMINUS4_X-AIMG_CIRCLE_X*AIMG_SCALE;
function preferAltarFy(fx){
  if(fx<AIMG_EDGE) return pyToFy(40);
  if(fx<FLAT_X1) return 354;
  if(fx<STAIR_X1) return stairFy(fx);
  return 236;   // 圆盘面中心偏前，角色身体压在法阵中央
}
function nearestMaskFy(fx, prefer){
  const x=Math.max(0,Math.min(1079,Math.round(fx)));
  const p=Math.max(0,Math.min(602,Math.round(prefer)));
  for(let d=0; d<170; d++){
    const y1=p-d, y2=p+d;
    if(y1>=0 && maskWalk(x,y1)) return y1;
    if(y2<603 && maskWalk(x,y2)) return y2;
  }
  return prefer;
}
function snapPyToMask(px, py){
  const fx=(px-altarImgLeft())/AIMG_SCALE;
  return fyToPy(nearestMaskFy(fx, pyToFy(py)));
}
function rgbOfHex(h){
  return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
}
function mixRgb(a,b,m){
  return 'rgb('+Math.round(a[0]+(b[0]-a[0])*m)+','+Math.round(a[1]+(b[1]-a[1])*m)+','+Math.round(a[2]+(b[2]-a[2])*m)+')';
}
function altarEdgeRgb(fy){
  if(!altarPix) return null;
  const x=AIMG_EDGE, y=Math.max(0,Math.min(602,Math.round(fy)));
  const o=(y*1080+x)*4;
  if(altarPix[o+3]<20) return null;
  return [altarPix[o],altarPix[o+1],altarPix[o+2]];
}
const BEATS=['void','binary','roam','clock','ascii','uni','pixel','colour','end'];
/* 64×64 主角=卢卡·巴尔萨(囚徒:单片圆镜/呆毛乱发/脏辫/高领围巾/工具带外套/粗腿靴)。
   绘制目标/细化/地图小人全用它,一脉相承(char_lab.html 打磨) */
/* 调色板+像素图=从参考图 ref.png 逐格采样(26×29,11色)。索引0=空。COLOUR前显示单色绿,之后真彩 */
const PAL=['','#010101','#824920','#955634','#f5f5f5','#80806b','#d4a2d8','#f5c2cb','#282421','#bfbfc0','#a19582','#4358a6'];
//            1黑     2发棕    3发浅    4白/肤   5灰绿(镜/纹) 6镜紫   7腮红    8深(衫/廓) 9浅灰   10棕(带)  11蓝(裤)
/* CHARC: 64×64 颜色索引图(0=空)。CHARG=其布尔轮廓(单色时用) */
/* 角色像素图 26×29(从 ref.png 逐格采样, 每字符=调色板索引 hex)。再等比放大填满 64×64 */
const CHAR_ART=[
".......1..................",
"......121.................",
"......1221....111.........",
".......12211112221.1111...",
".....1112232222222122221..",
"....1222232232222212221...",
"...1222233222322221211....",
"..122222223222322211......",
"..1222242324224322221.....",
".1222242234222242221......",
"12222222232222223221......",
".12222123221122232221.....",
"..122141221441224421......",
"..121455121661224421......",
"..121455414554124421......",
"..13145544455412221.......",
"...117744444771221........",
".....18889588881..........",
"....14444599444411........",
"..11488889588888481.......",
".1484444444444411841......",
"1484888888888881.141......",
"1441114444444411..11......",
".11..1222aa22158..........",
".....11bb11bb158..........",
"......1bb11bb188..........",
"......1bb11bb1............",
"......15511551............",
"......11111111............",
];
const CHARC=(function(){
  const S=64, g=Array.from({length:S},()=>new Array(S).fill(0));
  const AW=26, AH=CHAR_ART.length, sc=Math.min((S-2)/AW, S/AH);   // 等比放大填满画框
  const ox=Math.round((S-AW*sc)/2), oy=Math.round((S-AH*sc)/2);
  for(let ay=0;ay<AH;ay++){ const row=CHAR_ART[ay]; for(let ax=0;ax<AW;ax++){
    const ch=row[ax]||'.'; if(ch==='.') continue;
    const c=parseInt(ch,16); if(!c) continue;
    const x0=Math.round(ox+ax*sc), x1=Math.round(ox+(ax+1)*sc);
    const y0=Math.round(oy+ay*sc), y1=Math.round(oy+(ay+1)*sc);
    for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++) if(x>=0&&y>=0&&x<S&&y<S) g[y][x]=c;
  }}
  return g;
})();
const CHARG=CHARC.map(row=>row.map(v=>v>0));   // 布尔轮廓(单色/位深=1时用)
/* 把 64×64 降采样到 N×N(块内过半即亮), 返回布尔网格 */
function charDown(N){
  const s=64/N, out=[];
  for(let r=0;r<N;r++){ const row=[]; for(let c=0;c<N;c++){
    let hit=0,tot=0;
    for(let yy=0;yy<s;yy++)for(let xx=0;xx<s;xx++){ const sr=(r*s+yy)|0,sc=(c*s+xx)|0; tot++; if(CHARG[sr][sc]) hit++; }
    row.push(hit*2>=tot); } out.push(row); }
  return out;
}
/* 绘制谜题目标 = 角色的 8×8 缩略版(所以你画的就是细化的第 0 层, 之后原地分格加细) */
const DRAW8=(function(){ const d=charDown(8);
  return d.map(row=>{ let b=0; for(let c=0;c<8;c++) if(row[c]) b|=1<<(7-c); return b; }); })();
/* 画降采样网格(单色绿)到以(cx,cy)为中心、边长 box 的方框——分辨率细化用 */
function drawCharRes(cx,cy,box,N){
  const grid=charDown(N), cell=box/N, x0=cx-box/2, y0=cy-box/2;
  ctx.fillStyle='#a8ffc4';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(grid[r][c]) ctx.fillRect(x0+c*cell,y0+r*cell,cell-0.5,cell-0.5);
}
/* 把 64×64 颜色图降采样到 N×N, 每格取块内出现最多的非空色号(0=空) */
function charDownC(N){
  const s=64/N, out=[];
  for(let r=0;r<N;r++){ const row=[]; for(let c=0;c<N;c++){
    const cnt={};
    for(let yy=0;yy<s;yy++)for(let xx=0;xx<s;xx++){ const v=CHARC[(r*s+yy)|0][(c*s+xx)|0]; if(v) cnt[v]=(cnt[v]||0)+1; }
    let best=0,bn=0; for(const k in cnt) if(cnt[k]>bn){ bn=cnt[k]; best=+k; }
    row.push(best); } out.push(row); }
  return out;
}
const CHARDISS=charDownC(16);   // 传送溶解用的降采样彩色网格(格子大些, 原尺寸下 0/1 也看得清)
/* 传送溶解: 未转化的部分保持【和普通小人完全一样的 64 分辨率彩色像素】(不变粗);
   转化前沿由头到脚扫过, 扫过的 4×4 块变成一个 0/1; 过半后 0/1 从头开始向上飞升渐隐。el=传送已过毫秒 */
function drawCharDissolve(cx,cy,box,el){
  const NB=CHARDISS.length, bs=64/NB;              // 4px 块(数字以块为单位, 保证可读)
  const scale=box/64, x0=Math.round(cx-64*scale/2), y0=Math.round(cy-64*scale/2);
  const DISS=1400, HALF=DISS*0.5, RSPREAD=1700, RDUR=1300, sz=Math.ceil(scale)+0.5;
  ctx.textAlign='center';
  for(let br=0;br<NB;br++){
    const convT=(br/(NB-1))*DISS;
    if(el<convT){
      /* 该块行还没转化 → 用满分辨率 CHARC 原样画彩色像素(与 drawCharSprite 一致, 完全不变) */
      for(let yy=0;yy<bs;yy++){ const rr=br*bs+yy, row=CHARC[rr];
        for(let cc=0;cc<64;cc++){ const v=row[cc]; if(!v) continue;
          ctx.fillStyle=PAL[v]; ctx.fillRect(Math.round(x0+cc*scale),Math.round(y0+rr*scale),sz,sz); } }
    }else{
      /* 已转化 → 每个有内容的 4×4 块变成一个 0/1, 按头→脚顺序飞升渐隐 */
      ctx.font=Math.round(bs*scale*1.5)+'px '+FONT;
      for(let bc=0;bc<NB;bc++){ const v=CHARDISS[br][bc]; if(!v) continue;
        const seed=((br+3)*73856093^(bc+5)*19349663^(v+11)*83492791)>>>0;
        const rnd=(seed%1000)/1000, rnd2=((seed>>>10)%1000)/1000;
        const rs=HALF+(br/(NB-1))*RSPREAD+rnd*420;       // 同一排内部随机冒泡
        let dy=0,a=1;
        if(el>rs){
          const rp=(el-rs)/(RDUR*(.85+rnd2*.35));
          if(rp>=1) continue;
          const acc=rp*rp*(1.15+.55*rp);                // 慢起步→越来越快
          dy=-acc*(118+rnd*90);
          a=Math.max(0,1-rp*.9);
        }
        ctx.fillStyle='rgba(150,255,185,'+a+')';
        const dig=((br*7+bc*13+v)&1)?'1':'0';
        ctx.fillText(dig, x0+(bc*bs+bs/2)*scale, y0+(br*bs+bs*0.95)*scale+dy); }
    }
  }
  ctx.textAlign='left';
}
/* 章末祭坛插画(缩放绘制) + 法阵仪式(平面亮阵 + 轻微竖光, 不加圆罩辉光)。圆阵圆心对齐世界 TERMINUS4 */
function drawAltarScene(el,t,midY){
  const T4=TERMINUS4.x, IMG_LEFT=T4-AIMG_CIRCLE_X*AIMG_SCALE, IMG_Y0=Math.round(midY-AIMG_YOFF);
  if(altarReady){
    const dx=Math.round(sx(IMG_LEFT)), dw=Math.round(AIMG_W*AIMG_SCALE), dh=Math.round(AIMG_H*AIMG_SCALE);
    if(dx<VW+40 && dx+dw>-40) ctx.drawImage(ALTAR_IMG, dx, IMG_Y0, dw, dh);
  }
  const ccx=sx(T4), ccy=IMG_Y0+AIMG_CIRCLE_Y*AIMG_SCALE;
  if(ccx<-220||ccx>VW+220) return;
  const tel=G.teleAt?(t-G.teleAt):-1;
  /* 仪式: 先让插画上的圆阵本身亮起来，再升起很暗的垂直光；不画圆罩/白闪。 */
  if(tel>=900){
    const flash1=Math.max(0,1-Math.abs(tel-1040)/140);
    const flash2=Math.max(0,1-Math.abs(tel-1450)/160);
    const steady=Math.min(1,Math.max(0,(tel-1700)/700));
    const fade=tel>5200?Math.max(0,1-(tel-5200)/900):1;
    const a=(.05*steady+.13*Math.max(flash1,flash2))*fade;
    const rx=144*AIMG_SCALE, ry=62*AIMG_SCALE;
    ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.lineWidth=1.2;
    ctx.strokeStyle='rgba(118,220,255,'+a+')';
    ctx.fillStyle='rgba(75,185,255,'+(a*.20)+')';
    ctx.beginPath(); ctx.ellipse(ccx,ccy,rx,ry,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.strokeStyle='rgba(160,235,255,'+(a*.8)+')';
    ctx.beginPath(); ctx.ellipse(ccx,ccy,rx*.66,ry*.58,0,0,Math.PI*2); ctx.stroke();
    for(let k=0;k<6;k++){
      const ang=k*Math.PI/3+t*.00012;
      const x1=ccx+Math.cos(ang)*rx*.38, y1=ccy+Math.sin(ang)*ry*.38;
      const x2=ccx+Math.cos(ang+Math.PI)*rx*.38, y2=ccy+Math.sin(ang+Math.PI)*ry*.38;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    }
    ctx.restore();
  }
  const upP=(tel>=0)?Math.min(1,Math.max(0,(tel-2300)/900)):0;
  if(upP>0){
    const RX=110*AIMG_SCALE;
    ctx.save(); ctx.globalCompositeOperation='lighter';
    for(let k=0;k<11;k++){ const fx=ccx+(k/10-.5)*RX*1.7, h=120;
      const a=upP*(.10+.05*Math.sin(t/280+k*1.3));      // 压暗(原来太亮看不清)
      const lg=ctx.createLinearGradient(0,ccy,0,ccy-h);
      lg.addColorStop(0,'rgba(150,205,255,'+a+')'); lg.addColorStop(1,'rgba(150,205,255,0)');
      ctx.fillStyle=lg; ctx.fillRect(fx-2, ccy-h, 4, h); }
    ctx.restore();
  }
}
/* 走路四帧: 站/抬左脚/站/抬右脚(把该脚最下两行清掉=抬起, 不甩腿) */
function legLift(x0,x1){ const g=CHARC.map(r=>r.slice()); for(let y=62;y<=63;y++)for(let x=x0;x<=x1;x++) g[y][x]=0; return g; }
const CHAR_WALK=[CHARC, legLift(16,24), CHARC, legLift(26,34)];
/* 地图角色 sprite: 64×64 缩放。colored=true 用调色板真彩, 否则单色绿。整数对齐保证清晰 */
function drawCharSprite(cx,cy,scale,walking,phase,glow,colored){
  const g=walking?CHAR_WALK[phase&3]:CHARC;
  const bob=walking&&(phase&1)?-1.5:0;
  if(glow){ const gl=ctx.createRadialGradient(cx,cy,0,cx,cy,64*scale*.75);
    gl.addColorStop(0,'rgba(125,255,160,.4)'); gl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(cx,cy,64*scale*.8,0,7); ctx.fill(); }
  const x0=Math.round(cx-64*scale/2), y0=Math.round(cy-64*scale/2+bob), sz=Math.ceil(scale)+0.5;
  for(let r=0;r<64;r++){ const row=g[r]; for(let c=0;c<64;c++){ const v=row[c]; if(!v) continue;
    ctx.fillStyle=colored?PAL[v]:'#a8ffc4';
    ctx.fillRect(Math.round(x0+c*scale),Math.round(y0+r*scale),sz,sz); } }
}
/* 灰阶调色板(PAL 各色的亮度)——位深演出的中间档 */
const PAL_GREY=PAL.map((h,i)=>{ if(!h) return '';
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  const y=Math.round(.3*r+.59*g+.11*b).toString(16).padStart(2,'0'); return '#'+y+y+y; });
/* 十六进制颜色线性插值 */
function lerpHex(a,b,m){
  const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
  const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
  return 'rgb('+Math.round(pa[0]+(pb[0]-pa[0])*m)+','+Math.round(pa[1]+(pb[1]-pa[1])*m)+','+Math.round(pa[2]+(pb[2]-pa[2])*m)+')';
}
/* 位深演出: stage 为小数 0..2, 在 0=1bit(单色绿) 1=灰阶 2=真彩 之间平滑过渡。box 为显示边长 */
function drawCharDepth(cx,cy,box,stage){
  const s=box/64, x0=cx-box/2, y0=cy-box/2;
  const st=Math.max(0,Math.min(2,stage)), i=Math.min(1,Math.floor(st)), f=st-i;
  for(let r=0;r<64;r++)for(let c=0;c<64;c++){ const v=CHARC[r][c]; if(!v) continue;
    const cols=['#a8ffc4', PAL_GREY[v], PAL[v]];
    ctx.fillStyle = f<=0 ? cols[i] : lerpHex(cols[i],cols[i+1],f);
    ctx.fillRect(Math.round(x0+c*s),Math.round(y0+r*s),Math.ceil(s)+0.4,Math.ceil(s)+0.4); }
}

/* ================= 谜题一：计数表（找规律，零文字，零记忆） ================= */
/* 语言法则：ASCII 解锁前世界无字母无句子(独白也没有)；数字/符号随"数"诞生；
   ASCII 后只有英文；Unicode 后中文才诞生。
   设计：从 0000 开始一行行往下浮现，全部留在屏幕上——推理，不是记忆。
   到 4/8/12 停住让玩家填(基本进位/全进位/双进位)。
   无言提示：填错发呆→整行轻红；错2次→高亮上面最后两行之间翻动的位。 */
const SEQ_ASKS=[4,8,12];
function openSeq(){
  openPanel('<div id="seqtbl" style="display:flex;flex-direction:column;gap:6px;'+
    'align-items:center;max-height:78vh;overflow:hidden auto"></div>','seq');
  overlay.querySelector('.panel').classList.add('bare');
  const tbl=document.getElementById('seqtbl');
  let cur=0, fails=0, idleTimer=null;
  const setRowEl=(row,v)=>row.querySelectorAll('.bit').forEach(b=>{
    const on=!!(v & +b.dataset.v);
    b.classList.toggle('on',on); b.textContent=on?'1':'0';
  });
  const rowVal=row=>[...row.querySelectorAll('.bit')].reduce(
    (s,b)=>s+(b.classList.contains('on')?+b.dataset.v:0),0);
  function addRow(){
    const row=document.createElement('div');
    row.className='bitrow'; row.style.margin='0';
    for(let i=3;i>=0;i--){
      const b=document.createElement('button');
      b.className='bit sm'; b.dataset.v=(1<<i); b.textContent='0';
      row.appendChild(b);
    }
    tbl.appendChild(row); tbl.scrollTop=tbl.scrollHeight;
    tbl.classList.toggle('fadetop', tbl.scrollHeight>tbl.clientHeight+4);
    return row;
  }
  function hintDiff(){   // 无言提示：上面最后两行之间哪些位翻动了
    const done=tbl.children.length-1;
    if(done<2) return;
    const a=tbl.children[done-2], b=tbl.children[done-1];
    const diff=rowVal(a)^rowVal(b);
    [a,b].forEach(r=>r.querySelectorAll('.bit').forEach(x=>{
      if(diff & +x.dataset.v){
        x.style.borderColor='#ffd97d';
        setTimeout(()=>{ x.style.borderColor=''; },1200);
      }
    }));
  }
  function askRow(target){
    const row=addRow(); row.classList.add('askrow');
    const armIdle=()=>{
      clearTimeout(idleTimer);
      idleTimer=setTimeout(()=>{
        if(G.panelOpen!=='seq' || rowVal(row)===0 || rowVal(row)===target) return;
        fails++;
        row.querySelectorAll('.bit').forEach(b=>b.classList.add('bad'));
        setTimeout(()=>row.querySelectorAll('.bit').forEach(b=>b.classList.remove('bad')),600);
        if(fails>=2) hintDiff();
      },2600);
    };
    row.querySelectorAll('.bit').forEach(b=>b.onclick=()=>{
      const on=!b.classList.contains('on');
      b.classList.toggle('on',on); b.textContent=on?'1':'0';
      if(rowVal(row)===target){
        clearTimeout(idleTimer);
        row.classList.remove('askrow');
        row.querySelectorAll('.bit').forEach(x=>{ x.onclick=null; });
        cur++; setTimeout(next,650);
      }else armIdle();
    });
  }
  function next(){
    if(G.panelOpen!=='seq') return;
    if(cur>SEQ_ASKS[SEQ_ASKS.length-1]){ seqSolved(); return; }
    if(SEQ_ASKS.includes(cur)){ askRow(cur); return; }
    setRowEl(addRow(),cur); cur++;
    setTimeout(next,650);
  }
  next();
}
function seqSolved(){
  if(G.panelOpen!=='seq') return;
  overlay.querySelector('.panel').classList.add('flash');
  /* 创世演出: 满屏 0/1 收缩汇聚成 [0 1 / 1 0] 方块(世界现在由二进制构成)→再化作 01 雨与路。演出中锁移动 */
  setTimeout(()=>{ closePanel(); G.beat='roam';
    G.genesisAt=performance.now();
    G.roadBornA=performance.now()+2600;   // 方块成形后才开始铺路
    G.lockUntil=performance.now()+3000;   // 汇聚演出期间不能动
    save(); },700);
}

/* ================= 谜题二：BCD 巨钟 ================= */
let bcdTarget=null;
function openBCD(){
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  let mm=String(now.getMinutes()).padStart(2,'0');
  if(mm==='00') mm='01';   // 整点时两列目标全 0 会退化成"开局即完成"
  bcdTarget=[+hh[0],+hh[1],+mm[0],+mm[1]];
  const mk=(idx,locked)=>{
    const d=bcdTarget[idx]; let bitsHtml='';
    for(let i=3;i>=0;i--){
      const v=1<<i, on=locked&&(d&v);
      bitsHtml+='<button class="bit'+(on?' on':'')+(locked?' locked':'')+'" data-v="'+v+
        '" data-col="'+idx+'"'+(locked?' disabled':'')+'>'+(on?1:0)+'</button>';
    }
    return '<div class="bcdcol" style="display:flex;flex-direction:column;align-items:center;gap:6px">'+
      '<div class="ghost">'+d+'</div>'+bitsHtml+
      '<div class="digit" id="dg'+idx+'">'+(locked?d:0)+'</div></div>';
  };
  /* ASCII 之前无文字：钟面只有残影数字、位灯、解码数字。小时两列=看得懂的例题。 */
  let html='<div class="bcdcols">'+mk(0,true)+mk(1,true)+
    '<div class="bcdsep">:</div>'+mk(2,false)+mk(3,false)+'</div>';
  openPanel(html,'bcd');
  const hintHours=()=>{   // 无言提示：把"例题"(小时列)照亮一下
    overlay.querySelectorAll('.bit.locked').forEach(b=>{
      b.style.borderColor='#ffd97d';
      setTimeout(()=>{ b.style.borderColor=''; },900);
    });
  };
  const cols=[2,3];
  const refresh=()=>{
    let ok=true;
    cols.forEach(c=>{
      let sum=0;
      overlay.querySelectorAll('.bit[data-col="'+c+'"]').forEach(b=>{
        if(b.classList.contains('on')) sum+=+b.dataset.v; });
      const dg=document.getElementById('dg'+c);
      if(sum>9){ dg.textContent='✕'; dg.classList.add('bad'); ok=false; hintHours(); }
      else{ dg.textContent=sum; dg.classList.remove('bad'); if(sum!==bcdTarget[c]) ok=false; }
    });
    if(ok) setTimeout(()=>bcdSolved(),350);
  };
  overlay.querySelectorAll('.bit:not(.locked)').forEach(b=>b.onclick=()=>{
    b.classList.toggle('on'); b.textContent=b.classList.contains('on')?'1':'0'; refresh();
  });
}
function bcdSolved(){
  if(G.panelOpen!=='bcd') return;
  overlay.querySelector('.panel').classList.add('flash');
  setTimeout(()=>{
    /* 无言演出：钟亮起(0.9s) → 时间升天(1.5s) → 演出完才开始铺路 → 铺出一段后解锁操作。 */
    closePanel(); G.beat='clock'; G.clockLitAt=performance.now();
    G.lockUntil=performance.now()+4400;   // 升天演出完+看一段铺路
    save();
  },450);
}

/* ================= 谜题三：ASCII 字节群 ================= */
/* 答案不进源码：只存加盐哈希，F12 也翻不到原文 */
function ansHash(s){let x=5381;for(const c of 'GEN|'+s){x=((x*33)^c.charCodeAt(0))>>>0;}return x.toString(36);}
const ASCII_BYTES=['01001000','01001001'], ASCII_H='16zcro4';
function openASCII(){
  /* ASCII 之前无句子。教学全靠"罗塞塔残页"：三行对照自示规律，···展开全表。
     无言兜底：输错2次 → 字节下方浮现十进制值(数字合法)。 */
  /* 完整对照表：二进制 = 十进制 = 字母，A~M / N~Z 两栏 */
  const tbl=Array.from({length:26},(_,i)=>{
    const c=65+i;
    return '<div>'+c.toString(2).padStart(8,'0')+' = '+c+' = '+String.fromCharCode(c)+'</div>';
  }).join('');
  let html='<div class="ref" style="column-count:2;column-gap:44px;width:400px;'+
      'margin:0 auto 16px;text-align:left;line-height:1.75;font-size:12.5px;letter-spacing:1px">'+tbl+'</div>'+
    '<div class="bytes">'+ASCII_BYTES.join('　')+'</div>'+
    '<div class="ref" id="decs" style="visibility:hidden;font-size:16px;color:#ffd97d">'+
      ASCII_BYTES.map(b=>parseInt(b,2)).join('　　　　')+'</div>'+
    '<div class="ansrow">'+
      '<span style="display:inline-block;width:52px;padding:8px 0;margin-right:10px;'+
        'border:1px solid #3fae5c;border-radius:4px;background:#0d2d14;color:#7dffa0;'+
        'font-size:22px;text-align:center">H</span>'+
      '<input id="asciiin" maxlength="1" autocomplete="off" spellcheck="false" style="width:52px">'+
    '</div>';
  openPanel(html,'ascii');
  /* 第一个字节已解出 H(=72)。两个字节只差最后一位——用刚学的+1推出下一个字母。 */
  let wrong=0;
  const inp=document.getElementById('asciiin');
  setTimeout(()=>inp.focus(),80);
  inp.addEventListener('input',()=>{
    const v='H'+inp.value.toUpperCase();
    if(ansHash(v)===ASCII_H){
      overlay.querySelector('.panel').classList.add('flash');
      setTimeout(()=>{ closePanel(); asciiSolved(); },450);
    }else if(inp.value.length>=1){
      wrong++;
      inp.style.borderColor='#8a3a32';
      setTimeout(()=>{ inp.style.borderColor=''; },500);
      if(wrong>=2) document.getElementById('decs').style.visibility='visible';
    }
  });
}

  const cn=word==='你好';
  const line=cn?'现在，你能读懂我说的话了。':'NOW YOU CAN READ WHAT I SAY.';
  /* 与左边 HI 那组保持一致高度与字号(词≈HI:0.335/20, 句≈"I HAVE BEEN…":0.42/20) */

    {x:5400, y:0.335, text:word, sz:20, notype:true, t0:0},                      // TERMINUS=5400
    {x:5400, y:0.42, text:line, sz:20, spd:115, t0:instant?0:performance.now()+500});  // 句子打慢一点
}
function asciiSolved(){
  /* 文字诞生。不弹独白——旁白以"路"的形式从左到右拼在地上(见 drawRoad 字母段)。 */
  G.beat='ascii'; G.asciiSolvedAt=performance.now();
  G.lockUntil=performance.now()+7600;   // 字母云拼HI+台词+看一段铺路，演出全程锁操作
  save(); spawnEchoTexts(false);
}

/* ================= 谜题四：编码全景（打字机点亮 + 选择你的语言） ================= */
/* 左框两列 ASCII、右框三列 Unicode，每格=二进制码+字符；
   绿色竖杠光标按"从左到右、从上到下"打字机式逐格点亮(点击快进)；
   全部忠实码位升序：0-9<A-Z<a-z；希腊<西里尔<希伯来<泰文<假名<中文，跳跃处···。
   最后 CHOOSE YOUR LANGUAGE：英文框 / 中文列高亮可选，选中的字符飘到下方拼 HELLO / 你好。 */
function openUni(){
  /* 列头带字节数：随码位增大，一个字符占的字节从 1→2→3→4 —— UTF-8 变长编码。
     每列首尾都留 ···(说明这只是整张码表的一个窗口，上下都还有)，各列填到相近高度 */
  const wrap=arr=>[{g:1},...arr,{g:1}];
  const COLS=[
    {h:'! ? . · 0–9 · A–Z', c:wrap([{v:33},{v:46},{v:63},{g:1},{v:48},{v:49},{g:1},{v:57},{g:1},{v:65},{v:66},{g:1},{v:90}])},
    {h:'a–z',       c:wrap([{v:97},{v:98},{v:99},{g:1},{v:107},{v:108},{g:1},{v:115},{v:116},{g:1},{v:120},{v:121},{v:122}])},
    {h:'2 BYTES · GREEK RUS', c:wrap([{v:0x3B1},{v:0x3B2},{v:0x3B3},{g:1},{v:0x3C9},{g:1},{v:0x410},{v:0x411},{v:0x412},{g:1},{v:0x42E},{v:0x42F}])},
    {h:'2 BYTES · HEBREW ARABIC', c:wrap([{v:0x5D0},{v:0x5D1},{v:0x5D2},{g:1},{v:0x5EA},{g:1},{v:0x627},{v:0x628},{v:0x62A},{g:1},{v:0x649},{v:0x64A}])},
    {h:'3 BYTES · THAI KANA',  c:wrap([{v:0xE01},{v:0xE02},{v:0xE03},{g:1},{v:0x3042},{v:0x3044},{g:1},{v:0x30A2},{v:0x30AB},{g:1},{v:0x30F3}])},
    /* 汉字也是连续编号(3 bytes)——你/好 各带真实相邻码位的字 */
    {h:'3 BYTES · CHINESE',    c:wrap([{v:0x4E2D},{v:0x4E3E},{g:1},{v:0x4F5F},{v:0x4F60},{v:0x4F61},{g:1},{v:0x597C},{v:0x597D},{v:0x597E},{g:1},{v:0x5B57}])},
    /* 增补平面：真的要 4 bytes。😀😁😂🚀 连续码位(每格 32 位分两行, 行更高) */
    {h:'4 BYTES · EMOJI',      c:wrap([{v:0x1F600},{v:0x1F601},{v:0x1F602},{g:1},{v:0x1F680},{v:0x1F681},{g:1},{v:0x1F4A1}])},
  ];
  const cellHTML=(cell,ascii)=>{
    if(cell.g) return '<span class="ucell" style="visibility:hidden;color:#3a5c40;font-size:11px;line-height:1.6">···</span>';
    let codeHtml;
    if(cell.v<128){
      codeHtml='<span style="font-size:9px;color:#4a7050">'+cell.v.toString(2).padStart(8,'0')+'</span>';
    }else if(cell.v<=0xFFFF){
      codeHtml='<span style="font-size:9px;color:#4a7050">'+cell.v.toString(2).padStart(16,'0')+'</span>';
    }else{
      const b=cell.v.toString(2).padStart(32,'0');
      codeHtml='<span style="display:flex;flex-direction:column;font-size:8px;line-height:1.25;color:#4a7050">'+
        '<span>'+b.slice(0,16)+'</span><span>'+b.slice(16)+'</span></span>';
    }
    return '<span class="ucell" style="visibility:hidden;display:flex;gap:6px;align-items:center;line-height:1.5">'+
      codeHtml+
      '<span style="font-size:14px;color:'+(ascii?'#8fd9a0':'#ffd97d')+'">'+String.fromCodePoint(cell.v)+'</span></span>';
  };
  const colHTML=ci=>{
    const cc=COLS[ci];
    return '<div class="ucol" data-c="'+ci+'" style="display:flex;flex-direction:column;gap:2px;'+
      'align-items:flex-start;padding:2px 4px">'+
      '<div style="font-size:9px;color:#4a7050;letter-spacing:1px;white-space:nowrap;margin-bottom:4px;align-self:center">'+cc.h+'</div>'+
      cc.c.map(cell=>cellHTML(cell,ci<2)).join('')+'</div>';
  };
  let html='<div style="display:flex;gap:14px;justify-content:center;align-items:stretch">'+
    '<div id="uboxA" style="border:1px solid #1d4d28;border-radius:6px;padding:8px 10px">'+
      '<div style="text-align:center;color:#5ad477;font-size:12px;letter-spacing:3px;margin-bottom:6px">ASCII · 1 BYTE</div>'+
      '<div style="display:flex;gap:12px">'+colHTML(0)+colHTML(1)+'</div></div>'+
    '<div id="uboxU" style="border:1px solid #4d3d1d;border-radius:6px;padding:8px 10px">'+
      '<div style="text-align:center;color:#ffd97d;font-size:12px;letter-spacing:3px;margin-bottom:6px">UNICODE · 2–4 BYTES</div>'+
      '<div style="display:flex;gap:12px">'+colHTML(2)+colHTML(3)+colHTML(4)+colHTML(5)+colHTML(6)+'</div></div>'+
    '</div>'+
    '<div id="ucap" class="seqcap" style="visibility:hidden;margin-top:16px">CHOOSE YOUR LANGUAGE</div>';
  openPanel(html,'uni');
  overlay.querySelector('.panel').style.maxWidth='96vw';   // 这个面板要更宽，放得下 7 列
  /* 打字机顺序：列优先——左框第一列(上→下)→第二列→右框各列 */
  const colEls=[...overlay.querySelectorAll('.ucol')];
  const grid=colEls.map(el=>[...el.querySelectorAll('.ucell')]);
  const order=[];
  grid.forEach(g=>g.forEach(cell=>order.push(cell)));
  /* 绿色竖杠光标：与字符同大小 */
  const cur=document.createElement('span');
  cur.textContent='▌';
  cur.style.cssText='position:fixed;color:#7dffa0;font-size:14px;z-index:99;'+
    'text-shadow:0 0 8px rgba(125,255,160,.6);animation:blink 1s infinite';
  document.body.appendChild(cur);
  let ri=0, revealTimer=null, chosen=false;
  function reveal(){
    if(G.panelOpen!=='uni'){ cur.remove(); return; }
    if(ri>=order.length){ cur.remove(); armChoice(); return; }
    const el=order[ri++];
    const rc=el.getBoundingClientRect();
    cur.style.left=(rc.right)+'px'; cur.style.top=(rc.top-1)+'px';
    el.style.visibility='visible';
    revealTimer=setTimeout(reveal,200);
  }
  overlay.querySelector('.panel').addEventListener('click',()=>{   // 点击快进
    if(ri<order.length && !chosen){
      clearTimeout(revealTimer);
      while(ri<order.length) order[ri++].style.visibility='visible';
      cur.remove(); armChoice();
    }
  });
  function armChoice(){
    if(G.panelOpen!=='uni') return;
    document.getElementById('ucap').style.visibility='visible';
    const engCols=[...document.getElementById('uboxA').querySelectorAll('.ucol')];
    const cnCol=overlay.querySelector('.ucol[data-c="5"]');   // CHINESE 列
    [[document.getElementById('uboxA'), engCols, 'HELLO'],
     [cnCol, [cnCol], '你好']].forEach(pair=>{
      pair[0].classList.add('choosable');
      pair[0].addEventListener('click',ev=>{ ev.stopPropagation(); choose(pair[1],pair[2]); });
    });
  }
  /* 选定：和 HI 一样——①整个框体消失 ②所选词飞到世界里路尽头(略偏上)成为永久文字
     ③下面那句话在世界里(canvas)打字机, 不在框体里 */
  function choose(keepCols,word){
    if(chosen || G.panelOpen!=='uni') return;
    chosen=true;
    overlay.querySelectorAll('.choosable').forEach(x=>x.classList.remove('choosable'));
    document.getElementById('ucap').style.visibility='hidden';
    const cn=word==='你好', chars=[...word];
    const srcCells=keepCols.flatMap(c=>[...c.querySelectorAll('.ucell')]).filter(c=>c.textContent!=='···');
    const srcRects=chars.map((ch,k)=>srcCells[(k*7+2)%srcCells.length].getBoundingClientRect());
    /* ① 整个框体消失 */
    const panel=overlay.querySelector('.panel');
    panel.style.transition='opacity .6s'; panel.style.opacity='0';
    overlay.style.transition='background .6s'; overlay.style.background='rgba(0,0,0,0)';
    /* ② 词飞到世界里 TERMINUS(路尽头)略偏上的位置 */
    const cw=cn?22:13;
    const flies=chars.map((ch,k)=>{
      const f=document.createElement('span'); f.textContent=ch;
      f.style.cssText='position:fixed;left:'+srcRects[k].left+'px;top:'+srcRects[k].top+'px;'+
        'font-size:15px;color:#7dffa0;z-index:130;text-shadow:0 0 16px rgba(125,255,160,.6);'+
        'transition:all 1.1s cubic-bezier(.2,.7,.3,1) '+(k*120)+'ms';
      document.body.appendChild(f); return f;
    });
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const bx=sx(5400)-(chars.length-1)*cw/2, ty=VH*0.335-15;   // 落到词 worldText 处(5400=TERMINUS)
      chars.forEach((ch,k)=>{ flies[k].style.left=(bx+k*cw)+'px'; flies[k].style.top=ty+'px'; flies[k].style.fontSize='20px'; });
    }));
    const landed=1100+chars.length*120;
    setTimeout(()=>{
      finishUni(word);                 // 关面板、beat=uni、路续铺
      spawnUniTexts(word,false);        // ③ 词成为世界永久文字 + 下面一句话在世界里打字机
      setTimeout(()=>flies.forEach(f=>f.remove()), 450);   // 交接给 canvas 词后移除 DOM 飞字
    }, landed+250);
  }
  reveal();
}
function finishUni(word){
  /* 词已在屏幕中央、下方那句话也打完——关面板，路用所选语言往东续铺，玩家走到尽头即章末 */
  closePanel(); G.beat='uni'; G.chosenWord=word;
  G.uniRoadBorn=performance.now();
  G.lockUntil=performance.now()+1200;   // 看一段路铺出来再走
  save();
}

/* ================= 第 1 章 · PIXEL：画出你自己 ================= */
/* 镜子照不出你(你至今只是一个颜色值)——把自己画成位图。8×12 网格, 拖拽刷点亮/熄灭。 */
function openPixel(){
  let html='<h2>THE MIRROR<span class="esc">Esc 离开</span></h2>'+
    '<div class="desc">这面镜子映不出你——你至今只是<b>一个颜色</b>，还没有形状。<br>'+
    '一张图 = 一个二维的比特网格：每格一个 bit，<b>0 空、1 亮</b>。'+
    '把所有 <b>1</b> 填满，就把自己画出来了(按住拖动可连续涂)。</div>'+
    '<div style="text-align:center;margin:10px 0"><div id="pxgrid" '+
      'style="display:inline-grid;grid-template-columns:repeat(8,30px);'+
      'gap:2px;touch-action:none;user-select:none"></div></div>';
  openPanel(html,'pixel');
  const N=8, TGT=DRAW8;                    // 8×8 网格, 目标=DRAW8
  const grid=document.getElementById('pxgrid');
  const cur=Array(N).fill(0);
  const cells=[];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const on=TGT[r]&(1<<(7-c));           // 目标: 1=要填, 0=空
    const b=document.createElement('div');
    b.dataset.r=r; b.dataset.c=c;
    b.textContent=on?'1':'0';
    b.style.cssText='width:30px;height:30px;border-radius:3px;'+
      'display:flex;align-items:center;justify-content:center;font-size:15px;user-select:none;'+
      'border:1px solid '+(on?'#3a5c40':'#182518')+';'+
      'background:'+(on?'#0c160e':'#080f0a')+';'+
      'color:'+(on?'#6aa872':'#2a3a2c')+';cursor:pointer';
    grid.appendChild(b); cells.push(b);
  }
  const idx=(r,c)=>r*N+c;
  const paint=(r,c,mode)=>{
    if(r<0||c<0||r>=N||c>=N) return;
    const bit=1<<(7-c), was=!!(cur[r]&bit), tgtOn=!!(TGT[r]&bit);
    if(mode===was) return;
    if(mode) cur[r]|=bit; else cur[r]&=~bit;
    const b=cells[idx(r,c)];
    b.style.background=mode?'#7dffa0':(tgtOn?'#0c160e':'#080f0a');
    b.style.color=mode?'#08140b':(tgtOn?'#6aa872':'#2a3a2c');
    b.style.borderColor=mode?'#7dffa0':(tgtOn?'#3a5c40':'#182518');
    check();
  };
  const check=()=>{ if(cur.every((v,r)=>v===TGT[r])) setTimeout(pixelSolved,300); };
  let painting=false, mode=1;
  const cellAt=e=>{ const el=document.elementFromPoint(e.clientX,e.clientY);
    return el&&el.dataset&&el.dataset.r!==undefined?el:null; };
  grid.addEventListener('pointerdown',e=>{
    e.preventDefault(); const el=cellAt(e); if(!el) return;
    const r=+el.dataset.r,c=+el.dataset.c;
    mode = !(cur[r]&(1<<(7-c)));            // 按下处是灭→本次涂亮；是亮→本次涂灭
    painting=true; grid.setPointerCapture(e.pointerId); paint(r,c,mode);
  });
  grid.addEventListener('pointermove',e=>{ if(!painting) return;
    const el=cellAt(e); if(el) paint(+el.dataset.r,+el.dataset.c,mode); });
  const stop=()=>{ painting=false; };
  grid.addEventListener('pointerup',stop); grid.addEventListener('pointercancel',stop);
}
/* pixel 章演出时间轴(相对 pixelBornAt):
   0–5600  分辨率细化 8→16→32→64 逐级清晰(屏幕正中, 每步 1400ms)
   5600–6200 缩小成小人   6200–7400 低头看手   7400–8800 雀跃   >8800 行走循环 */
function pixelSolved(){
  if(G.panelOpen!=='pixel') return;
  const gr=document.getElementById('pxgrid');   // 记下填色框的屏幕位置/大小→细化原地开始
  if(gr){ const r=gr.getBoundingClientRect(); G.pixelBox={cx:r.left+r.width/2, cy:r.top+r.height/2, box:r.width}; }
  overlay.querySelector('.panel').classList.add('flash');
  setTimeout(()=>{
    closePanel(); G.beat='pixel'; G.pixelBornAt=performance.now();
    G.pixelRoadBorn=performance.now()+6200;   // 细化完+缩小后再铺 pixel 路
    G.lockUntil=performance.now()+9000;
    save();
  },500);
}

/* ================= 第 2 章 · COLOUR DEPTH：给世界上色 ================= */
/* 位深=每像素几个 bit=能有几种颜色。两段解谜，各配说明：
     第一段 openColour(): 8-bit 灰阶——拼 8 位二进制凑目标灰度 → greySolved() 播 1-bit→灰阶演出(停在灰)
     第二段 openColourTrue(): 24-bit 真彩——拨 R/G/B 的位凑目标发棕 → colourSolved() 播 灰阶→真彩演出
   演出时间轴:
     grey演出(相对 greyBornAt):   0–1600 1-BIT(单色绿)  1600– 8-BIT 灰阶(之后一直停在灰)
     colour演出(相对 colourBornAt):0–1200 灰阶  1200–2600 24-BIT 真彩  2600–3200 缩成彩色小人  >3200 行走 */

/* —— 第一段：8-bit 灰阶。拼 8 位二进制(128..1)凑目标灰度值 —— */
function openColour(){
  if(G.beat!=='pixel' || G.greyBornAt) return;
  const PLACES=[128,64,32,16,8,4,2,1], TGT=180;   // 目标灰度 180 = 10110100
  let html='<h2>COLOUR DEPTH · 灰阶<span class="esc">Esc 离开</span></h2>'+
    '<div class="desc">位深 = 每个像素用几个 <b>bit</b>。1 bit 只能黑或白（2 色）；位越多，灰阶越细。<br>'+
    '灰阶图每像素 <b>8 bit → 2⁸ = 256 级灰</b>。拨动 8 个位，拼出右边的目标灰度。</div>'+
    '<div style="display:flex;gap:26px;justify-content:center;align-items:center;margin:14px 0">'+
      '<div style="text-align:center"><div id="cmix" style="width:64px;height:64px;border-radius:6px;border:1px solid #3fae5c;background:rgb(0,0,0)"></div><div style="font-size:11px;color:#5a8a62;margin-top:4px">你调的 = <b id="cval">0</b></div></div>'+
      '<div style="color:#4a7050;font-size:20px">→</div>'+
      '<div style="text-align:center"><div style="width:64px;height:64px;border-radius:6px;border:1px solid #8a8a8a;background:rgb('+TGT+','+TGT+','+TGT+')"></div><div style="font-size:11px;color:#5a8a62;margin-top:4px">目标 = <b>'+TGT+'</b></div></div>'+
    '</div><div id="crow" style="display:flex;gap:6px;justify-content:center;align-items:flex-start;margin:6px 0"></div>';
  openPanel(html,'colour');
  const rowEl=document.getElementById('crow');
  const val=()=>[...rowEl.querySelectorAll('button')].reduce((s,x)=>s+(x.classList.contains('on')?+x.dataset.v:0),0);
  PLACES.forEach(bv=>{
    const wrap=document.createElement('div'); wrap.style.cssText='text-align:center';
    const b=document.createElement('button'); b.textContent='0'; b.dataset.v=bv;
    b.style.cssText='width:40px;height:46px;border:1px solid #1d4d28;border-radius:4px;background:#060d08;color:#2a4a30;font-size:20px;font-family:inherit;cursor:pointer';
    b.onclick=()=>{ const on=b.classList.toggle('on');
      b.textContent=on?'1':'0'; b.style.background=on?'#0d2d14':'#060d08'; b.style.color=on?'#d8e8dc':'#2a4a30'; b.style.borderColor=on?'#8fd9a0':'#1d4d28';
      const v=val();
      document.getElementById('cmix').style.background='rgb('+v+','+v+','+v+')';
      document.getElementById('cval').textContent=v;
      if(v===TGT){ overlay.querySelector('.panel').classList.add('flash'); setTimeout(greySolved,450); }
    };
    wrap.appendChild(b);
    const cap=document.createElement('div'); cap.textContent=bv;
    cap.style.cssText='font-size:9px;color:#4a7050;margin-top:3px'; wrap.appendChild(cap);
    rowEl.appendChild(wrap);
  });
}
function greySolved(){
  if(G.panelOpen!=='colour') return;
  closePanel(); G.greyBornAt=performance.now(); G.lockUntil=performance.now()+3400; save();
  setTimeout(openColourTrue, 3400);   // 灰阶演出结束后自动进入真彩段
}

/* —— 第二段：24-bit 真彩。拨 R/G/B 的位凑目标发棕色 —— */
function openColourTrue(){
  if(G.beat!=='pixel') return;
  const T=[4,2,1];                                   // 目标每通道 0..7 级: R=4 G=2 B=1 → 发棕
  const CH=[{n:'R',col:'#e06a6a',v:0},{n:'G',col:'#6ae06a',v:0},{n:'B',col:'#6a9ae0',v:0}];
  const lvl=v=>Math.round(v/7*255);
  const mix=()=>'rgb('+lvl(CH[0].v)+','+lvl(CH[1].v)+','+lvl(CH[2].v)+')';
  const tgt='rgb('+lvl(T[0])+','+lvl(T[1])+','+lvl(T[2])+')';
  let html='<h2>COLOUR DEPTH · 真彩<span class="esc">Esc 离开</span></h2>'+
    '<div class="desc">灰阶只有明暗。要真正的颜色，就把 <b style="color:#e06a6a">红</b>/<b style="color:#6ae06a">绿</b>/<b style="color:#6a9ae0">蓝</b> 三种光按不同强度混合。<br>'+
    '真彩每通道 8 位、合计 <b>24 bit → 1600 万色</b>。这里每通道给你 3 个位，<b>拨 R/G/B 调出目标发棕色</b>。</div>'+
    '<div style="display:flex;gap:26px;justify-content:center;align-items:center;margin:14px 0">'+
      '<div style="text-align:center"><div id="cmix" style="width:64px;height:64px;border-radius:6px;border:1px solid #3fae5c;background:'+mix()+'"></div><div style="font-size:11px;color:#5a8a62;margin-top:4px">你调的</div></div>'+
      '<div style="color:#4a7050;font-size:20px">→</div>'+
      '<div style="text-align:center"><div style="width:64px;height:64px;border-radius:6px;border:1px solid #6b4a2a;background:'+tgt+'"></div><div style="font-size:11px;color:#5a8a62;margin-top:4px">目标</div></div>'+
    '</div><div id="crows"></div>';
  openPanel(html,'colour');
  const rowsEl=document.getElementById('crows');
  CH.forEach((ch)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:8px;justify-content:center;align-items:center;margin:7px 0';
    row.innerHTML='<span style="width:18px;color:'+ch.col+';font-weight:bold;font-size:16px">'+ch.n+'</span>';
    [4,2,1].forEach(bv=>{
      const b=document.createElement('button'); b.textContent='0'; b.dataset.v=bv;
      b.style.cssText='width:42px;height:46px;border:1px solid #1d4d28;border-radius:4px;background:#060d08;color:#2a4a30;font-size:20px;font-family:inherit;cursor:pointer';
      b.onclick=()=>{ const on=b.classList.toggle('on');

        ch.v=[...row.querySelectorAll('button')].reduce((s,x)=>s+(x.classList.contains('on')?+x.dataset.v:0),0);

{

const rain=[];
function ensureRain(){
  if(!past('roam')) return;
  while(rain.length<130){
    rain.push({x:Math.random()*WORLD_W, y:Math.random()*VH,
      v:8+Math.random()*18, c:Math.random()<.5?'0':'1', a:.06+Math.random()*.12});

/* ================= 主循环 ================= */
let last=performance.now();
function frame(t){
  const dt=Math.min((t-last)/1000,.05); last=t;
  update(dt,t); draw(t);
  requestAnimationFrame(frame);
}
function update(dt,t){
  const IMG_LEFT=TERMINUS4.x-AIMG_CIRCLE_X*AIMG_SCALE, ALT_ZONE=IMG_LEFT+AIMG_EDGE*AIMG_SCALE;   // 进入可走面的世界x
  const wkW=(px,py)=>maskWalk((px-IMG_LEFT)/AIMG_SCALE, pyToFy(py));   // 世界坐标→遮罩(按脚)
  if(G._snapSceneToMask && maskData){
    if(G.px>=ALT_ZONE) G.py=snapPyToMask(G.px,G.py);
    G._snapSceneToMask=false;
  }
  if(past('roam') && !G.narrActive && !G.panelOpen && t>=G.lockUntil){
    const sp=260, px0=G.px, py0=G.py;
    let mv=false;
    const mx=(keys['d']||keys['arrowright']?1:0)-(keys['a']||keys['arrowleft']?1:0);
    const my=(keys['s']||keys['arrowdown']?1:0)-(keys['w']||keys['arrowup']?1:0);
    if(mx<0) { G.px-=sp*dt; mv=true; }
    if(mx>0) { G.px+=sp*dt; mv=true; }
    if(my<0) { G.py-=sp*dt; mv=true; }
    if(my>0) { G.py+=sp*dt; mv=true; }
    G.px=Math.max(60,Math.min(WORLD_W-60,G.px));
    if(G.beat==='colour' && G.px>=ALT_ZONE){
      /* 遮罩碰撞: 脚底不在白区就退回, 分轴回退实现沿边滑动 */
      if(!wkW(G.px,G.py)){
        const fx=(G.px-IMG_LEFT)/AIMG_SCALE;
        const stairAssist=mx && fx>395 && fx<700 ? fyToPy(nearestMaskFy(fx, pyToFy(G.py))) : null;
        if(stairAssist!==null && Math.abs(stairAssist-G.py)<56 && wkW(G.px,stairAssist)) G.py=stairAssist;
        else if(wkW(G.px,py0)) G.py=py0;   // 竖直被挡
        else if(wkW(px0,G.py)) G.px=px0;   // 水平被挡
        else if(G.lastGoodPx!==null){ G.px=G.lastGoodPx; G.py=G.lastGoodPy; }
        else { G.py=snapPyToMask(G.px,G.py); }
      }
      if(wkW(G.px,G.py)){ G.lastGoodPx=G.px; G.lastGoodPy=G.py; }
      else if(mv && G.lastGoodPx!==null){ G.px=G.lastGoodPx; G.py=G.lastGoodPy; }   // 遮罩迟到/缓存异常后的稳定兜底
    }else{
      G.lastGoodPx=null; G.lastGoodPy=null;
      G.py=Math.max(26,Math.min(48,G.py));
    }
    if(mv) G.walkPhase+=dt*9;
  }
  /* 传送阵：确认后自动走到法阵中心(前 900ms 缓动) */
  if(G.teleAt){
    const el=t-G.teleAt, p=Math.min(1, el/900);
    const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    G.px=G.teleStartX+(TERMINUS4.x-G.teleStartX)*e;
    G.py+=(fyToPy(236)-G.py)*Math.min(1,dt*5);   // 滑到法阵中心(脚在盘面中心偏前, 身体压住法阵)
    if(el>200&&el<900) G.walkPhase+=dt*9;
    if(el>=7000 && !G.teleEnded){ G.teleEnded=true; showEndCard(); }   // 阵仪式(2900)+溶解飞升(~3700)后落章末
  }
  G.camx+=( (past('roam')?G.px:SPAWN) - G.camx )*Math.min(1,dt*4);
  ensureRain();
  rain.forEach(p=>{ p.y+=p.v*dt*(past('clock')?(1+.4*Math.sin(t/480)):1);
    if(p.y>VH){ p.y=-14; p.x=Math.random()*WORLD_W; } });
}
const sx=x=>VW/2+(x-G.camx);
function draw(t){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,VW,VH);
  const pulse=past('clock')?1+.05*Math.sin(t/480):1;

  /* 01 雨 */
  if(past('roam')){
    ctx.font='13px monospace';
    rain.forEach(p=>{
      const x=sx(p.x); if(x<-20||x>VW+20) return;
      ctx.fillStyle='rgba(90,212,119,'+(p.a*pulse)+')';
      ctx.fillText(p.c,x,p.y);
    });
  }

  const midY=VH*.46;

  /* —— 路：01 密铺成路；每段诞生时字符从虚空飘落归位、由西向东铺开。
        字母路段=回声的台词写在地上，按【单词为单位】铺、一个词整体一行，同 01 路飞入演出。 —— */
  const ROAD_WORDS=['THANK','YOU','FOR','THE','WORDS','BUT','SOME','OF','MINE','ARE','STILL','BROKEN'];
  /* 选完语言后路继续用所选语言铺，长度补到镜子(TERMINUS2)前一点：英文=单词、中文=逐字 */
  const ROAD_END_EN=['NOW','I','THINK','IN','YOUR','LANGUAGE','WALK','ON','THIS','ROAD','SPEAKS','YOUR','WORDS','FOLLOW','IT','TO','THE','END'];
  const ROAD_END_CN='你终于能用母语和这个世界说话了往前走吧路的尽头有面照不出你的镜子在等你现形'.split('');
  /* 预排：每词占一"列"、整词不拆行；词按 0/1/2 三行上下错开(不同行=不同列，不影响阅读)；
     词间留随机空白(1..2格, 保证 ASCII 桥最后一词不被截断)。返回 网格索引→{ch,wStart,row} */
  function letterLayout(i0, tokens){
    const map={}; let gi=i0;
    tokens.forEach((w,wi)=>{
      const wStart=gi, row=wi%3;
      for(let k=0;k<w.length;k++){ map[gi]={ch:w[k],wStart,row}; gi++; }
      gi += 1 + (((wi*2654435761)>>>5)%2);   // 词间随机留白 1..2 格
    });
    return map;
  }
  function drawRoad(x0,x1,born,tokens){
    const el=born ? (t-born) : 1e9;          // 恢复存档：路已铺好
    ctx.font='12px monospace';
    /* 所有路段共享同一条全局 13px 网格：接缝处字距/行位韵律连续，不断开 */
    const i0=Math.ceil(x0/13);
    const lay=tokens?letterLayout(i0,tokens):null;
    for(let i=i0; i*13<x1; i++){
      const wx=i*13;
      const x=sx(wx); if(x<-30||x>VW+30) continue;
      let ch, col, base, row=[-2,7,16][i%3], anchorI=i;
      if(tokens){                            // 语言路：每词一列、三行错开、整词同时飞入
        const cell=lay[i]; if(!cell) continue;
        ch=cell.ch; row=[-2,7,16][cell.row]; anchorI=cell.wStart;   // 用词首做飞入时序锚
        col='125,255,160'; base=.55;
      }else{
        ch=((((i*2654435761)>>3)&1)?'1':'0');
        col='90,212,119'; base=.3;
      }
      const start=((anchorI*13-x0)/(x1-x0))*4200;   // 由西向东铺开(词按词首)
      const p=Math.min(1, Math.max(0,(el-start)/2100));
      if(p<=0) continue;
      const e=1-Math.pow(1-p,3);
      const ox=(1-e)*(((i*89)%60)-30), oy=(1-e)*(((i*61)%80)-40);   // 从虚空飘来
      const a=(base+.12*Math.sin(t/700+i*.7))*e;
      ctx.fillStyle='rgba('+col+','+a+')';
      ctx.fillText(ch, x+ox, midY+34+row+oy);
    }
  }
  if(past('roam'))  drawRoad(SPAWN-40, CLOCK.x, G.roadBornA, null);
  if(past('clock')) drawRoad(CLOCK.x, BYTES.x,
    G.clockLitAt ? G.clockLitAt+2600 : 0, null);   // 等时钟升天演出完再铺
  if(past('ascii')) drawRoad(BYTES.x, TERMINUS.x,
    G.asciiSolvedAt ? G.asciiSolvedAt+5800 : 0, ROAD_WORDS);   // 等回声两句话打完再开始写路
  if(past('uni'))   drawRoad(TERMINUS.x, TERMINUS2.x,          // 选完语言后用所选语言续铺
    G.uniRoadBorn || 1, G.chosenWord==='你好'?ROAD_END_CN:ROAD_END_EN);
  /* pixel 路：画出自己之后，路由 0/1 变成一块块像素铺成 */
  if(past('pixel')){
    const el=G.pixelRoadBorn?(t-G.pixelRoadBorn):1e9;
    for(let i=Math.ceil(TERMINUS2.x/7); i*7<TERMINUS3.x; i++){
      const wx=i*7, x=sx(wx); if(x<-10||x>VW+10) continue;
      const start=((wx-TERMINUS2.x)/(TERMINUS3.x-TERMINUS2.x))*4200;
      const p=Math.min(1,Math.max(0,(el-start)/1600)); if(p<=0) continue;
      for(let r=0;r<4;r++){
        if(((i*4+r)*2654435761>>>4 & 3)===0) continue;   // ~75% dither
        const a=(.34+.14*Math.sin(t/700+i*.5))*p;
        ctx.fillStyle='rgba(125,255,160,'+a+')';
        ctx.fillRect(x, midY+28+r*7, 6, 6);
      }
    }
  }
  /* —— 颜色路：彩色像素铺路(TERMINUS3→图内左缘)。临近祭坛时像素上下逐渐扩张到【图左缘所有像素的
        高度】(平铺, 不斜、不垒墙、不转石色), 长齐后直接接上插画 —— */
  const IMG_LEFT_W=TERMINUS4.x-AIMG_CIRCLE_X*AIMG_SCALE;   // 图 x=0 对应世界x
  const IMG_EDGE=IMG_LEFT_W+AIMG_EDGE*AIMG_SCALE;          // 图内左缘对应世界x
  if(past('colour')){
    const el=G.colourRoadBorn?(t-G.colourRoadBorn):1e9;
    const HUES=['#7a4a28','#e6c39a','#3a5a9c','#df9298','#9a9a9a','#e9e9e9'];
    const GRAD=86;   // 短距离接入插画左缘
    const walkY=midY+40;                                             // 桥面行走高度(与走廊/图内路面一致)
    const thinT=walkY-16, thinB=walkY+16;
    const fullT=midY-AIMG_YOFF+IMG_LTOP*AIMG_SCALE, fullB=midY-AIMG_YOFF+IMG_LBOT*AIMG_SCALE; // 图左缘像素上下沿(屏幕)
    for(let i=Math.ceil(TERMINUS3.x/7); i*7<IMG_EDGE; i++){
      const wx=i*7, x=sx(wx); if(x<-10||x>VW+10) continue;
      const start=((wx-TERMINUS3.x)/(TERMINUS4.x-TERMINUS3.x))*4200;
      const p=Math.min(1,Math.max(0,(el-start)/1600)); if(p<=0) continue;
      const near=Math.max(0,Math.min(1,(wx-(IMG_EDGE-GRAD))/GRAD));
      const expand=near>0.015, fillP=near<.5?2*near*near:1-Math.pow(-2*near+2,2)/2;
      let r=0;
      const y0=expand?fullT:thinT, y1=expand?fullB:thinB;
      for(let yy=y0; yy<y1; yy+=7, r++){
        const inCore=yy>=thinT-2 && yy<=thinB+2;
        const h=((i*73856093)^(r*19349663))>>>0;
        const density=inCore ? 1 : Math.min(1, .05+fillP*.98);
        if(!inCore && fillP<.96 && ((h%100)/100)>density) continue;
        ctx.globalAlpha=Math.min(1, p*(inCore ? .72 : (.18+.72*fillP)));
        const hue=HUES[(((i*7+r)*2654435761>>>6))%HUES.length];
        const fy=(yy-(midY-AIMG_YOFF))/AIMG_SCALE;
        const stone=altarEdgeRgb(fy), stoneMix=stone?Math.max(0,Math.min(1,(near-.66)/.34)):0;
        ctx.fillStyle=stoneMix>0 ? mixRgb(rgbOfHex(hue), stone, stoneMix) : hue;   // 末端逐块过渡到石板边缘像素色
        ctx.fillRect(x, Math.round(yy), fillP>.92?7:6, fillP>.92?7:6);
      }
    }
    ctx.globalAlpha=1;
    drawAltarScene(el, t, midY);   // 祭坛插画 + 法阵仪式(升光)
  }
  /* —— 照不出你的镜子(语言路尽头, 进 pixel 前) —— */
  if(G.beat==='uni'){
    const x=sx(TERMINUS2.x);
    if(x>-120&&x<VW+120){
      ctx.strokeStyle='rgba(125,255,160,.5)'; ctx.lineWidth=2;
      ctx.strokeRect(x-46, midY-70, 92, 120);
      for(let k=0;k<40;k++){                              // 雪花噪点
        const nx=x-42+((k*73)%84), ny=midY-66+(((k*151)>>2)%112);
        ctx.fillStyle='rgba(125,255,160,'+(.05+.14*((Math.sin(t/120+k*3.1)+1)/2))+')';
        ctx.fillRect(nx,ny,3,3);
      }
    }
  }
  /* —— 颜色棱镜(pixel 路尽头, 进 colour 前): 一块折出彩虹的水晶 —— */
  if(G.beat==='pixel'){
    const x=sx(TERMINUS3.x);
    if(x>-80&&x<VW+80){
      const HUES=['#e05a5a','#e0a05a','#e0e05a','#5ae05a','#5aa0e0','#a05ae0'];
      for(let k=0;k<HUES.length;k++){
        ctx.globalAlpha=.35+.35*((Math.sin(t/300+k)+1)/2);
        ctx.fillStyle=HUES[k];
        ctx.fillRect(x-18+k*6, midY-60+k*4, 8, 44-k*2);
      }
      ctx.globalAlpha=1;
    }
  }

  /* (章末祭坛+法阵仪式已由 drawAltarScene 用插画绘制) */

  /* —— 时间的升天：从钟面漂到屏幕顶部正中，落定成第一件常驻 UI —— */
  if(past('clock')){
    const el=G.clockLitAt ? (t-G.clockLitAt) : 1e9;      // 恢复存档时直接落定
    const p=Math.min(1, Math.max(0, (el-900)/1500));
    const e=p<.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;       // ease in-out
    const fx=sx(CLOCK.x), fy=midY-31;
    const xg=fx+(VW/2-fx)*e, yg=fy+(38-fy)*e, fs=26-8*e;
    const now=new Date();
    const hh=String(now.getHours()).padStart(2,'0'), mm=String(now.getMinutes()).padStart(2,'0');
    const colon=(Math.floor(t/800)%2)?':':' ';
    ctx.fillStyle='rgba(125,255,160,'+(.75+.2*(1-e))+')';
    ctx.font=fs+'px monospace'; ctx.textAlign='center';
    ctx.fillText(hh+colon+mm, xg, yg); ctx.textAlign='left';
  }

  /* —— 路的尽头：Unicode 之前显示不出来的字(▯▯ 豆腐块)。之后由飞来的所选语言词接管(worldTexts) —— */
  if(past('ascii') && !past('uni')){
    const x=sx(TERMINUS.x);
    if(x>-60&&x<VW+60){
      const ph3=(Math.sin(t/420)+1)/2;
      ctx.strokeStyle='rgba(255,217,125,'+(.35+.5*ph3)+')'; ctx.lineWidth=2;
      ctx.strokeRect(x-27, midY-18, 21, 26);
      ctx.strokeRect(x+6,  midY-18, 21, 26);
    }
  }

  /* —— 键帽（meta-UI：键盘是现实世界的东西，不受语言法则限制） —— */
  function drawKey(cx,cy,ch,a){
    ctx.strokeStyle='rgba(90,212,119,'+(a*.6)+')';
    ctx.strokeRect(cx-11,cy-13,22,22);
    ctx.fillStyle='rgba(125,255,160,'+a+')';
    ctx.font='13px monospace'; ctx.textAlign='center';
    ctx.fillText(ch,cx,cy+3); ctx.textAlign='left';
  }

  /* —— 混沌：唯一的火花 —— */
  if(!past('roam')){
    const cxp=VW/2, cyp=midY, ph=(Math.sin(t/420)+1)/2;
    const g=ctx.createRadialGradient(cxp,cyp,0,cxp,cyp,60+30*ph);
    g.addColorStop(0,'rgba(160,255,190,'+(0.5+0.4*ph)+')');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cxp,cyp,90,0,7); ctx.fill();
    ctx.fillStyle='rgba(220,255,230,'+(0.7+0.3*ph)+')';
    ctx.fillRect(cxp-2,cyp-2,4,4);
    if(G.introDone && !G.panelOpen && !G.narrActive){
      ctx.strokeStyle='rgba(90,212,119,'+(0.25+0.3*ph)+')';
      ctx.beginPath(); ctx.arc(cxp,cyp,26+6*ph,0,7); ctx.stroke();
      drawKey(cxp,cyp+56,'E',.5+.4*ph);
    }
  }

  /* —— 远景光柱（同屏只有一个发光地标）。祭坛段(colour/end)不画, 免得贯穿祭坛的绿光 —— */
  const L=activeLandmark();
  if(L && !past('colour')){
    let x=sx(L.x), clamped=false;
    if(x<36){ x=36; clamped=true; } if(x>VW-36){ x=VW-36; clamped=true; }
    let a=.10+.05*Math.sin(t/600);
    if(clamped) a*=1.5;   // 屏幕外时贴边显示，当作方向罗盘
    const bg=ctx.createLinearGradient(x-44,0,x+44,0);
    bg.addColorStop(0,'rgba(90,212,119,0)');
    bg.addColorStop(.5,'rgba(90,212,119,'+a+')');
    bg.addColorStop(1,'rgba(90,212,119,0)');
    ctx.fillStyle=bg; ctx.fillRect(x-44,0,88,VH);
  }

  /* —— 巨钟：时间升天的同时躯壳渐隐消散，不留残骸 —— */
  if(past('roam')){
    const lit=past('clock');
    const el2=lit ? (G.clockLitAt?(t-G.clockLitAt):1e9) : 0;
    const p2=Math.min(1, Math.max(0, (el2-900)/1500));
    if(p2<1){
      const x=sx(CLOCK.x), y=midY-40;
      if(x>-160&&x<VW+160){
        const fade=1-p2;
        ctx.strokeStyle=lit?'rgba(125,255,160,'+(.9*fade)+')':'rgba(70,100,78,.5)';
        ctx.lineWidth=lit?2.5:1.5;
        ctx.beginPath(); ctx.arc(x,y,72*(lit?pulse:1),0,7); ctx.stroke();
        for(let i=0;i<12;i++){
          const a2=i/12*Math.PI*2;
          ctx.beginPath();
          ctx.moveTo(x+Math.cos(a2)*62,y+Math.sin(a2)*62);
          ctx.lineTo(x+Math.cos(a2)*70,y+Math.sin(a2)*70);
          ctx.stroke();
        }
        if(!lit){
          ctx.fillStyle='rgba(70,100,78,.45)'; ctx.font='22px monospace'; ctx.textAlign='center';
          ctx.fillText('--:--',x,y+8); ctx.textAlign='left';
        }
      }
    }
  }

  /* —— 字母云(绿色)：解谜后 H/I 汇聚固定成 HI(不再刷新替换)，其余四散消散 —— */
  if(G.beat==='clock' || past('ascii')){
    const bx=sx(BYTES.x), by=midY-70;
    if(bx>-360&&bx<VW+360){
      const solved=past('ascii');
      const p=solved ? (G.asciiSolvedAt ? Math.min(1,(t-G.asciiSolvedAt)/2200) : 1) : 0;
      const e=p<.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;
      ctx.textAlign='center';
      CLOUD.forEach((c,i)=>{
        if(solved && !c.main && p>=1) return;    // 背景字母消散完毕
        let x=bx+c.dx+Math.sin(t/600+i*1.7)*5;
        let y=by+c.dy+Math.cos(t/700+i*1.1)*4;
        let a, fs=c.s, bright=false;
        if(solved){
          if(c.main){                        // H 和 I 飘到中间，落位后永久固定
            const txx=bx+c.tx, tyy=VH*.34-6;
            if(p>=1){ x=txx; y=tyy; a=.9; fs=20; }
            else{ x+=(txx-x)*e; y+=(tyy-y)*e; a=.45+.45*e; fs=c.s+(20-c.s)*e; }
            bright=true;
          }else{                             // 其余字母飘出去消散
            const ang=Math.atan2(c.dy, c.dx||1);
            x+=Math.cos(ang)*e*280; y+=Math.sin(ang)*e*220;
            a=.45*(1-e);
          }
        }else{
          a=.28+.22*((Math.sin(t/500+i*2.3)+1)/2);
        }
        ctx.fillStyle=bright?'rgba(125,255,160,'+a+')':'rgba(90,212,119,'+a+')';
        ctx.font=fs+'px monospace';
        ctx.fillText(c.ch, x, y);
      });
      ctx.textAlign='left';
    }
  }

  /* —— 世界里的文字（回声台词/所选语言词，打字机；notype=整体直接显示） —— */
  if(G.worldTexts.length){
    ctx.textAlign='center';
    G.worldTexts.forEach(w=>{
      if(performance.now()<w.t0) return;
      ctx.font=(w.sz||20)+'px '+FONT;   // 与飞字/HI 同一字体
      const n=w.notype?w.text.length:Math.min(w.text.length, Math.floor((performance.now()-w.t0)/(w.spd||70)));
      ctx.fillStyle='rgba(125,255,160,'+(w.a==null?.9:w.a)+')';
      ctx.fillText(w.text.slice(0,n), sx(w.x), VH*w.y);
    });
    ctx.textAlign='left';
  }

  /* —— 创世汇聚：满屏 0/1 收缩成 [0 1 / 1 0] 方块(世界从此由二进制构成) —— */
  const genEl = G.genesisAt ? (t-G.genesisAt) : 1e9;
  const genActive = genEl<2600;
  if(genActive){
    const cx=VW/2, cy=midY, p=Math.min(1,genEl/1600), e=1-Math.pow(1-p,3);
    ctx.textAlign='center'; ctx.font='16px monospace';
    for(let k=0;k<64;k++){                                  // 散落的 0/1 向中心收缩淡出
      const ang=k*2.399, rad=(1-e)*(150+(k*53)%150);
      const gx=cx+Math.cos(ang)*rad, gy=cy+Math.sin(ang)*rad*.8;
      ctx.fillStyle='rgba(90,212,119,'+(.5*(1-e))+')';
      ctx.fillText((k&1)?'1':'0', gx, gy);
    }
    const bs=16+12*e, a=Math.min(1,e*1.5), dx=bs*.62, dy=bs*.62;  // 中心 2×2 方块 [0 1 / 1 0]
    ctx.font='bold '+bs+'px monospace'; ctx.fillStyle='rgba(125,255,160,'+a+')';
    ctx.fillText('0', cx-dx, cy-dy*.15); ctx.fillText('1', cx+dx, cy-dy*.15);
    ctx.fillText('1', cx-dx, cy+dy*1.05); ctx.fillText('0', cx+dx, cy+dy*1.05);
    ctx.textAlign='left';
  }

  /* —— 玩家 —— */
  if(past('roam') && !genActive){
    const x=sx(G.px), y=midY+G.py;
    if(past('colour')){
      /* 第二段演出：灰阶→24-bit真彩(~2s 平滑渐变), 之后彩色小人行走 */
      const el=G.colourBornAt?(t-G.colourBornAt):1e9, CDUR=2600;
      if(el<CDUR){
        const cx2=VW/2, cy2=VH*.40, box=254;
        const stage=1+Math.max(0,Math.min(1,(el-400)/2000));   // 1→2 over 2s
        const lab=stage<1.5?'8-BIT · 256 GREYS':'24-BIT · 16M COLOURS';
        drawCharDepth(cx2,cy2,box,stage);
        ctx.fillStyle='rgba(230,240,235,.85)'; ctx.font='15px '+FONT; ctx.textAlign='center';
        ctx.fillText(lab, cx2, cy2+box/2+24); ctx.textAlign='left';
      }else if(G.teleAt && (t-G.teleAt)>=2900){
        /* 传送溶解：阵仪式后, 角色【原地、原大小】从头到脚化成 0/1, 过半后由头开始飞升渐隐 */
        drawCharDissolve(x, y-24, 64, (t-G.teleAt)-2900);
      }else{
        const e2=el-CDUR;
        const teleWalk=G.teleAt && (t-G.teleAt)>200;   // 自动走进阵心
        const moving=teleWalk || ((keys['a']||keys['d']||keys['arrowleft']||keys['arrowright']||
          keys['w']||keys['s']||keys['arrowup']||keys['arrowdown']) && e2>500);
        let scale=1, glow=false;
        if(e2<600){ scale=1+(1-e2/600)*(254/64-1); glow=true; }   // 从彩色大图缩到小人
        if(G.teleAt) glow=true;    // 阵中发光
        drawCharSprite(x, y-24, scale, moving, Math.floor(G.walkPhase), glow, true);
      }
    }else if(G.greyBornAt){
      /* 第一段演出：1-bit(绿)→8-bit灰阶(~2s 平滑渐变), 之后一直停在灰(等真彩解谜) */
      const el=t-G.greyBornAt;
      const cx2=VW/2, cy2=VH*.40, box=254;
      const stage=Math.max(0,Math.min(1,(el-400)/2000));   // 0→1 over 2s
      const lab = stage<0.5 ? '1-BIT · 2 COLOURS' : '8-BIT · 256 GREYS';
      drawCharDepth(cx2,cy2,box,stage);
      ctx.fillStyle='rgba(230,240,235,.85)'; ctx.font='15px '+FONT; ctx.textAlign='center';
      ctx.fillText(lab, cx2, cy2+box/2+24); ctx.textAlign='left';
    }else if(past('pixel')){
      const el=G.pixelBornAt?(t-G.pixelBornAt):1e9;
      const REFINE=5600;   // 细化演出总时长(比原来放慢2倍)
      if(el<REFINE){
        /* 分辨率细化：就在刚才填色框的位置、同样大小原地分格, 8×8→16→32→64 逐级清晰 */
        const bx=G.pixelBox||{cx:VW/2,cy:VH*.42,box:254};
        const box=Math.min(300, bx.box);   // 保险: 绝不放成巨块
        const steps=[8,16,32,64], si=Math.min(3, Math.floor(el/1400));
        drawCharRes(bx.cx, bx.cy, box, steps[si]);
        ctx.fillStyle='rgba(125,255,160,.8)'; ctx.font='15px '+FONT; ctx.textAlign='center';
        ctx.fillText(steps[si]+' × '+steps[si], bx.cx, bx.cy+box/2+24); ctx.textAlign='left';
      }else{
        /* 画出自己之后：地图小人=细化出的同一个角色(CHARG缩放)。缩小登场→低头看手→雀跃→行走循环 */
        const e2=el-REFINE;
        const moving=(keys['a']||keys['d']||keys['arrowleft']||keys['arrowright']||
          keys['w']||keys['s']||keys['arrowup']||keys['arrowdown']) && e2>3400;
        let scale=1, yoff=0, glow=false;
        if(e2<600){ scale=1+(1-e2/600)*(254/64-1); glow=true; }     // 从细化大图缩到小人
        else if(e2<1800){ yoff=Math.sin((e2-600)/1200*Math.PI)*6; glow=true; }  // 低头看手
        else if(e2<3400){ const h=(e2-1800)/1600; yoff=-Math.abs(Math.sin(h*Math.PI*2))*24; }  // 雀跃两跳(原地,锁移动)
        drawCharSprite(x, y-24+yoff, scale, moving, Math.floor(G.walkPhase), glow);
      }
    }else{
      const g2=ctx.createRadialGradient(x,y,0,x,y,26);
      g2.addColorStop(0,'rgba(125,255,160,.5)'); g2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(x,y,26,0,7); ctx.fill();
      ctx.fillStyle='#a8ffc4';
      ctx.fillRect(x-7,y-7,14,14);
    }
    /* 交互提示（引导交给脚下的路，不再画箭头） */
    if(L && Math.abs(G.px-L.x)<L.r && !G.panelOpen && !G.narrActive && !G.teleAt){
      const ph2=(Math.sin(t/350)+1)/2;
      const eYoff=past('pixel')?-66:-30;   // 有实体小人后(pixel/colour)E 抬到头顶上方，别被身体挡住
      drawKey(x,y+eYoff,'E',.6+.4*ph2);
    }
    /* 移动教学：WASD 键帽（键盘上印的字），陪你走到巨钟为止；演出锁定时不显示 */
    if(G.beat==='roam' && Math.abs(G.px-CLOCK.x)>=130 && !G.panelOpen && !G.narrActive && t>=G.lockUntil){
      const ka=.45+.35*((Math.sin(t/500)+1)/2);
      drawKey(x, y+44,  'W', ka);
      drawKey(x-28, y+70, 'A', ka);
      drawKey(x, y+70,  'S', ka);
      drawKey(x+28, y+70, 'D', ka);
    }
  }

  /* 调试静态渲染：?dbg=char 看 32×32 角色；?dbg=sprite 看小人 */
  const dbg=new URLSearchParams(location.search).get('dbg');
  if(dbg==='char'){ const dn=+new URLSearchParams(location.search).get('n')||64; drawCharRes(VW/2, VH/2, 384, dn); }
  else if(dbg==='sprite'){ drawCharSprite(VW/2, VH/2, 1, true, Math.floor(t/140), true); }
  else if(dbg==='charc'){ const s=8,x0=VW/2-32*s,y0=VH/2-32*s;   // 彩色角色预览
    for(let r=0;r<64;r++)for(let c=0;c<64;c++){ const v=CHARC[r][c]; if(!v)continue;
      ctx.fillStyle=PAL[v]; ctx.fillRect(x0+c*s,y0+r*s,s+0.4,s+0.4); } }

  /* 暗角 */
  const vg=ctx.createRadialGradient(VW/2,VH/2,VH*.35,VW/2,VH/2,VH*.9);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.55)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,VW,VH);

}
requestAnimationFrame(frame);

/* 调试：?panel=binary|bcd|ascii|uni 直接开面板 */
const qpanel=new URLSearchParams(location.search).get('panel');
if(qpanel) setTimeout(()=>{
  if(qpanel==='binary') openSeq();
  else if(qpanel==='bcd') openBCD();
  else if(qpanel==='ascii') openASCII();
  else if(qpanel==='uni') openUni();
  else if(qpanel==='pixel') openPixel();
  else if(qpanel==='colour') openColour();
  else if(qpanel==='colourt'){ G.greyBornAt=0; openColourTrue(); }
},600);

/* ================= 开场：无字 ================= */
/* ASCII 之前世界没有文字——开场独白也不例外。黑暗、火花、路，自己解释自己。 */
/* 恢复位置：落在对应路段上(路已满铺, born=0/1→直接成形) */
if(past('uni') && G.chosenWord){ spawnUniTexts(G.chosenWord, true); }   // 所选语言词/句复现
if(G.beat==='uni'){ G.px=TERMINUS.x+60; G.camx=G.px; }
if(G.beat==='pixel' && !G.pixelBornAt){ G.px=TERMINUS2.x+60; G.camx=G.px; G.pixelBornAt=1; }  // 存档恢复:sprite已定型
if(G.beat==='colour' && !G.colourBornAt){ G.px=TERMINUS3.x+60; G.camx=G.px; G.pixelBornAt=1; G.colourBornAt=1; }  // 恢复:彩色小人已定型
/* beat==='ascii' 恢复时不弹独白——台词已经写在路上了 */
if(new URLSearchParams(location.search).get('test')) setTimeout(toggleTest,60);   // 调试:自动开选关菜单
</script>
