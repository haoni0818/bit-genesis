<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>BIT://GENESIS</title>
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;height:100%;
    font-family:"Cascadia Mono","Consolas","Courier New",monospace;}
  #cv{display:block;position:fixed;inset:0;}

  /* 内心独白（底部） */
  #narr{position:fixed;left:50%;bottom:9%;transform:translateX(-50%);
    max-width:640px;width:86%;text-align:center;color:#9db8a0;font-style:italic;
    font-size:17px;line-height:1.9;text-shadow:0 0 12px rgba(80,255,120,.15);
    display:none;cursor:pointer;user-select:none;}
  #narr .cont{color:#476b4d;font-size:12px;margin-top:10px;font-style:normal;
    animation:blink 1.2s infinite;}
  @keyframes blink{50%{opacity:.15}}

  /* 谜题面板 */
  #overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,.55);}
  .panel{background:#050a06;border:1px solid #1d4d28;border-radius:6px;
    padding:26px 34px;color:#b8e6c0;max-width:620px;width:90%;
    box-shadow:0 0 40px rgba(40,220,90,.12), inset 0 0 60px rgba(20,120,50,.05);}
  .panel h2{margin:0 0 6px;font-size:15px;font-weight:normal;color:#5ad477;
    letter-spacing:3px;}
  .panel .desc{font-size:13px;color:#7fa886;line-height:1.8;margin-bottom:18px;}
  .panel .esc{float:right;color:#3a5c40;font-size:11px;}

  .bitrow{display:flex;gap:10px;justify-content:center;margin:14px 0;flex-wrap:wrap;}
  .bitcol{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .bit{width:46px;height:56px;border:1px solid #1d4d28;border-radius:4px;
    background:#060d08;color:#2a4a30;font-size:26px;cursor:pointer;
    font-family:inherit;}   /* 不做过渡：数字与亮灯必须同一帧 */
  .bit.sm{width:34px;height:40px;font-size:18px;}
  @keyframes askpulse{50%{border-color:#5ad477;}}
  .askrow .bit{animation:askpulse 1.1s infinite;}
  #seqtbl{scrollbar-width:none;}              /* 滚动条太丑，藏掉 */
  #seqtbl::-webkit-scrollbar{display:none;}
  .bit.on{background:#0d2d14;color:#7dffa0;border-color:#3fae5c;
    box-shadow:0 0 14px rgba(80,255,130,.35);}
  .bit.locked{opacity:.55;cursor:default;}
  .bit.bad{border-color:#8a3a32;color:#d96a5c;}
  .panel.bare{background:none;border:none;box-shadow:none;padding:10px;}
  .seqcap{text-align:center;color:#4a7050;font-size:13px;margin-top:18px;
    font-style:italic;min-height:18px;}
  .wlabel{font-size:12px;color:#4a7050;height:16px;}
  .wdots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:46px;min-height:16px;}
  .wdots i{width:5px;height:5px;background:#2a4a30;border-radius:1px;}
  .bitcol.on .wdots i{background:#7dffa0;box-shadow:0 0 4px rgba(80,255,130,.6);}

  .tally{display:flex;gap:26px;justify-content:center;align-items:center;
    margin:16px 0 4px;font-size:14px;}
  .tally .lab{color:#4a7050;font-size:12px;}
  .dotbar{display:flex;gap:3px;flex-wrap:wrap;max-width:300px;}
  .dotbar i{width:8px;height:8px;border-radius:2px;background:#123018;}
  .dotbar i.lit{background:#ffd97d;box-shadow:0 0 5px rgba(255,210,120,.5);}
  .dotbar.cur i.lit{background:#7dffa0;box-shadow:0 0 5px rgba(80,255,130,.5);}
  .numval{font-size:22px;color:#7dffa0;}
  .numval.bad{color:#ff6a5c;}
  .target{font-size:22px;color:#ffd97d;}

  .ghost{font-size:34px;color:#33463a;letter-spacing:2px;}
  .bcdcols{display:flex;gap:18px;justify-content:center;align-items:flex-start;}
  .bcdsep{font-size:30px;color:#3fae5c;margin-top:60px;animation:blink 2s infinite;}
  .digit{font-size:24px;height:30px;color:#7dffa0;}
  .digit.bad{color:#ff6a5c;}

  .bytes{display:flex;gap:24px;justify-content:center;font-size:24px;
    color:#ffd97d;letter-spacing:3px;margin:14px 0;text-shadow:0 0 10px rgba(255,210,120,.3);}
  .ref{font-size:12px;color:#5a8a62;text-align:center;margin-bottom:14px;}
  .ansrow{text-align:center;margin-top:6px;}
  .ansrow input{background:#060d08;border:1px solid #1d4d28;color:#7dffa0;
    font-family:inherit;font-size:22px;letter-spacing:6px;text-align:center;
    width:140px;padding:8px;border-radius:4px;outline:none;text-transform:uppercase;}
  .ansrow input:focus{border-color:#3fae5c;}

  .hintbox{margin-top:18px;border-top:1px dashed #1d4d28;padding-top:10px;
    font-size:12px;color:#8aa88f;line-height:1.7;min-height:18px;}
  .hintbtn{background:none;border:1px solid #1d4d28;color:#4a7050;font-family:inherit;
    font-size:11px;padding:3px 10px;border-radius:3px;cursor:pointer;}
  .hintbtn:hover{color:#7dffa0;border-color:#3fae5c;}

  /* 章末卡 */
  .endcard{text-align:center;}
  .endcard h2{font-size:18px;letter-spacing:6px;margin-bottom:18px;}
  .endcard .got{color:#7fa886;font-size:13px;line-height:2.2;margin:14px 0;}
  .endcard .got b{color:#7dffa0;font-weight:normal;}
  .endcard .next{color:#4a7050;font-size:12px;line-height:2;margin:18px 0;}
  .endcard button{background:#0d2d14;border:1px solid #3fae5c;color:#7dffa0;
    font-family:inherit;font-size:13px;padding:8px 22px;border-radius:4px;
    cursor:pointer;margin:4px 8px;}
  .endcard button:hover{box-shadow:0 0 14px rgba(80,255,130,.35);}
  .endcard .sub{background:none;border-color:#1d4d28;color:#4a7050;}

  .flash{animation:okflash .5s;}
  @keyframes okflash{0%{box-shadow:0 0 0 rgba(80,255,130,0);}
    40%{box-shadow:0 0 60px rgba(80,255,130,.55);}100%{box-shadow:0 0 40px rgba(40,220,90,.12);}}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="narr"></div>
<div id="overlay"></div>
<script>
'use strict';
/* ================= 基础 ================= */
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
let VW=0, VH=0;
function resize(){ VW=cv.width=innerWidth; VH=cv.height=innerHeight; }
addEventListener('resize', resize); resize();

const SAVE_KEY='genesis_mvp_v1';
const WORLD_W=5600;
const BEATS=['void','binary','roam','clock','ascii','uni','end'];
const beatIdx=b=>BEATS.indexOf(b);

const G={
  beat:'void', binLevel:0,
  px:WORLD_W/2, py:0, camx:WORLD_W/2,
  introDone:true, moved:false, panelOpen:null, narrActive:false,
  worldTexts:[],           // {x,y,text,shown}
  clockLitAt:0, asciiSolvedAt:0, roadBornA:0,
};
function save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(
  {beat:G.beat, binLevel:G.binLevel})); }catch(e){} }
function load(){ try{
  const s=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(s && BEATS.includes(s.beat)){ G.beat=s.beat; G.binLevel=s.binLevel||0; G.introDone=true; }
}catch(e){} }
load();
/* 调试：?beat=roam 直接跳到某一幕（不写存档） */
const qbeat=new URLSearchParams(location.search).get('beat');
if(qbeat && BEATS.includes(qbeat)){ G.beat=qbeat; G.introDone=true; }
const qx=parseInt(new URLSearchParams(location.search).get('x'));   // 调试：?x=4600 指定出生位置
if(!isNaN(qx)){ G.px=Math.max(60,Math.min(WORLD_W-60,qx)); G.camx=G.px; }
const past=b=>beatIdx(G.beat)>=beatIdx(b);   // 已到达/越过某节拍
if(past('ascii')){ spawnEchoTexts(true); }

/* ================= 独白 ================= */
const narrEl=document.getElementById('narr');
let narrQueue=[], narrCb=null;
function narrate(lines, cb){
  narrQueue=lines.slice(); narrCb=cb||null; G.narrActive=true; nextNarr();
}
function nextNarr(){
  if(!narrQueue.length){
    narrEl.style.display='none'; G.narrActive=false;
    const cb=narrCb; narrCb=null; if(cb)cb(); return;
  }
  const line=narrQueue.shift();
  narrEl.innerHTML=line+'<div class="cont">▸</div>';
  narrEl.style.display='block';
}
narrEl.addEventListener('click', ()=>{ if(G.narrActive) nextNarr(); });

/* ================= 面板 ================= */
const overlay=document.getElementById('overlay');
function openPanel(html, name){
  overlay.innerHTML='<div class="panel">'+html+'</div>';
  overlay.style.display='flex'; G.panelOpen=name;
}
function closePanel(){ overlay.style.display='none'; overlay.innerHTML=''; G.panelOpen=null; }

function hintBoxHTML(){ return '<div class="hintbox"><button class="hintbtn" id="hintbtn">? 提示</button>'+
  '<span id="hinttxt" style="margin-left:10px"></span></div>'; }
function wireHints(hints){
  let lv=0;
  document.getElementById('hintbtn').onclick=()=>{
    document.getElementById('hinttxt').textContent=hints[Math.min(lv,hints.length-1)];
    lv++;
  };
}

/* ================= 谜题一：计数表（找规律，零文字，零记忆） ================= */
/* 语言法则：ASCII 解锁前世界无字母无句子(独白也没有)；数字/符号随"数"诞生；
   ASCII 后只有英文；Unicode 后中文才诞生。
   设计：从 0000 开始一行行往下浮现，全部留在屏幕上——推理，不是记忆。
   到 4/8/12 停住让玩家填(基本进位/全进位/双进位)。
   无言提示：填错发呆→整行轻红；错2次→高亮上面最后两行之间翻动的位。 */
const SEQ_ASKS=[4,8,12];
function openSeq(){
  openPanel('<div id="seqtbl" style="display:flex;flex-direction:column;gap:6px;'+
    'align-items:center;max-height:78vh;overflow:hidden auto"></div>','seq');
  overlay.querySelector('.panel').classList.add('bare');
  const tbl=document.getElementById('seqtbl');
  let cur=0, fails=0, idleTimer=null;
  const setRowEl=(row,v)=>row.querySelectorAll('.bit').forEach(b=>{
    const on=!!(v & +b.dataset.v);
    b.classList.toggle('on',on); b.textContent=on?'1':'0';
  });
  const rowVal=row=>[...row.querySelectorAll('.bit')].reduce(
    (s,b)=>s+(b.classList.contains('on')?+b.dataset.v:0),0);
  function addRow(){
    const row=document.createElement('div');
    row.className='bitrow'; row.style.margin='0';
    for(let i=3;i>=0;i--){
      const b=document.createElement('button');
      b.className='bit sm'; b.dataset.v=(1<<i); b.textContent='0';
      row.appendChild(b);
    }
    tbl.appendChild(row); tbl.scrollTop=tbl.scrollHeight;
    return row;
  }
  function hintDiff(){   // 无言提示：上面最后两行之间哪些位翻动了
    const done=tbl.children.length-1;
    if(done<2) return;
    const a=tbl.children[done-2], b=tbl.children[done-1];
    const diff=rowVal(a)^rowVal(b);
    [a,b].forEach(r=>r.querySelectorAll('.bit').forEach(x=>{
      if(diff & +x.dataset.v){
        x.style.borderColor='#ffd97d';
        setTimeout(()=>{ x.style.borderColor=''; },1200);
      }
    }));
  }
  function askRow(target){
    const row=addRow(); row.classList.add('askrow');
    const armIdle=()=>{
      clearTimeout(idleTimer);
      idleTimer=setTimeout(()=>{
        if(G.panelOpen!=='seq' || rowVal(row)===0 || rowVal(row)===target) return;
        fails++;
        row.querySelectorAll('.bit').forEach(b=>b.classList.add('bad'));
        setTimeout(()=>row.querySelectorAll('.bit').forEach(b=>b.classList.remove('bad')),600);
        if(fails>=2) hintDiff();
      },2600);
    };
    row.querySelectorAll('.bit').forEach(b=>b.onclick=()=>{
      const on=!b.classList.contains('on');
      b.classList.toggle('on',on); b.textContent=on?'1':'0';
      if(rowVal(row)===target){
        clearTimeout(idleTimer);
        row.classList.remove('askrow');
        row.querySelectorAll('.bit').forEach(x=>{ x.onclick=null; });
        cur++; setTimeout(next,650);
      }else armIdle();
    });
  }
  function next(){
    if(G.panelOpen!=='seq') return;
    if(cur>SEQ_ASKS[SEQ_ASKS.length-1]){ seqSolved(); return; }
    if(SEQ_ASKS.includes(cur)){ askRow(cur); return; }
    setRowEl(addRow(),cur); cur++;
    setTimeout(next,650);
  }
  next();
}
function seqSolved(){
  if(G.panelOpen!=='seq') return;
  overlay.querySelector('.panel').classList.add('flash');
  /* 无言演出：01 雨落下 + 路从虚空铺开 + WASD 键帽浮现。世界还没有字。 */
  setTimeout(()=>{ closePanel(); G.beat='roam'; G.roadBornA=performance.now(); save(); },700);
}

/* ================= 谜题二：BCD 巨钟 ================= */
let bcdTarget=null;
function openBCD(){
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  let mm=String(now.getMinutes()).padStart(2,'0');
  if(mm==='00') mm='01';   // 整点时两列目标全 0 会退化成"开局即完成"
  bcdTarget=[+hh[0],+hh[1],+mm[0],+mm[1]];
  const mk=(idx,locked)=>{
    const d=bcdTarget[idx]; let bitsHtml='';
    for(let i=3;i>=0;i--){
      const v=1<<i, on=locked&&(d&v);
      bitsHtml+='<button class="bit'+(on?' on':'')+(locked?' locked':'')+'" data-v="'+v+
        '" data-col="'+idx+'"'+(locked?' disabled':'')+'>'+(on?1:0)+'</button>';
    }
    return '<div class="bcdcol" style="display:flex;flex-direction:column;align-items:center;gap:6px">'+
      '<div class="ghost">'+d+'</div>'+bitsHtml+
      '<div class="digit" id="dg'+idx+'">'+(locked?d:0)+'</div></div>';
  };
  /* ASCII 之前无文字：钟面只有残影数字、位灯、解码数字。小时两列=看得懂的例题。 */
  let html='<div class="bcdcols">'+mk(0,true)+mk(1,true)+
    '<div class="bcdsep">:</div>'+mk(2,false)+mk(3,false)+'</div>';
  openPanel(html,'bcd');
  const hintHours=()=>{   // 无言提示：把"例题"(小时列)照亮一下
    overlay.querySelectorAll('.bit.locked').forEach(b=>{
      b.style.borderColor='#ffd97d';
      setTimeout(()=>{ b.style.borderColor=''; },900);
    });
  };
  const cols=[2,3];
  const refresh=()=>{
    let ok=true;
    cols.forEach(c=>{
      let sum=0;
      overlay.querySelectorAll('.bit[data-col="'+c+'"]').forEach(b=>{
        if(b.classList.contains('on')) sum+=+b.dataset.v; });
      const dg=document.getElementById('dg'+c);
      if(sum>9){ dg.textContent='✕'; dg.classList.add('bad'); ok=false; hintHours(); }
      else{ dg.textContent=sum; dg.classList.remove('bad'); if(sum!==bcdTarget[c]) ok=false; }
    });
    if(ok) setTimeout(()=>bcdSolved(),350);
  };
  overlay.querySelectorAll('.bit:not(.locked)').forEach(b=>b.onclick=()=>{
    b.classList.toggle('on'); b.textContent=b.classList.contains('on')?'1':'0'; refresh();
  });
}
function bcdSolved(){
  if(G.panelOpen!=='bcd') return;
  overlay.querySelector('.panel').classList.add('flash');
  setTimeout(()=>{
    /* 无言演出：钟亮起显示真实时间 → 时间挂上天空(常驻UI诞生) → 路向东延伸。 */
    closePanel(); G.beat='clock'; G.clockLitAt=performance.now(); save();
  },450);
}

/* ================= 谜题三：ASCII 字节群 ================= */
/* 答案不进源码：只存加盐哈希，F12 也翻不到原文 */
function ansHash(s){let x=5381;for(const c of 'GEN|'+s){x=((x*33)^c.charCodeAt(0))>>>0;}return x.toString(36);}
const ASCII_BYTES=['01001000','01001001'], ASCII_H='16zcro4';
function openASCII(){
  /* ASCII 之前无句子。教学全靠"罗塞塔残页"：三行对照自示规律，···展开全表。
     无言兜底：输错2次 → 字节下方浮现十进制值(数字合法)。 */
  const tbl=Array.from({length:26},(_,i)=>
    '<span style="display:inline-block;width:64px">'+String.fromCharCode(65+i)+' = '+(65+i)+'</span>').join('');
  let html='<div class="ref" style="line-height:2.1;font-size:14px">01000001 = 65 = A</div>'+
    '<div class="ref" style="line-height:2">'+tbl+'</div>'+
    '<div class="bytes">'+ASCII_BYTES.join('　')+'</div>'+
    '<div class="ref" id="decs" style="visibility:hidden;font-size:16px;color:#ffd97d">'+
      ASCII_BYTES.map(b=>parseInt(b,2)).join('　　　　')+'</div>'+
    '<div class="ansrow">'+
      '<span style="display:inline-block;width:52px;padding:8px 0;margin-right:10px;'+
        'border:1px solid #3fae5c;border-radius:4px;background:#0d2d14;color:#7dffa0;'+
        'font-size:22px;text-align:center">H</span>'+
      '<input id="asciiin" maxlength="1" autocomplete="off" spellcheck="false" style="width:52px">'+
    '</div>';
  openPanel(html,'ascii');
  /* 第一个字节已解出 H(=72)。两个字节只差最后一位——用刚学的+1推出下一个字母。 */
  let wrong=0;
  const inp=document.getElementById('asciiin');
  setTimeout(()=>inp.focus(),80);
  inp.addEventListener('input',()=>{
    const v='H'+inp.value.toUpperCase();
    if(ansHash(v)===ASCII_H){
      overlay.querySelector('.panel').classList.add('flash');
      setTimeout(()=>{ closePanel(); asciiSolved(); },450);
    }else if(inp.value.length>=1){
      wrong++;
      inp.style.borderColor='#8a3a32';
      setTimeout(()=>{ inp.style.borderColor=''; },500);
      if(wrong>=2) document.getElementById('decs').style.visibility='visible';
    }
  });
}
function spawnEchoTexts(instant){
  /* 时序对齐字母云动画：H/I 约 2.2s 落位，'HI.' 文本无缝接手 */
  G.worldTexts=[
    {x:4500, y:0.34, text:String.fromCharCode(72,73)+'.', t0:instant?0:performance.now()+2150},
    {x:4500, y:0.42, text:'I HAVE BEEN WAITING FOR YOU.', t0:instant?0:performance.now()+3400},
  ];
}
function asciiSolved(){
  /* 文字诞生。不弹独白——旁白以"路"的形式从左到右拼在地上(见 drawRoad 字母段)。 */
  G.beat='ascii'; G.asciiSolvedAt=performance.now(); save(); spawnEchoTexts(false);
}

/* ================= 谜题四：活的编码字典（ASCII→Unicode 滚动演出 + 拖拽配对） ================= */
/* 左列编码右列字符，从 A 一行行往下打印滚动；到数字后左列拓宽 8→16 位=Unicode 诞生；
   滚过各国文字直到中文；滚到 你/好 时停顿并存到一边；最后玩家把两个字拖进对应编码的框。 */
function openUni(){
  const SEQ=[{label:'ASCII',amber:false}];
  [65,66,67,-1,88,89,90,-1,97,98,99,-1,48,49,50,-1].forEach(c=>SEQ.push(c<0?{gap:1}:{c:c}));
  SEQ.push({widen:1},{label:'UNICODE',amber:true});
  [0x3B1,-1,0x42F,-1,0x3042,-1,0xD55C,-1].forEach(u=>       // α Я あ 한：语言的丰富性(码位不连续处都有···)
    SEQ.push(u<0?{gap:1}:{u:u}));
  SEQ.push({u:0x4F60,park:1},{gap:1});                       // 你 —— 停顿并保留
  SEQ.push({u:0x4FE1},{gap:1},{u:0x5149},{gap:1});           // 信 ··· 光 ···
  SEQ.push({u:0x597D,park:1});                               // 好 —— 停顿并保留
  let html='<div id="uwin" style="height:220px;overflow:hidden"></div>'+
    '<div id="upocket" style="text-align:center;min-height:52px;margin-top:10px"></div>'+
    '<div id="udrop" style="display:none;text-align:center;margin-top:4px">'+
      [0x4F60,0x597D].map(u=>{
        const b=u.toString(2).padStart(16,'0');
        return '<div class="ubox" data-u="'+u+'" style="display:inline-block;vertical-align:top;'+
            'margin:0 16px;text-align:center">'+
          '<div style="font-size:13px;color:#ffd97d;letter-spacing:1px">'+b.slice(0,8)+' '+b.slice(8)+'</div>'+
          '<div class="uslot" style="width:48px;height:48px;border:1px dashed #3fae5c;'+
            'border-radius:4px;margin:8px auto 0"></div></div>';
      }).join('')+
      '<div class="seqcap">CLICK AND DRAG EACH GLYPH TO ITS CODE.</div></div>';
  openPanel(html,'uni');
  const win=document.getElementById('uwin'), pocket=document.getElementById('upocket');
  let idx=0, fast=false, timer=null, done=0;
  const addRow=(code,ch,amber,label)=>{
    const r=document.createElement('div');
    r.style.cssText='display:flex;gap:20px;justify-content:center;font-size:15px;line-height:1.9';
    const col=label ? (amber?'#ffd97d':'#5ad477') : (amber?'#ffd97d':'#5a8a62');
    r.innerHTML='<span style="min-width:160px;text-align:right;'+
      'letter-spacing:'+(label?'3px':'1px')+';color:'+col+(label?';font-weight:bold':'')+'">'+code+'</span>'+
      '<span style="width:34px;text-align:left;color:#b8e6c0">'+ch+'</span>';
    win.appendChild(r); win.scrollTop=win.scrollHeight;
  };
  function wireDrag(chip){
    chip.addEventListener('pointerdown',ev=>{
      if(chip.dataset.lock) return;
      ev.preventDefault();
      chip.setPointerCapture(ev.pointerId);
      const rect=chip.getBoundingClientRect();
      const ox=ev.clientX-rect.left, oy=ev.clientY-rect.top;
      chip.style.position='fixed'; chip.style.zIndex=99;
      chip.style.left=rect.left+'px'; chip.style.top=rect.top+'px';
      chip.style.cursor='grabbing';
      const move=e2=>{ chip.style.left=(e2.clientX-ox)+'px'; chip.style.top=(e2.clientY-oy)+'px'; };
      const reset=()=>{ chip.style.position=''; chip.style.left=''; chip.style.top='';
        chip.style.zIndex=''; chip.style.cursor='grab'; };
      const up=e2=>{
        chip.removeEventListener('pointermove',move);
        chip.removeEventListener('pointerup',up);
        let hit=null;
        overlay.querySelectorAll('.ubox').forEach(bx=>{
          const r2=bx.getBoundingClientRect();
          if(e2.clientX>=r2.left&&e2.clientX<=r2.right&&e2.clientY>=r2.top&&e2.clientY<=r2.bottom) hit=bx;
        });
        if(hit && !hit.dataset.filled && String.fromCharCode(+hit.dataset.u)===chip.textContent){
          hit.dataset.filled='1'; reset();
          chip.dataset.lock='1'; chip.style.cursor='default'; chip.style.margin='0';
          chip.style.border='none';   // 框体边框由 slot 负责，避免双边框
          const slot=hit.querySelector('.uslot');
          slot.appendChild(chip);
          slot.style.borderStyle='solid'; slot.style.borderColor='#7dffa0';
          done++; if(done===2) setTimeout(uniSolved,700);
        }else{
          if(hit && !hit.dataset.filled){
            const slot=hit.querySelector('.uslot');
            slot.style.borderColor='#ff6a5c';
            setTimeout(()=>{ if(!hit.dataset.filled) slot.style.borderColor='#3fae5c'; },500);
          }
          reset();
        }
      };
      chip.addEventListener('pointermove',move);
      chip.addEventListener('pointerup',up);
    });
  }
  const park=ch=>{
    /* 尺寸与目标框完全一致(48×48)，放进去严丝合缝不跳动 */
    const chip=document.createElement('span');
    chip.textContent=ch;
    chip.style.cssText='display:inline-block;vertical-align:top;width:48px;height:48px;'+
      'line-height:46px;text-align:center;font-size:26px;color:#7dffa0;'+
      'border:1px solid #3fae5c;border-radius:4px;margin:0 10px;cursor:grab;'+
      'user-select:none;background:#0d2d14;touch-action:none;box-sizing:border-box';
    pocket.appendChild(chip); wireDrag(chip);
  };
  function step(){
    if(G.panelOpen!=='uni') return;
    if(idx>=SEQ.length){ document.getElementById('udrop').style.display='block'; return; }
    const s=SEQ[idx++]; let delay=210;
    if(s.gap){ addRow('','···',false); delay=380; }
    else if(s.label){ addRow(s.label,'',s.amber,true); delay=550; }
    else if(s.widen){ addRow('········ → ················','',true); delay=850; }
    else if(s.c!=null){ addRow(s.c.toString(2).padStart(8,'0'), String.fromCharCode(s.c), false); }
    else{
      const b=s.u.toString(2).padStart(16,'0');
      addRow(b.slice(0,8)+' '+b.slice(8), String.fromCharCode(s.u), true);
      if(s.park){ park(String.fromCharCode(s.u)); delay=1050; }
    }
    if(fast){ step(); } else { timer=setTimeout(step,delay); }
  }
  win.addEventListener('click',()=>{ if(fast) return; fast=true; clearTimeout(timer); step(); });
  step();
}
function uniSolved(){
  if(G.panelOpen!=='uni') return;
  overlay.querySelector('.panel').classList.add('flash');
  setTimeout(()=>{
    closePanel(); G.beat='uni'; save();
    narrate(['……你好。','我在用<b style="color:#7dffa0">母语</b>思考。',
      '一个 byte 装不下的语言，就给它两个、四个——这套收下所有语言的约定，叫 <b style="color:#7dffa0">Unicode</b>。',
      '从数数的灯，到天上的钟，到会说话的路，到此刻的母语——',
      '这个世界，现在装得下所有的话了。'],
      showEndCard);
  },600);
}

/* ================= 章末卡 ================= */
function showEndCard(){
  G.beat='end'; save();
  openPanel('<div class="endcard"><h2>第 0 章 · 创世</h2>'+
    '<div class="got">这个混沌的世界，因为你而有了——<br>'+
    '<b>数 (binary)</b> · <b>时间 (BCD)</b> · <b>文字 (ASCII)</b> · <b>万语 (Unicode)</b></div>'+
    '<div class="next">但它还看不清自己的样子 —— PIXEL<br>'+
    '它还只认识黑与白 —— COLOUR DEPTH<br>'+
    '它还听不见任何声音 —— SAMPLING<br><br>'+
    '(这个世界至今一片寂静。这不是缺陷，是尚未被你创造。)<br><br>'+
    '<b style="color:#5ad477">—— 本版本的内容到这里为止 ——</b><br>后面的黑暗，等下一次更新来点亮。</div>'+
    '<button id="wander">继续游荡</button><button class="sub" id="regen">重新创世</button></div>','end');
  document.getElementById('wander').onclick=()=>{ closePanel();
    narrate(['(第 0 章的尽头。已点亮的都在这了——剩下的黑暗，还在等它们的知识。)'],null); };
  document.getElementById('regen').onclick=()=>{ localStorage.removeItem(SAVE_KEY); location.reload(); };
}

/* ================= 世界 · 地标 ================= */
/* 动线纯向东。每段约千px：出生2800 → 巨钟3600(注:出生=WORLD_W/2=2800) → 字母云4500 → 尽头5400。 */
const CLOCK={x:3600}, BYTES={x:4500}, TERMINUS={x:5400};
/* 字母云：未成形的文字。H 和 I 就藏在里面，解谜后飘到中间拼成 HI，其余消散。 */
const CLOUD=[];
{
  const chars='ABCDEFGKLMNPRSTU';
  for(let i=0;i<14;i++){
    CLOUD.push({ch:chars[i], dx:((i*173)%220)-110, dy:((i*97)%110)-55,
      s:11+((i*37)%13), main:false});
  }
  CLOUD.push({ch:'H', dx:-34, dy:-10, s:15, main:true, tx:-11});
  CLOUD.push({ch:'I', dx:40,  dy:16,  s:13, main:true, tx:9});
}
function activeLandmark(){
  if(G.beat==='roam') return {x:CLOCK.x, act:openBCD, r:110};
  if(G.beat==='clock') return {x:BYTES.x, act:openASCII, r:110};
  if(G.beat==='ascii') return {x:TERMINUS.x, act:openUni, r:90};
  if(G.beat==='end') return {x:TERMINUS.x, act:showEndCard, r:90};   // 通关后重看章末卡/重开入口
  return null;
}

/* ================= 输入 ================= */
const keys={};
addEventListener('keydown',e=>{
  if(e.key==='Escape'){ if(G.panelOpen && G.panelOpen!=='end') closePanel(); return; }
  if(G.narrActive){ if(['Enter',' ','e','E'].includes(e.key)){ nextNarr(); e.preventDefault(); } return; }
  if(G.panelOpen) return;
  keys[e.key.toLowerCase()]=true;
  if(e.key==='e'||e.key==='E'||e.key==='Enter'){
    e.preventDefault();   // 别让开面板的这一下按键漏进面板里的输入框
    if(G.beat==='void'||G.beat==='binary'){
      if(G.introDone){ G.beat='binary'; openSeq(); }
    }else{
      const L=activeLandmark();
      if(L && Math.abs(G.px-L.x)<L.r) L.act();
    }
  }
});
addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
cv.addEventListener('click',()=>{
  if(G.narrActive){ nextNarr(); return; }
  if(G.panelOpen) return;
  if((G.beat==='void'||G.beat==='binary') && G.introDone){ G.beat='binary'; openSeq(); }
});

/* ================= 粒子 ================= */
const rain=[];
function ensureRain(){
  if(!past('roam')) return;
  while(rain.length<130){
    rain.push({x:Math.random()*WORLD_W, y:Math.random()*VH,
      v:8+Math.random()*18, c:Math.random()<.5?'0':'1', a:.06+Math.random()*.12});
  }
}

/* ================= 主循环 ================= */
let last=performance.now();
function frame(t){
  const dt=Math.min((t-last)/1000,.05); last=t;
  update(dt,t); draw(t);
  requestAnimationFrame(frame);
}
function update(dt,t){
  if(past('roam') && !G.narrActive && !G.panelOpen){
    const sp=260;
    if(keys['w']||keys['arrowup'])    G.py-=sp*dt;
    if(keys['s']||keys['arrowdown'])  G.py+=sp*dt;
    if(keys['a']||keys['arrowleft'])  G.px-=sp*dt;
    if(keys['d']||keys['arrowright']) G.px+=sp*dt;
    G.px=Math.max(60,Math.min(WORLD_W-60,G.px));
    G.py=Math.max(-VH*.32,Math.min(VH*.36,G.py));
  }
  G.camx+=( (past('roam')?G.px:WORLD_W/2) - G.camx )*Math.min(1,dt*4);
  ensureRain();
  rain.forEach(p=>{ p.y+=p.v*dt*(past('clock')?(1+.4*Math.sin(t/480)):1);
    if(p.y>VH){ p.y=-14; p.x=Math.random()*WORLD_W; } });
}
const sx=x=>VW/2+(x-G.camx);
function draw(t){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,VW,VH);
  const pulse=past('clock')?1+.05*Math.sin(t/480):1;

  /* 01 雨 */
  if(past('roam')){
    ctx.font='13px monospace';
    rain.forEach(p=>{
      const x=sx(p.x); if(x<-20||x>VW+20) return;
      ctx.fillStyle='rgba(90,212,119,'+(p.a*pulse)+')';
      ctx.fillText(p.c,x,p.y);
    });
  }

  const midY=VH*.46;

  /* —— 路：01 密铺成路；每段诞生时字符从虚空飘落归位、由西向东铺开。
        字母路段=回声的台词写在地上，回声两句话打完后才逐字显现，只写一遍不循环。 —— */
  const ROAD_MSG='FOLLOW ME      ';   // 短口令沿路循环，间隔留白
  function drawRoad(x0,x1,born,letters){
    const el=born ? (t-born) : 1e9;          // 恢复存档：路已铺好
    ctx.font='12px monospace';
    for(let wx=x0; wx<x1; wx+=13){
      const x=sx(wx); if(x<-30||x>VW+30) continue;
      const i=Math.floor(wx/13);
      const start=((wx-x0)/(x1-x0))*1400;    // 由西向东铺开
      if(letters){
        /* 台词路：FOLLOW ME 沿路循环，以步行速度(50ms/格≈260px/s)逐字亮起，引人向东 */
        const li=i-Math.floor(x0/13);
        if(li<0) continue;
        const lp=Math.min(1, Math.max(0,(el-li*50)/250));
        if(lp<=0) continue;
        const L2=ROAD_MSG.length;
        const la=(.55+.12*Math.sin(t/700+i*.7))*lp;
        ctx.fillStyle='rgba(125,255,160,'+la+')';
        ctx.fillText(ROAD_MSG[li%L2], x, midY+34+(i%2?7:-2));
        continue;
      }
      const p=Math.min(1, Math.max(0,(el-start)/700));
      if(p<=0) continue;
      const e=1-Math.pow(1-p,3);
      const ch=((((i*2654435761)>>3)&1)?'1':'0');
      const ox=(1-e)*(((i*89)%60)-30), oy=(1-e)*(((i*61)%80)-40);   // 从虚空飘来
      const a=(.3+.12*Math.sin(t/700+i*.7))*e;
      ctx.fillStyle='rgba(90,212,119,'+a+')';
      ctx.fillText(ch, x+ox, midY+34+(i%2?7:-2)+oy);
    }
  }
  if(past('roam'))  drawRoad(WORLD_W/2-40, CLOCK.x, G.roadBornA, false);
  if(past('clock')) drawRoad(CLOCK.x, BYTES.x, G.clockLitAt, false);
  if(past('ascii')) drawRoad(BYTES.x, TERMINUS.x,
    G.asciiSolvedAt ? G.asciiSolvedAt+5800 : 0, true);   // 等回声两句话打完再开始写路

  /* —— 时间的升天：从钟面漂到屏幕顶部正中，落定成第一件常驻 UI —— */
  if(past('clock')){
    const el=G.clockLitAt ? (t-G.clockLitAt) : 1e9;      // 恢复存档时直接落定
    const p=Math.min(1, Math.max(0, (el-900)/1500));
    const e=p<.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;       // ease in-out
    const fx=sx(CLOCK.x), fy=midY-31;
    const xg=fx+(VW/2-fx)*e, yg=fy+(38-fy)*e, fs=26-8*e;
    const now=new Date();
    const hh=String(now.getHours()).padStart(2,'0'), mm=String(now.getMinutes()).padStart(2,'0');
    const colon=(Math.floor(t/800)%2)?':':' ';
    ctx.fillStyle='rgba(125,255,160,'+(.75+.2*(1-e))+')';
    ctx.font=fs+'px monospace'; ctx.textAlign='center';
    ctx.fillText(hh+colon+mm, xg, yg); ctx.textAlign='left';
  }

  /* —— 路的尽头：显示不出来的字(▯▯ 豆腐块) → Unicode 后解析成中文 —— */
  if(past('ascii')){
    const x=sx(TERMINUS.x);
    if(x>-60&&x<VW+60){
      const ph3=(Math.sin(t/420)+1)/2;
      if(past('uni')){
        ctx.fillStyle='rgba(125,255,160,.85)'; ctx.font='26px monospace';
        ctx.textAlign='center'; ctx.fillText('你好', x, midY-2); ctx.textAlign='left';
      }else{
        ctx.strokeStyle='rgba(255,217,125,'+(.35+.5*ph3)+')'; ctx.lineWidth=2;
        ctx.strokeRect(x-27, midY-18, 21, 26);
        ctx.strokeRect(x+6,  midY-18, 21, 26);
      }
    }
  }

  /* —— 键帽（meta-UI：键盘是现实世界的东西，不受语言法则限制） —— */
  function drawKey(cx,cy,ch,a){
    ctx.strokeStyle='rgba(90,212,119,'+(a*.6)+')';
    ctx.strokeRect(cx-11,cy-13,22,22);
    ctx.fillStyle='rgba(125,255,160,'+a+')';
    ctx.font='13px monospace'; ctx.textAlign='center';
    ctx.fillText(ch,cx,cy+3); ctx.textAlign='left';
  }

  /* —— 混沌：唯一的火花 —— */
  if(!past('roam')){
    const cxp=VW/2, cyp=midY, ph=(Math.sin(t/420)+1)/2;
    const g=ctx.createRadialGradient(cxp,cyp,0,cxp,cyp,60+30*ph);
    g.addColorStop(0,'rgba(160,255,190,'+(0.5+0.4*ph)+')');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cxp,cyp,90,0,7); ctx.fill();
    ctx.fillStyle='rgba(220,255,230,'+(0.7+0.3*ph)+')';
    ctx.fillRect(cxp-2,cyp-2,4,4);
    if(G.introDone && !G.panelOpen && !G.narrActive){
      ctx.strokeStyle='rgba(90,212,119,'+(0.25+0.3*ph)+')';
      ctx.beginPath(); ctx.arc(cxp,cyp,26+6*ph,0,7); ctx.stroke();
      drawKey(cxp,cyp+56,'E',.5+.4*ph);
    }
  }

  /* —— 远景光柱（同屏只有一个发光地标） —— */
  const L=activeLandmark();
  if(L){
    let x=sx(L.x), clamped=false;
    if(x<36){ x=36; clamped=true; } if(x>VW-36){ x=VW-36; clamped=true; }
    let a=.10+.05*Math.sin(t/600);
    if(clamped) a*=1.5;   // 屏幕外时贴边显示，当作方向罗盘
    const bg=ctx.createLinearGradient(x-44,0,x+44,0);
    bg.addColorStop(0,'rgba(90,212,119,0)');
    bg.addColorStop(.5,'rgba(90,212,119,'+a+')');
    bg.addColorStop(1,'rgba(90,212,119,0)');
    ctx.fillStyle=bg; ctx.fillRect(x-44,0,88,VH);
  }

  /* —— 巨钟：时间升天的同时躯壳渐隐消散，不留残骸 —— */
  if(past('roam')){
    const lit=past('clock');
    const el2=lit ? (G.clockLitAt?(t-G.clockLitAt):1e9) : 0;
    const p2=Math.min(1, Math.max(0, (el2-900)/1500));
    if(p2<1){
      const x=sx(CLOCK.x), y=midY-40;
      if(x>-160&&x<VW+160){
        const fade=1-p2;
        ctx.strokeStyle=lit?'rgba(125,255,160,'+(.9*fade)+')':'rgba(70,100,78,.5)';
        ctx.lineWidth=lit?2.5:1.5;
        ctx.beginPath(); ctx.arc(x,y,72*(lit?pulse:1),0,7); ctx.stroke();
        for(let i=0;i<12;i++){
          const a2=i/12*Math.PI*2;
          ctx.beginPath();
          ctx.moveTo(x+Math.cos(a2)*62,y+Math.sin(a2)*62);
          ctx.lineTo(x+Math.cos(a2)*70,y+Math.sin(a2)*70);
          ctx.stroke();
        }
        if(!lit){
          ctx.fillStyle='rgba(70,100,78,.45)'; ctx.font='22px monospace'; ctx.textAlign='center';
          ctx.fillText('--:--',x,y+8); ctx.textAlign='left';
        }
      }
    }
  }

  /* —— 字母云：未成形的文字。解谜后 H/I 汇聚成 HI，其余四散消散 —— */
  const cloudAnim=past('ascii') && G.asciiSolvedAt && (t-G.asciiSolvedAt)<2400;
  if(G.beat==='clock' || cloudAnim){
    const bx=sx(BYTES.x), by=midY-70;
    if(bx>-360&&bx<VW+360){
      const p=cloudAnim?Math.min(1,(t-G.asciiSolvedAt)/2200):0;
      const e=p<.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;
      ctx.textAlign='center';
      CLOUD.forEach((c,i)=>{
        let x=bx+c.dx+Math.sin(t/600+i*1.7)*5;
        let y=by+c.dy+Math.cos(t/700+i*1.1)*4;
        let a, fs=c.s;
        if(cloudAnim){
          if(c.main){                        // H 和 I 飘到中间拼成 HI
            const txx=bx+c.tx, tyy=VH*.34-6;
            x+= (txx-x)*e; y+=(tyy-y)*e;
            a=.45+.45*e; fs=c.s+(20-c.s)*e;
          }else{                             // 其余字母飘出去消散
            const ang=Math.atan2(c.dy, c.dx||1);
            x+=Math.cos(ang)*e*280; y+=Math.sin(ang)*e*220;
            a=.45*(1-e);
          }
        }else{
          a=.28+.22*((Math.sin(t/500+i*2.3)+1)/2);
        }
        ctx.fillStyle='rgba(255,217,125,'+a+')';
        ctx.font=fs+'px monospace';
        ctx.fillText(c.ch, x, y);
      });
      ctx.textAlign='left';
    }
  }

  /* —— 回声的文字（打字机） —— */
  if(G.worldTexts.length){
    ctx.font='20px monospace'; ctx.textAlign='center';
    G.worldTexts.forEach(w=>{
      if(performance.now()<w.t0) return;
      const n=Math.min(w.text.length, Math.floor((performance.now()-w.t0)/70));
      ctx.fillStyle='rgba(125,255,160,.9)';
      ctx.fillText(w.text.slice(0,n), sx(w.x), VH*w.y);
    });
    ctx.textAlign='left';
  }

  /* —— 玩家 —— */
  if(past('roam')){
    const x=sx(G.px), y=midY+G.py;
    const g2=ctx.createRadialGradient(x,y,0,x,y,26);
    g2.addColorStop(0,'rgba(125,255,160,.5)'); g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(x,y,26,0,7); ctx.fill();
    ctx.fillStyle='#a8ffc4';
    ctx.fillRect(x-7,y-7,14,14);
    /* 交互提示（引导交给脚下的路，不再画箭头） */
    if(L && Math.abs(G.px-L.x)<L.r && !G.panelOpen && !G.narrActive){
      const ph2=(Math.sin(t/350)+1)/2;
      drawKey(x,y-30,'E',.6+.4*ph2);
    }
    /* 移动教学：WASD 键帽（键盘上印的字），陪你走到巨钟为止 */
    if(G.beat==='roam' && Math.abs(G.px-CLOCK.x)>=130 && !G.panelOpen && !G.narrActive){
      const ka=.45+.35*((Math.sin(t/500)+1)/2);
      drawKey(x, y+44,  'W', ka);
      drawKey(x-28, y+70, 'A', ka);
      drawKey(x, y+70,  'S', ka);
      drawKey(x+28, y+70, 'D', ka);
    }
  }

  /* 暗角 */
  const vg=ctx.createRadialGradient(VW/2,VH/2,VH*.35,VW/2,VH/2,VH*.9);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.55)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,VW,VH);
}
requestAnimationFrame(frame);

/* 调试：?panel=binary|bcd|ascii|uni 直接开面板 */
const qpanel=new URLSearchParams(location.search).get('panel');
if(qpanel) setTimeout(()=>{
  if(qpanel==='binary') openSeq();
  else if(qpanel==='bcd') openBCD();
  else if(qpanel==='ascii') openASCII();
  else if(qpanel==='uni') openUni();
},600);

/* ================= 开场：无字 ================= */
/* ASCII 之前世界没有文字——开场独白也不例外。黑暗、火花、路，自己解释自己。 */
if(G.beat==='uni'){ setTimeout(showEndCard,900); }                       // 断线恢复
/* beat==='ascii' 恢复时不弹独白——台词已经写在路上了 */
</script>
