div>':'')+'<div class="actions">'+(ok?'<button class="btn" id="nextChapter">NEXT · N4</button>':'')+(S.stage==='evidence_retry'?'<button class="btn" id="retryEvidence">RETRY EVIDENCE</button>':'')+'<button class="btn sub" id="replay">REPLAY CHAPTER</button><button class="btn sub" id="retryCheckpoint">RETRY CHECKPOINT</button><button class="btn sub" id="evidenceMap">COURSE MAP</button></div>',liveInvoker(source,$('openEvidence'),document.activeElement,$('guideBtn')));if($('nextChapter'))$('nextChapter').onclick=()=>location.href='course-map.html';if($('retryEvidence'))$('retryEvidence').onclick=retryEvidence;$('replay').onclick=replayChapter;$('retryCheckpoint').onclick=()=>{if(ALREADY_PASSED)replayRetained=true;closeOverlay(false);beginCheckpoint()};$('evidenceMap').onclick=()=>location.href='course-map.html'}

function prepareDebug(stage){S=defaultState();S.stage=STAGES.includes(stage)?stage:'checkpoint_p1';const stages=['checkpoint_p1','checkpoint_p2','checkpoint_p3','checkpoint_p4','checkpoint_p5'],index=stages.indexOf(S.stage);for(let cursor=0;cursor<index;cursor++){const taskNow=TASKS[stages[cursor]];S.checkpointAnswers[taskNow.id]=Object.assign({id:taskNow.id},taskNow.expected)}}
function runTests(){const results=[],assert=(value,id)=>{results.push({id,passed:Boolean(value)});console.assert(value,id)};assert(isNormalLanInfrastructureRoute('','')&&isNormalLanInfrastructureRoute('?from=course-map',''),'R01 canonical routes');for(const search of ['?test','?debug','?stage=x','?scene=x','?from=course-map&x=1','?from=course-map&from=course-map','?unknown'])assert(!isNormalLanInfrastructureRoute(search,''),'R02 reject '+search);assert(!isNormalLanInfrastructureRoute('','#x'),'R03 reject hash');const exact={answerSetVersion:1,validationContract:VALIDATION_CONTRACT,tasks:EXPECTED_LAN_INFRASTRUCTURE_CHECKPOINT.map((expected,index)=>Object.assign({id:expected.id},TASKS['checkpoint_p'+(index+1)].expected))};assert(judgeLanInfrastructureCheckpoint(exact).passed&&judgeLanInfrastructureCheckpoint(exact).score===5,'J01 exact 5/5');const wrong=clone(exact);wrong.tasks[4].role='SWITCH';assert(!judgeLanInfrastructureCheckpoint(wrong).passed,'J02 invalid P5');const extra=clone(exact);extra.tasks[0].extra=true;assert(!judgeLanInfrastructureCheckpoint(extra).passed,'J03 extra task field');const extraTop=clone(exact);extraTop.extra=true;assert(!judgeLanInfrastructureCheckpoint(extraTop).passed,'J04 extra envelope field');const reordered=clone(exact);reordered.tasks.reverse();assert(!judgeLanInfrastructureCheckpoint(reordered).passed,'J05 reordered parts');const map=fullCloudMediaMap(),storage=memoryStorage({[COURSE_KEY]:JSON.stringify(map)}),runtime={phase:'CHECKPOINT',stage:'checkpoint_p5',inputSource:'PLAYER_VERIFY',search:'',hash:'',usedSafetyNet:false,attempts:1};assert(commitLanInfrastructureEvidence(exact,runtime,storage,100),'E01 transactional commit');const saved=JSON.parse(storage.getItem(COURSE_KEY));assert(lanInfrastructurePassed(saved),'E02 strict predicate');assert(saved.unknown.keep.value===42,'E03 unknown fields');assert(saved.nodeEvidence[NODE_ID].passedAt===100&&saved.nodeEvidence[NODE_ID].sectionProgress==='PARTIAL','E04 timestamp and partial');assert(storage.stats.keys.filter(key=>key===COURSE_KEY).length===1,'E05 one candidate write');const replay=memoryStorage({[COURSE_KEY]:JSON.stringify(saved)});assert(commitLanInfrastructureEvidence(exact,Object.assign({},runtime,{attempts:2}),replay,200),'E06 strict replay');const replayed=JSON.parse(replay.getItem(COURSE_KEY));assert(replayed.nodeEvidence[NODE_ID].passedAt===100&&replayed.nodeEvidence[NODE_ID].lastPassedAt===200,'E07 replay timestamps');const corrupt=memoryStorage({[COURSE_KEY]:JSON.stringify(map)},{corruptAfterWrite:COURSE_KEY});assert(!commitLanInfrastructureEvidence(exact,runtime,corrupt,100),'E08 corrupt readback fails');assert(corrupt.data.get(COURSE_KEY)===JSON.stringify(map)&&commitFailureCode==='RESTORED','E09 exact rollback');const rollbackFailure=memoryStorage({[COURSE_KEY]:JSON.stringify(map)},{corruptAfterWrite:COURSE_KEY,failSetAt:2});assert(!commitLanInfrastructureEvidence(exact,runtime,rollbackFailure,100)&&commitFailureCode==='ROLLBACK_FAILED','E10 rollback failure explicit');const invalid=memoryStorage({[COURSE_KEY]:JSON.stringify(map)});assert(!commitLanInfrastructureEvidence(exact,Object.assign({},runtime,{search:'?test'}),invalid,100)&&invalid.stats.writes===0,'E11 non-canonical no write');const noPredecessor=memoryStorage({[COURSE_KEY]:JSON.stringify({version:1,nodes:{},nodeEvidence:{}})});assert(!commitLanInfrastructureEvidence(exact,runtime,noPredecessor,100)&&noPredecessor.stats.writes===0,'E12 predecessor required');assert(FACT_NAMES.length===9&&new Set(FACT_NAMES).size===9,'S01 nine exact facts');assert(OFFICIAL_LAN_SUPPORT_HARDWARE.length===8&&new Set(OFFICIAL_LAN_SUPPORT_HARDWARE).size===8,'S02 eight official items');assert(['G1','G2','G3','G4'].every(id=>Object.values(TASKS).some(item=>item.id===id)),'S03 guided complete');assert(['A1','A2','A3','A4'].every(id=>Object.values(TASKS).some(item=>item.id===id)),'S04 apply complete');assert(Object.keys(TASKS).filter(key=>key.startsWith('checkpoint_')).length===5,'S05 five fixed parts');assert(documentFlow()===((innerWidth<=760)||(innerHeight<=640)),'S06 responsive union');const cleanRun={contentId:CONTENT_ID,checkpointId:EVIDENCE_ID,answerSetVersion:ANSWER_SET_VERSION,validationContract:VALIDATION_CONTRACT,sec:1,hints:0,errors:0,passedAt:1};assert(currentRankedRun(cleanRun)&&!currentRankedRun({sec:1,hints:0,errors:0,passedAt:1})&&!currentRankedRun(Object.assign({},cleanRun,{studentName:'POISON',checkpointAnswers:{P1:'SECRET'}})),'S07 ranked runs require exact formal identity and exact fields');window.__chapter7TestResults={passed:results.every(result=>result.passed),count:results.length,failed:results.filter(result=>!result.passed),results};document.documentElement.dataset.testPassed=String(window.__chapter7TestResults.passed);document.documentElement.dataset.testCount=String(results.length);console.info('[CHAPTER7 LAN INFRASTRUCTURE TEST]',window.__chapter7TestResults)}

addEventListener('keydown',event=>{if($('overlay').classList.contains('open')){if(event.key==='Escape'){event.preventDefault();event.stopImmediatePropagation();dismissOverlay();return}if(event.key==='Tab'){const list=focusables();if(!list.length){event.preventDefault();$('panel').focus();return}const first=list[0],last=list[list.length-1];if(document.activeElement===$('panel')){event.preventDefault();(event.shiftKey?last:first).focus()}else if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus()}else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus()}}return}const target=event.target;if(target&&['BUTTON','INPUT','SELECT','TEXTAREA'].includes(target.tagName)&&(event.key==='Enter'||event.key===' '))return;const key=event.key.toLowerCase();if(key==='h'){event.preventDefault();hint()}else if(key==='g'){event.preventDefault();showGuide('game')}else if(key==='r'){event.preventDefault();showReference()}else if(key==='arrowleft'||key==='a'){event.preventDefault();cycleChoice(-1)}else if(key==='arrowright'||key==='d'){event.preventDefault();cycleChoice(1)}else if(key==='arrowup'||key==='w'){const taskNow=currentTask();if(taskNow){event.preventDefault();S.activeField=Math.max(0,S.activeField-1);render()}}else if(key==='arrowdown'||key==='s'){const taskNow=currentTask();if(taskNow){event.preventDefault();S.activeField=Math.min(taskNow.fields.length-1,S.activeField+1);render()}}else if((event.key==='Enter'||key==='e')&&currentTask()){event.preventDefault();verifyTask()}});
