'use strict';
const SAVE='genesis_ch4_compression_v1',RECORDS='genesis_ch4_compression_records_v1',COURSE_KEY='genesis_course_map_v1',CAPACITY=64,RAW_TOTAL=144;
const stages=['overflow','compare','text','bitmap','vector','sound','manifest','restore_audit','archive','dispatch','end'];
const FILES=['text','bitmap','vector','sound'],RLE_RECALL=['B','B','B','B','G','G','G','G'],TEXT_SOURCE='NETWORKNETWORKNETWORKNETWORK';
const BITMAP_ROWS=['00001111','00001111','00001111','00001111'];

const METHOD_LABEL={RAW:'RAW',DICTIONARY:'DICTIONARY',RLE:'RLE',PALETTE_MERGE_ROW_RLE:'PALETTE_MERGE + ROW RLE',RAW_LIST:'RAW LIST',SHARED_INSTANCE:'SHARED INSTANCE',QUANTISE_PROPERTIES:'QUANTISE PROPERTIES',RAW_SAMPLES:'RAW SAMPLES',LOSSLESS_PATTERN:'LOSSLESS PATTERN',LOSSY_QUANTISE:'LOSSY QUANTISE'};
const REQUIRED_OBSERVE={text:['RAW','DICTIONARY'],bitmap:['RLE','PALETTE_MERGE_ROW_RLE'],vector:['SHARED_INSTANCE','QUANTISE_PROPERTIES'],sound:['LOSSLESS_PATTERN','LOSSY_QUANTISE']};
const CUSTOM_METHODS=new Set(['DICTIONARY','PALETTE_MERGE_ROW_RLE','SHARED_INSTANCE','QUANTISE_PROPERTIES','LOSSLESS_PATTERN','LOSSY_QUANTISE']);
const ARCHIVE_ITEMS=[
  {id:'xray',name:'诊断 X-ray',lane:'LOSSLESS',reason:'诊断细节必须精确保留。'},
  {id:'selfie',name:'社交媒体自拍',lane:'LOSSY',reason:'近似外观可接受，较小文件更重要。'},
  {id:'masterTape',name:'concert master',lane:'LOSSLESS',reason:'永久 master 必须保留完整原始信息。'},
  {id:'streamMix',name:'background stream',lane:'LOSSY',reason:'听感达标即可，传输大小重要。'},

  {id:'wallpaper',name:'模糊 wallpaper',lane:'LOSSY',reason:'不会近看，close-enough 可接受。'}
];
function same(a,b){return JSON.stringify(a)===JSON.stringify(b)}
function fail(code,note){return{ok:false,code,note}}
function rleEncode(values){if(!Array.isArray(values))return fail('TYPE','values must be an array');const runs=[];for(const value of values){if(runs.length&&same(runs[runs.length-1][1],value))runs[runs.length-1][0]++;else runs.push([1,value])}return{ok:true,runs,size:runs.length*2}}
function rleDecode(runs){if(!Array.isArray(runs))return fail('TYPE','runs must be an array');const out=[];for(const run of runs){if(!Array.isArray(run)||run.length!==2||!Number.isInteger(run[0])||run[0]<=0||run[1]===undefined)return fail('INVALID_RUN','count must be a positive integer and value must exist');for(let i=0;i<run[0];i++)out.push(run[1])}return{ok:true,data:out}}
function encodeTextDictionary(source){if(typeof source!=='string')return fail('TYPE','source must be text');const definition='NETWORK';if(source!==definition.repeat(4))return fail('PATTERN','fixture requires four equal tokens');return{ok:true,definition,id:1,refs:[1,1,1,1],header:'DICT',size:13}}
function decodeTextDictionary(encoded){if(!encoded||typeof encoded.definition!=='string'||!Array.isArray(encoded.refs)||encoded.id===undefined)return fail('INVALID_DICTIONARY','definition or refs missing');if(encoded.refs.some(r=>r!==encoded.id))return fail('UNKNOWN_REF','dictionary reference not found');return{ok:true,data:encoded.refs.map(()=>encoded.definition).join('')}}
function encodeVectorInstances(objects){if(!Array.isArray(objects)||objects.length!==4)return fail('TYPE','four vector objects required');const first=objects[0],shared={r:first.r,fill:first.fill,stroke:first.stroke};if(objects.some(o=>!o||o.r!==shared.r||o.fill!==shared.fill||o.stroke!==shared.stroke))return fail('NOT_SHARED','properties are not shared');return{ok:true,shared,placements:objects.map(o=>({x:o.x,y:o.y})),size:12}}
function decodeVectorInstances(encoded){if(!encoded||!encoded.shared||!Array.isArray(encoded.placements)||encoded.placements.length!==4)return fail('DANGLING_REF','shared definition or placement missing');const s=encoded.shared;if(!['r','fill','stroke'].every(k=>s[k]!==undefined))return fail('DANGLING_REF','shared property missing');return{ok:true,data:encoded.placements.map(p=>({x:p.x,y:p.y,r:s.r,fill:s.fill,stroke:s.stroke}))}}
function soundQuantise(values){return values.map(v=>Math.round(v*2)/2)}
function evaluateMethod(fileId,methodId){if(!METHOD_IDS[fileId]||!METHOD_IDS[fileId].includes(methodId))return fail('UNKNOWN_METHOD','unknown file or method');let size=0,restored=null,quality=100,note='',representation=null;if(fileId==='text'){if(methodId==='RAW'){size=28;restored=TEXT_SOURCE;representation=TEXT_SOURCE;note='Original characters stored.'}else{const e=encodeTextDictionary(TEXT_SOURCE),d=decodeTextDictionary(e);if(!e.ok||!d.ok)return fail('ENCODE','dictionary failed');size=e.size;restored=d.data;representation=e;note='Repeated token stored once; short references reuse it.'}return{ok:true,size,exact:restored===TEXT_SOURCE,quality,restored,representation,note}}
if(fileId==='bitmap'){if(methodId==='RAW'){size=32;restored=BITMAP_ROWS.slice();representation=BITMAP_ROWS.slice();note='32 pixel values stored.'}else if(methodId==='RLE'){const allRuns=[],rows=[];for(const row of BITMAP_ROWS){const e=rleEncode(row.split('')),d=e.ok?rleDecode(e.runs):e;if(!e.ok||!d.ok)return fail('ENCODE','bitmap RLE failed');allRuns.push(e.runs);rows.push(d.data.join(''))}size=16;restored=rows;representation=allRuns;note='Eight runs × two units; exact boundary restored.'}else{size=8;restored=BITMAP_ROWS.map(()=> 'MMMMMMMM');representation=restored.map(()=>[[8,'M']]);quality=62;note='0/1 merge first, then one [8,M] run per row; boundary is lost.'}return{ok:true,size,exact:same(restored,BITMAP_ROWS),quality,restored,representation,note}}
if(fileId==='vector'){if(methodId==='RAW_LIST'){size=20;restored=VECTOR_OBJECTS.map(o=>Object.assign({},o));representation=restored;note='Every object stores five fields.'}else if(methodId==='SHARED_INSTANCE'){const e=encodeVectorInstances(VECTOR_OBJECTS),d=decodeVectorInstances(e);if(!e.ok||!d.ok)return fail('ENCODE','shared instance failed');size=e.size;restored=d.data;representation=e;note='Shared properties stored once; placements remain independent.'}else{size=8;restored=VECTOR_OBJECTS.map(o=>({x:Math.round(o.x/4)*4,y:Math.round(o.y/4)*4,r:Math.max(1,Math.round(o.r/3)*3),fill:o.fill,stroke:o.stroke}));representation=restored;quality=82;note='Coordinates and radius quantised; object properties change.'}return{ok:true,size,exact:same(restored,VECTOR_OBJECTS),quality,restored,representation,note}}
if(methodId==='RAW_SAMPLES'){size=64;restored=SOUND_SOURCE.slice();representation=restored;note='All sample units stored.'}else if(methodId==='LOSSLESS_PATTERN'){size=40;restored=SOUND_SOURCE.slice();representation={motif:SOUND_MOTIF.slice(),repeats:4};note='Predictable pattern and differences restore every sample.'}else{size=20;restored=soundQuantise(SOUND_SOURCE);representation=restored;quality=88;note='Amplitude levels quantised; fixed scenario fidelity remains above 80.'}return{ok:true,size,exact:same(restored,SOUND_SOURCE),quality,restored,representation,note}}
function validateContract(fileId,result){if(!result||!result.ok)return{ok:false,reason:'METHOD'};if(['text','bitmap','vector'].includes(fileId)&&!result.exact)return{ok:false,reason:fileId==='bitmap'?'COLLISION MASK MUST REMAIN EXACT':fileId==='vector'?'EDITABLE MASTER MUST REMAIN EXACT':'TEXT MUST REMAIN EXACT'};if(fileId==='sound'&&result.quality<80)return{ok:false,reason:'SCENARIO FIDELITY BELOW 80'};return{ok:true,reason:null}}
function manifestTotal(selection){let total=0;for(const f of FILES){const r=evaluateMethod(f,selection&&selection[f]);if(!r.ok)return fail('METHOD','invalid manifest selection');total+=r.size}return{ok:true,total}}
function validateManifest(selection){const diagnostics=[];for(const f of FILES){const result=evaluateMethod(f,selection&&selection[f]),contract=validateContract(f,result);diagnostics.push({file:f,result,contract});if(!contract.ok)return{ok:false,reason:'CONTRACT',file:f,total:null,diagnostics}}const t=manifestTotal(selection);if(!t.ok)return{ok:false,reason:'METHOD',file:null,total:null,diagnostics};if(t.total>CAPACITY)return{ok:false,reason:'CAPACITY',file:null,total:t.total,diagnostics};return{ok:true,reason:null,file:null,total:t.total,diagnostics}}
function judgeArchive(item,lane){const x=typeof item==='string'?ARCHIVE_ITEMS.find(i=>i.id===item):item;if(!x||!['LOSSLESS','LOSSY'].includes(lane))return{ok:false,reason:'UNKNOWN'};return{ok:x.lane===lane,reason:x.lane===lane?x.reason:(x.lane==='LOSSLESS'?'THIS USE MUST REMAIN EXACT':'THIS USE ACCEPTS CLOSE-ENOUGH QUALITY FOR SMALLER SIZE')}}
function scoreArchive(items,choices){if(!Array.isArray(items)||!choices)return{score:0,total:Array.isArray(items)?items.length:0,complete:false};let score=0;for(const item of items)if(choices[item.id]&&judgeArchive(item,choices[item.id]).ok)score++;return{score,total:items.length,complete:score===items.length}}
function rawMethods(){return{text:'RAW',bitmap:'RAW',vector:'RAW_LIST',sound:'RAW_SAMPLES'}}
const cv=document.getElementById('viz'),ctx=cv.getContext('2d'),overlay=document.getElementById('overlay'),panel=document.getElementById('panel'),lab=document.getElementById('lab');
let VW=0,VH=0,dpr=1,toastTimer=0,stageTimer=0,animStart=0,revealAt=0,audioCtx=null;
const S={version:1,stage:'overflow',compareTrack:'lossless',observed:{compare:{lossless:false,lossy:false},text:[],bitmap:[],vector:[],sound:[]},methods:rawMethods(),audit:{text:false,bitmap:false,vector:false,sound:false},archiveChoices:{},archiveIndex:0,archiveLane:'LOSSLESS',hintLevel:{compare:0,text:0,bitmap:0,vector:0,sound:0,manifest:0,archive:0},manifestFile:0,manifestRan:false,lastRun:null,fails:0,methodChanges:0,muted:false,startedAt:Date.now(),recorded:false};
function resize(){dpr=Math.min(2,devicePixelRatio||1);VW=innerWidth;VH=innerHeight;cv.width=VW*dpr;cv.height=VH*dpr;cv.style.width=VW+'px';cv.style.height=VH+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',resize);resize();
function ensureAudio(){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}catch(e){}}
function tone(freq=260,dur=.07,type='square',delay=0){if(S.muted)return;try{ensureAudio();if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=audioCtx.currentTime+delay;o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.04,t+.008);g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur+.02)}catch(e){}}
function restoreSound(exact){[300,400,500,600].forEach((f,i)=>tone(exact?f:(i===2?420:f),.10,exact?'sine':'triangle',i*.07))}
function safeSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}
function cleanObserved(x){const out={compare:{lossless:false,lossy:false},text:[],bitmap:[],vector:[],sound:[]};if(x&&x.compare){out.compare.lossless=x.compare.lossless===true;out.compare.lossy=x.compare.lossy===true}for(const f of FILES)if(Array.isArray(x&&x[f]))out[f]=x[f].filter(m=>METHOD_IDS[f].includes(m)).filter((m,i,a)=>a.indexOf(m)===i);return out}
function save(){safeSet(SAVE,JSON.stringify({version:1,stage:S.stage,compareTrack:S.compareTrack,observed:S.observed,methods:S.methods,audit:S.audit,archiveChoices:S.archiveChoices,archiveIndex:S.archiveIndex,archiveLane:S.archiveLane,hintLevel:S.hintLevel,manifestFile:S.manifestFile,manifestRan:S.manifestRan,lastRun:S.lastRun,fails:S.fails,methodChanges:S.methodChanges,muted:S.muted,startedAt:S.startedAt,recorded:S.recorded}))}
function readCourseMap(){try{const map=JSON.parse(localStorage.getItem(COURSE_KEY)||'null');return map&&map.version===1?map:null}catch(e){return null}}
function courseCheckpointPassed(){const map=readCourseMap(),ch=map&&map.chapters&&map.chapters.ch4;return Boolean(ch&&ch.checkpoint&&ch.checkpoint.passed===true)}
function buildCourseEvidence(existing,now=Date.now()){const previous=existing&&typeof existing==='object'?existing:{},oldCheck=previous.checkpoint&&typeof previous.checkpoint==='object'?previous.checkpoint:{},usedSafetyNet=Object.values(S.hintLevel).some(v=>Number(v)>=3);return Object.assign({},previous,{playthroughSeen:true,phase:'CHECKPOINT',coverage:'EVIDENCED',checkpoint:Object.assign({},oldCheck,{passed:true,scaffolded:Boolean(oldCheck.scaffolded)||usedSafetyNet,attempts:oldCheck.passed?Math.max(1,Number(oldCheck.attempts)||1):(Math.max(0,Number(oldCheck.attempts)||0)+1),passedAt:oldCheck.passedAt||now,lastPassedAt:oldCheck.lastPassedAt||now}),evidence:{needAndUses:true,losslessVsLossy:true,situationJustification:scoreArchive(ARCHIVE_ITEMS,S.archiveChoices).complete,fourFileTypes:true,rle:true}})}
function writeCourseEvidence(){const q=new URLSearchParams(location.search);if(q.has('test')||q.has('stage')||q.has('scene'))return false;if(!validateManifest(S.methods).ok||!Object.values(S.audit).every(Boolean)||!scoreArchive(ARCHIVE_ITEMS,S.archiveChoices).complete)return false;let map=readCourseMap();if(map&&map.chapters&&map.chapters.ch4&&map.chapters.ch4.checkpoint&&map.chapters.ch4.checkpoint.passed===true)return true;if(!map)map={version:1,syllabus:'CAIE 9618 2026',chapters:{},repairs:{},guide:{courseCardSeen:{},accumulatedGuideMs:{}},updatedAt:0};if(!map.chapters||typeof map.chapters!=='object')map.chapters={};map.chapters.ch4=buildCourseEvidence(map.chapters.ch4);map.updatedAt=Date.now();safeSet(COURSE_KEY,JSON.stringify(map));return courseCheckpointPassed()}
function load(){try{const x=JSON.parse(localStorage.getItem(SAVE)||'null');if(!x||x.version!==1||!stages.includes(x.stage))return;S.stage=x.stage;S.compareTrack=['lossless','lossy'].includes(x.compareTrack)?x.compareTrack:'lossless';S.observed=cleanObserved(x.observed);for(const f of FILES)S.methods[f]=METHOD_IDS[f].includes(x.methods&&x.methods[f])?x.methods[f]:rawMethods()[f];for(const f of FILES)S.audit[f]=x.audit&&x.audit[f]===true;S.archiveChoices={};for(const item of ARCHIVE_ITEMS)if(x.archiveChoices&&judgeArchive(item,x.archiveChoices[item.id]).ok)S.archiveChoices[item.id]=x.archiveChoices[item.id];S.archiveIndex=Math.max(0,Math.min(ARCHIVE_ITEMS.length,Number.isInteger(x.archiveIndex)?x.archiveIndex:0));S.archiveLane=['LOSSLESS','LOSSY'].includes(x.archiveLane)?x.archiveLane:'LOSSLESS';S.hintLevel=Object.assign(S.hintLevel,x.hintLevel||{});S.manifestFile=Math.max(0,Math.min(3,Number.isInteger(x.manifestFile)?x.manifestFile:0));S.manifestRan=x.manifestRan===true;S.lastRun=x.lastRun&&typeof x.lastRun==='object'?x.lastRun:null;S.fails=Math.max(0,Number.isInteger(x.fails)?x.fails:0);S.methodChanges=Math.max(0,Number.isInteger(x.methodChanges)?x.methodChanges:0);S.muted=x.muted===true;S.startedAt=Number.isFinite(x.startedAt)?x.startedAt:Date.now();S.recorded=x.recorded===true}catch(e){}}

function updateUI(){updateHUD();lab.style.display=['compare','text','bitmap','vector','sound','manifest','restore_audit','archive','dispatch'].includes(S.stage)?'block':'none';if(lab.style.display==='none')return;document.getElementById('telemetryLines').innerHTML=stageTelemetry();const mission=document.getElementById('missionText'),controls=document.getElementById('controls'),note=document.getElementById('methodDisclaimer');controls.innerHTML='';note.textContent='';if(S.stage==='compare'){mission.innerHTML='<b>TWO VAULTS · '+S.compareTrack.toUpperCase()+'</b><br>恢复同一条 BBBBGGGG。看 restored 是否仍与 source 完全相同。';controls.appendChild(button('PREV TRACK',()=>cycleCompare(-1)));controls.appendChild(button('NEXT TRACK',()=>cycleCompare(1)));controls.appendChild(button(S.observed.compare.lossless&&S.observed.compare.lossy?'CONTINUE':'RESTORE',runCompare,false,S.compareTrack==='lossy'?'gist':''));document.getElementById('constraint').textContent='LOSSLESS 看 exact restore；LOSSY 看哪些信息永久无法恢复。'}else if(FILES.includes(S.stage)){const file=S.stage,m=S.methods[file],r=evaluateMethod(file,m);mission.innerHTML='<b>'+file.toUpperCase()+' · '+methodName(m)+'</b><br>'+r.note;note.textContent=disclaimer(m);controls.appendChild(button('PREV METHOD',()=>cycleStationMethod(-1)));controls.appendChild(button('NEXT METHOD',()=>cycleStationMethod(1)));controls.appendChild(button(stationRunLabel(file),runStation,false,!r.exact?'gist':''));document.getElementById('constraint').textContent=file==='sound'?'exact 与 scenario fidelity 同时显示；88 是 FIXED SIMULATION SCORE。':'先检查 exact required，再比较 size。'}else if(S.stage==='manifest'){const f=FILES[S.manifestFile],m=S.methods[f],r=evaluateMethod(f,m);mission.innerHTML='<b>MANIFEST · '+f.toUpperCase()+'</b><br>'+methodName(m)+' · '+resultLine(f,m);note.textContent=disclaimer(m);controls.appendChild(button('FILE '+f.toUpperCase()+' ↓',()=>cycleManifestFile(1)));controls.appendChild(button('METHOD '+methodName(m)+' →',()=>cycleManifestMethod(1)));controls.append
