<script>
'use strict';
const CONTENT_ID='compression_v2';
const EVIDENCE_ID='compression_methods_situations_v1';
const ANSWER_SET_VERSION=2;
const VALIDATION_CONTRACT='compression_checkpoint_p1_p5_v2';
const COURSE_KEY='genesis_course_map_v1';
const SAVE_KEY='genesis_compression_v2';
const RECORDS_KEY='genesis_compression_records_v2';
const LEGACY_SAVE_KEYS=Object.freeze(['genesis_ch4_compression_v1']);
const LEGACY_RECORD_KEYS=Object.freeze(['genesis_ch4_compression_records_v1']);
const PHASES=Object.freeze(['COURSE CARD','TEACH','GUIDED PRACTICE','APPLY','CHECKPOINT','EVIDENCE']);
const STAGES=Object.freeze(['course_card','teach_need','teach_modes','teach_rle','guided_g1_restore','guided_g2_files','guided_g3_rle','apply_a1_situations','apply_a2_fixture','checkpoint_p1','checkpoint_p2','checkpoint_p3','checkpoint_p4','checkpoint_p5','commit_evidence','evidence','evidence_retry']);
const FACT_NAMES=Object.freeze(['needAndUses','losslessVsLossy','situationJustification','textCompression','bitmapCompression','vectorCompression','soundCompression','rleMechanism','rleSuitability']);
const $=id=>document.getElementById(id);
const clone=value=>value===undefined?undefined:JSON.parse(JSON.stringify(value));
const same=(a,b)=>JSON.stringify(a)===JSON.stringify(b);
const O=(value,label,courseExample=false)=>Object.freeze({value,label,courseExample});
const F=(key,label,options)=>Object.freeze({key,label,options:Object.freeze(options)});
const task=(id,ticket,prompt,fields,expected)=>Object.freeze({id,ticket,prompt,fields:Object.freeze(fields),expected:Object.freeze(expected)});
const TASKS=Object.freeze({
 guided_g1_restore:task('G1','COMPARE TWO RESTORES','Classify the restore that returns every source value and the restore that permanently changes values.',[
   F('exact',['EXACT RESTORE'].join(''),[O('LOSSLESS','LOSSLESS · every value returns'),O('LOSSY','LOSSY · some values change')]),
   F('changed','CHANGED RESTORE',[O('LOSSY','LOSSY · discarded information cannot be recovered'),O('LOSSLESS','LOSSLESS · exact')])
 ],{exact:'LOSSLESS',changed:'LOSSY'}),
 guided_g2_files:task('G2','FOUR FILE TYPES','Match each file type to a valid simplified compression description.',[
   F('text','TEXT',[O('REPEATED_FRAGMENT_REFERENCE','Repeated fragment stored once and referenced',true),O('DELETE_RANDOM_LETTERS','Delete random letters')]),
   F('bitmap','BITMAP',[O('PIXEL_RUNS','RLE stores repeated pixel runs'),O('CHANGE_TO_VECTOR','Always convert to vector')]),
   F('vector','VECTOR',[O('REUSE_OBJECT_PROPERTIES','Repeated object properties stored once',true),O('FLATTEN_TO_ONE_PIXEL','Flatten to one pixel')]),
   F('sound','SOUND',[O('REDUCE_SAMPLE_PRECISION','Reduce sample precision when permanent loss is allowed',true),O('DELETE_FILE_HEADER_ONLY','Delete its identity')])
 ],{text:'REPEATED_FRAGMENT_REFERENCE',bitmap:'PIXEL_RUNS',vector:'REUSE_OBJECT_PROPERTIES',sound:'REDUCE_SAMPLE_PRECISION'}),
 guided_g3_rle:task('G3','RLE ROUND TRIP','Encode the short source, decode the runs, then diagnose suitability.',[
   F('encode','SOURCE A A A B B C',[O('3A_2B_1C','(3,A) (2,B) (1,C)'),O('1A_1A_1A_1B_1B_1C','Six one-item runs')]),
   F('decode','RUNS (2,X) (3,Y)',[O('XXYYY','X X Y Y Y'),O('XXXYY','X X X Y Y')]),
   F('suitable','A A A A B B B B',[O('YES_LONG_RUNS','Suitable · long consecutive runs'),O('NO_ALWAYS','Not suitable because RLE never shrinks')])
 ],{encode:'3A_2B_1C',decode:'XXYYY',suitable:'YES_LONG_RUNS'}),
 apply_a1_situations:task('A1','ARCHIVE SITUATIONS','Choose a method from the use and its exact-restore requirement.',[
   F('contract','SIGNED CONTRACT MASTER',[O('LOSSLESS_EXACT','LOSSLESS · every mark must return'),O('LOSSY_SMALLER','LOSSY · smaller is always best')]),
   F('webImage','CASUAL WEB IMAGE',[O('LOSSY_ACCEPTABLE','LOSSY · close-enough appearance is acceptable'),O('LOSSLESS_REQUIRED','LOSSLESS · every pixel is legally required')]),
   F('soundStream','BACKGROUND SOUND STREAM',[O('LOSSY_ACCEPTABLE','LOSSY · some permanent detail loss is acceptable'),O('LOSSLESS_REQUIRED','LOSSLESS · all samples must always return')])
 ],{contract:'LOSSLESS_EXACT',webImage:'LOSSY_ACCEPTABLE',soundStream:'LOSSY_ACCEPTABLE'}),
 apply_a2_fixture:task('A2','FIXED TEACHING FIXTURE','Separate the simulated archive result from general compression knowledge.',[
   F('manifest','ARCHIVE MANIFEST',[O('FIXTURE_61_OF_64','61 / 64 · fixed teaching fixture'),O('UNIVERSAL_RATIO','All files compress to this ratio')]),
   F('quality','SIMULATED SOUND RESULT',[O('FIXTURE_QUALITY_88','quality 88 · fixed teaching fixture'),O('REAL_THRESHOLD','88 is a universal quality threshold')]),
   F('rule','WHAT COUNTS AS EVIDENCE',[O('CHECKPOINT_ONLY','Independent P1–P5 only'),O('MANIFEST_SCORE','The manifest alone')])
 ],{manifest:'FIXTURE_61_OF_64',quality:'FIXTURE_QUALITY_88',rule:'CHECKPOINT_ONLY'}),
 checkpoint_p1:task('P1','NEED / EXAMPLE / USE','Choose a valid need for compression, a valid use, and reject the absolute claim.',[
   F('need','WHY COMPRESS',[O('LESS_STORAGE_AND_TRANSFER','Use less storage and transfer less data'),O('CREATE_MORE_INFORMATION','Create information that was never stored')]),
   F('use','EXAMPLE OF USE',[O('SEND_OVER_LIMITED_LINK','Send a file over a limited connection'),O('MAKE_CPU_UNNECESSARY','Remove the need for a processor')]),
   F('absolute','CHECK THE CLAIM',[O('NOT_ALWAYS_SMALLER','A method is useful only when it fits the data and situation'),O('ALWAYS_SMALLER','Every method always makes every file smaller')])
 ],{need:'LESS_STORAGE_AND_TRANSFER',use:'SEND_OVER_LIMITED_LINK',absolute:'NOT_ALWAYS_SMALLER'}),
 checkpoint_p2:task('P2','LOSSLESS / LOSSY','Identify exact restoration and permanent information loss.',[
   F('lossless','SOURCE A A B → RESTORED A A B',[O('EXACT_LOSSLESS','LOSSLESS · exact restore'),O('INEXACT_LOSSY','LOSSY · permanent change')]),
   F('lossy','SOURCE 2 3 4 → RESTORED 2 4 4',[O('INEXACT_LOSSY','LOSSY · some information was discarded'),O('EXACT_LOSSLESS','LOSSLESS · exact restore')]),
   F('recover','CAN DISCARDED DETAIL BE RECOVERED',[O('NO','No · it was not retained'),O('YES_ALWAYS','Yes · every discarded value returns')])
 ],{lossless:'EXACT_LOSSLESS',lossy:'INEXACT_LOSSY',recover:'NO'}),
 checkpoint_p3:task('P3','NEW SITUATION + JUSTIFICATION','A medical scan is the diagnostic master. Choose and justify.',[
   F('method','METHOD',[O('LOSSLESS','LOSSLESS'),O('LOSSY','LOSSY')]),
   F('reason','REASON',[O('EXACT_DIAGNOSTIC_DETAIL','Diagnostic detail must be restored exactly'),O('SMALLEST_AT_ANY_COST','The smallest result is always correct')])
 ],{method:'LOSSLESS',reason:'EXACT_DIAGNOSTIC_DETAIL'}),
 checkpoint_p4:task('P4','TEXT / BITMAP / VECTOR / SOUND','Match each file type to a defensible compression description.',[
   F('text','TEXT',[O('REPEAT_REFERENCE','Repeated text can be stored once and referenced · COURSE EXAMPLE',true),O('REMOVE_MEANING','Delete words regardless of meaning')]),
   F('bitmap','BITMAP',[O('RLE_PIXEL_RUNS','RLE can store consecutive equal pixel values as runs'),O('VECTOR_ONLY','Bitmap can only be compressed as vector')]),
   F('vector','VECTOR',[O('REUSE_PROPERTIES','Repeated objects or properties can be reused · COURSE EXAMPLE',true),O('MUST_RASTERISE','It must be rasterised')]),
   F('sound','SOUND',[O('LOSSLESS_OR_LOSSY','It can be compressed losslessly or with permanent sample-detail loss · COURSE EXAMPLE',true),O('NO_COMPRESSION','Sound cannot be compressed')])
 ],{text:'REPEAT_REFERENCE',bitmap:'RLE_PIXEL_RUNS',vector:'REUSE_PROPERTIES',sound:'LOSSLESS_OR_LOSSY'}),
 checkpoint_p5:task('P5','RLE MECHANISM + SUITABILITY','Complete an encode, a decode, and a suitability diagnosis.',[
   F('encode','SOURCE Z Z Q Q Q Q R',[O('2Z_4Q_1R','(2,Z) (4,Q) (1,R)'),O('ZQR_241','Z Q R (2,4,1)')]),
   F('decode','RUNS (3,M) (2,N) (1,P)',[O('MMMNNP','M M M N N P'),O('MMNNNP','M M N N N P')]),
   F('suitable','BEST RLE SOURCE',[O('CCCCDDDDD','C C C C D D D D D'),O('CDCDCDCDC','C D C D C D C D C')]),
   F('reason','WHY',[O('LONG_RUNS','Long consecutive runs need fewer run pairs'),O('RLE_ALWAYS','RLE always makes data smaller')])
 ],{encode:'2Z_4Q_1R',decode:'MMMNNP',suitable:'CCCCDDDDD',reason:'LONG_RUNS'})
});
const EXPECTED_COMPRESSION_CHECKPOINT=Object.freeze(['checkpoint_p1','checkpoint_p2','checkpoint_p3','checkpoint_p4','checkpoint_p5'].map(stage=>Object.freeze({id:TASKS[stage].id,expected:TASKS[stage].expected})));
const NEXT=Object.freeze({
 guided_g1_restore:'guided_g2_files',guided_g2_files:'guided_g3_rle',guided_g3_rle:'apply_a1_situations',
 apply_a1_situations:'apply_a2_fixture',checkpoint_p1:'checkpoint_p2',checkpoint_p2:'checkpoint_p3',
 checkpoint_p3:'checkpoint_p4',checkpoint_p4:'checkpoint_p5'
});
const FEEDBACK=Object.freeze({
 INCOMPLETE:'Complete every field before verifying.',
 MISMATCH:'That choice conflicts with the definition, restored evidence, or stated situation.',
 CHECKPOINT_INCOMPLETE:'P1–P5 must all be independently complete.',
 EVIDENCE:'The Course Map could not verify the exact v2 evidence. Your earlier evidence was not erased.'
});
const HINTS=Object.freeze({
 G1:['Compare source and restored values.','Exact equality points to lossless.','A changed value rules out lossless.','Lossless restores every value; lossy permanently discards some information.'],
 G2:['Use the data structure shown for each file.','Look for repetition or allowed detail loss.','Delete-anything options are not defensible.','Text/object reuse are course examples; bitmap pixel runs are the named RLE example; sound may lose sample detail only when allowed.'],
 G3:['A run stores a count and one value.','Expand each count to decode.','Long consecutive repeats suit RLE.','AAA BB C becomes (3,A)(2,B)(1,C); alternating values can stay the same size or grow.'],
 A1:['Read the use before choosing.','Ask whether exact restoration is required.','A permanent master rules out lossy.','Use lossless for the contract master; a casual image or stream may accept lossy.'],
 A2:['These numbers belong to one simulation.','Separate fixture output from a general rule.','Reject universal ratios and thresholds.','61/64 and quality 88 are fixtures; formal evidence comes from independent P1–P5.'],
 P1:['Think storage and transfer.','Choose a real use, not a hardware impossibility.','Reject the word always.','Compression can reduce storage and transmitted data, but suitability depends on data and situation.'],
 P2:['Compare each restored sequence with its source.','Exact means every value returns.','A changed value means permanent loss.','Lossless is exact; lossy discards information that cannot be recovered from the compressed file.'],
 P3:['The word diagnostic controls the decision.','Ask whether every detail must return.','Smallest-at-any-cost is incompatible.','Choose lossless because the diagnostic master must restore exactly.'],
 P4:['Match the description to the file structure.','Repetition can be reused; permitted detail loss can be lossy.','Remove the absolute and destructive distractors.','Text fragments and vector properties may be reused as course examples; bitmap runs use RLE; sound may be lossless or lossy.'],
 P5:['Group consecutive equal values in the new Z/Q/R source.','Count first, then value; expand each M/N/P run to decode.','The alternating C/D candidate has many one-value runs.','ZZ QQQQ R is (2,Z)(4,Q)(1,R); (3,M)(2,N)(1,P) decodes MMMNNP; the grouped C/D source is more suitable.']
});
function isNormalCompressionRoute(search,hash){return hash===''&&(search===''||search==='?from=course-map')}
const NORMAL_ROUTE=isNormalCompressionRoute(location.search,location.hash);
const TEST_ROUTE=location.search==='?test'&&location.hash==='';
function validMap(map){return Boolean(map&&map.version===1)}
function allPredecessorsPassed(map){return Boolean(window.GenesisSequence&&['bitmap','vector','sound'].every(id=>GenesisSequence.nodeEvidencePassed(map,id)))}
let PREDECESSOR_OK=false,ALREADY_PASSED=false,PRIOR_EVIDENCE=false,COURSE_MAP=null;
function refreshEligibility(storage=localStorage){
 if(!NORMAL_ROUTE)return false;
 let raw=null,map=null;
 try{raw=storage.getItem(COURSE_KEY);map=JSON.parse(raw)}catch(_){map=null}
 COURSE_MAP=validMap(map)?map:null;
 PREDECESSOR_OK=allPredecessorsPassed(COURSE_MAP);
 ALREADY_PASSED=Boolean(COURSE_MAP&&GenesisSequence.nodeEvidencePassed(COURSE_MAP,'compression'));
 PRIOR_EVIDENCE=Boolean(COURSE_MAP&&GenesisSequence.compressionPriorEvidencePassed(COURSE_MAP));
 return PREDECESSOR_OK||ALREADY_PASSED;
}
refreshEligibility();
function defaultState(){return{version:2,contentId:CONTENT_ID,stage:'course_card',taskSelections:{},guidedPassed:{G1:false,G2:false,G3:false},applyPassed:{A1:false,A2:false},checkpointAnswers:{},checkpointAttempts:0,hintLevelByTaskAndType:{},errorsByTaskAndType:{},checkpointSafetyNetUsed:false,startedAt:Date.now(),errors:0,hints:0,evidenceRecorded:false,recordWritten:false,lastError:null,activeField:0}}
let S=defaultState(),validatedSubmission=null,validatedRuntime=null,replayRetained=false,recordsUnavailable=false,saveUnavailable=false,toastTimer=0;
function phaseFor(stage){
 if(stage==='course_card')return'COURSE CARD';
 if(stage.startsWith('teach_'))return'TEACH';

 $('enter').onclick=()=>{closeOverlay(false);if(ALREADY_PASSED){replayChapter()}else if(S.stage==='course_card')setStage('teach_need');else{render();focusPrimary()}};
 $('courseGuide').onclick=()=>showGuide('course');$('courseMap').onclick=()=>location.href='course-map.html';
}
function showGuide(context='game'){
 openOverlay('<h2 id="overlayTitle">COURSE GUIDE · §1.3 COMPRESSION</h2><div class="callout"><b>COURSE CARD → TEACH → GUIDED PRACTICE → APPLY → CHECKPOINT P1–P5 → EVIDENCE</b></div><p><b>CURRENT KNOWLEDGE</b><br>'+escapeHtml(knowledge())+'</p><p><b>CURRENT GOAL</b><br>'+escapeHtml(goal())+'</p><div class="callout boundary"><b>BOUNDARY</b><br>RLE is the only syllabus-named algorithm. Repeated text fragments, reused vector properties and reduced sound precision are simplified course examples, not required algorithm names. 61/64 and quality 88 are fixed fixtures.</div><div class="actions"><button class="btn" id="guideClose">RETURN TO GAME</button><button class="btn sub" id="guideMap">COURSE MAP</button></div>',$('guideBtn'));
 $('guideClose').onclick=()=>context==='course'?showCourseCard():closeOverlay();$('guideMap').onclick=()=>location.href='course-map.html';
}
function showReference(){
 openOverlay('<h2 id="overlayTitle">REFERENCE · SOURCE / RESTORE</h2><div class="callout"><b>LOSSLESS</b><br>Every source value can be restored exactly.</div><div class="callout"><b>LOSSY</b><br>Some information is permanently discarded; use only when the situation accepts it.</div><div class="callout boundary"><b>RLE</b><br>Consecutive equal values become count + value.<br>A A A B B C → (3,A) (2,B) (1,C)<br>(2,X) (3,Y) → X X Y Y Y<br>Long runs suit RLE; frequent changes may stay the same size or grow.</div><div class="actions"><button class="btn" id="referenceClose">RETURN TO GAME</button></div>',$('referenceBtn'));
 $('referenceClose').onclick=()=>closeOverlay();
}
function recordHtml(){
 if(!NORMAL_ROUTE)return'<p>LOCAL RUNS · THIS DEVICE · unavailable on preview/debug route.</p>';
 let rows=[];try{rows=JSON.parse(localStorage.getItem(RECORDS_KEY)||'[]');if(!Array.isArray(rows))rows=[]}catch(_){rows=[]}
 return'<div class="callout"><b>LOCAL RUNS · THIS DEVICE</b><br>'+(rows.length?rows.slice(0,5).map((r,i)=>(i+1)+'. '+r.sec+'s · '+r.hints+' hints · '+r.errors+' errors').join('<br>'):'No ranked run stored.')+'</div>';
}
function writeRunAndFinalSave(){
 if(replayRetained||!NORMAL_ROUTE||!PREDECESSOR_OK)return;
 const run={sec:Math.max(1,Math.round((Date.now()-S.startedAt)/1000)),hints:S.hints,errors:S.errors,passedAt:Date.now()};
 try{let rows=JSON.parse(localStorage.getItem(RECORDS_KEY)||'[]');if(!Array.isArray(rows))rows=[];rows.push(run);rows.sort((a,b)=>a.sec-b.sec||a.hints-b.hints||a.errors-b.errors);localStorage.setItem(RECORDS_KEY,JSON.stringify(rows.slice(0,5)));S.recordWritten=true}catch(_){recordsUnavailable=true}
 try{localStorage.setItem(SAVE_KEY,JSON.stringify(Object.assign(serializableState(),{stage:'evidence',evidenceRecorded:true,recordWritten:S.recordWritten})));saveUnavailable=false}catch(_){saveUnavailable=true}
}
function commitValidated(){
 S.stage='commit_evidence';render();let ok=false;
 if(PREDECESSOR_OK&&validatedSubmission&&validatedRuntime)ok=commitCompressionEvidence(validatedSubmission,validatedRuntime,localStorage);
 if(ok){
  const retainedReplay=replayRetained;S.evidenceRecorded=true;ALREADY_PASSED=true;S.stage='evidence';refreshEligibility();writeRunAndFinalSave();render();showEvidence(retainedReplay);return;
 }
 if(ALREADY_PASSED){S.evidenceRecorded=true;S.stage='evidence';render();showEvidence(true);return}
 S.evidenceRecorded=false;S.stage=PREDECESSOR_OK?'evidence_retry':'evidence';render();showEvidence(false);
}
function retryEvidence(){if(validatedSubmission&&validatedRuntime)commitValidated();else beginCheckpoint()}
function showEvidence(retained=false,source=null){
 const ok=ALREADY_PASSED&&S.evidenceRecorded,title=ok?'CH.04 CHECKPOINT · 5 / 5 PASSED':S.stage==='evidence_retry'?'PLAYTHROUGH COMPLETE · EVIDENCE NOT SAVED':'PREVIEW COMPLETE · EVIDENCE NOT RECORDED';
 openOverlay('<h1 id="overlayTitle">'+title+'</h1>'+(ok?'<div class="callout"><b>OFFICIAL EVIDENCE · compression_v2</b><br>answer set 2 · compression_checkpoint_p1_p5_v2</div>'+FACT_NAMES.map(name=>'<div class="evidence-row">✓ '+name+'</div>').join('')+'<div class="callout boundary"><b>TEACHING FIXTURES · NOT OFFICIAL FACTS</b><br>manifest 61/64 · simulated quality 88 · non-RLE course examples</div><p>'+(retained?'Prior strict evidence retained; this replay was not ranked.':'Networks prerequisite is now met by exact local evidence.')+'</p>'+recordHtml():'<div class="callout boundary"><b>NO FORMAL EVIDENCE WRITTEN</b><br>Course Map, ranked records and final save were not created by this result.</div>')+(recordsUnavailable?'<div class="callout boundary" role="alert">LOCAL RUN HISTORY UNAVAILABLE · evidence saved, but this run could not be ranked on this device.</div>':'')+(saveUnavailable?'<div class="callout boundary" role="alert">LOCAL SAVE UNAVAILABLE · Course Map evidence remains verified.</div>':'')+'<div class="actions">'+(ok?'<button class="btn" id="nextChapter">NEXT · §2.1 NETWORKS</button>':'')+(S.stage==='evidence_retry'?'<button class="btn" id="retryEvidence">RETRY EVIDENCE</button>':'')+'<button class="btn sub" id="replay">REPLAY CHAPTER</button><button class="btn sub" id="retryCheckpoint">RETRY CHECKPOINT</button><button class="btn sub" id="evidenceMap">COURSE MAP</button></div>',source||document.activeElement||$('guideBtn'));
 if($('nextChapter'))$('nextChapter').onclick=()=>location.href='course-map.html';
 if($('retryEvidence'))$('retryEvidence').onclick=retryEvidence;
 $('replay').onclick=replayChapter;$('retryCheckpoint').onclick=()=>{closeOverlay(false);beginCheckpoint()};$('evidenceMap').onclick=()=>location.href='course-map.html';
}
function replayChapter(){
 const retained=ALREADY_PASSED;closeOverlay(false);S=defaultState();S.stage='teach_need';S.evidenceRecorded=retained;S.recordWritten=retained;replayRetained=retained;validatedSubmission=null;validatedRuntime=null;render();focusPrimary();
}
function advanceApply(){
 if(!S.applyPassed.A1||!S.applyPassed.A2){toast('Complete both Apply tasks first.');return}
 beginCheckpoint();
}
function prepareDebug(stage){
 S=defaultState();S.stage=STAGES.includes(stage)?stage:'checkpoint_p1';
 const checkpointStages=['checkpoint_p1','checkpoint_p2','checkpoint_p3','checkpoint_p4','checkpoint_p5'],idx=checkpointStages.indexOf(S.stage);
 for(let i=0;i<idx;i++){const t=TASKS[checkpointStages[i]];S.checkpointAnswers[t.id]=Object.assign({id:t.id},t.expected)}
}
function runTests(){
 const results=[],assert=(value,id)=>{results.push({id,passed:Boolean(value)});console.assert(value,id)};
 assert(isNormalCompressionRoute('','')&&isNormalCompressionRoute('?from=course-map',''),'R01 normal routes');
 for(const search of ['?test','?debug','?stage=x','?from=course-map&x=1','?from=course-map&from=course-map','?unknown'])assert(!isNormalCompressionRoute(search,''),'R02 reject '+search);
 assert(!isNormalCompressionRoute('','#x'),'R03 reject hash');
 const exact={answerSetVersion:2,validationContract:VALIDATION_CONTRACT,tasks:EXPECTED_COMPRESSION_CHECKPOINT.map((expected,i)=>Object.assign({id:expected.id},TASKS['checkpoint_p'+(i+1)].expected))};
 assert(judgeCompressionCheckpoint(exact).passed&&judgeCompressionCheckpoint(exact).score===5,'J01 exact 5/5');
 const wrong=clone(exact);wrong.tasks[4].reason='RLE_ALWAYS';assert(!judgeCompressionCheckpoint(wrong).passed,'J02 wrong P5');
 const extra=clone(exact);extra.tasks[0].extra=true;assert(!judgeCompressionCheckpoint(extra).passed,'J03 extra field');
 const map=fullPredecessorMap();map.unknown={nested:{keep:42}};const storage=memoryStorage({[COURSE_KEY]:JSON.stringify(map)});
 const runtime={phase:'CHECKPOINT',stage:'checkpoint_p5',inputSource:'PLAYER_VERIFY',search:'',hash:'',usedSafetyNet:false,attempts:1};
 assert(commitCompressionEvidence(exact,runtime,storage,100),'E01 transactional commit');
 const saved=JSON.parse(storage.getItem(COURSE_KEY));
 assert(GenesisSequence.nodeEvidencePassed(saved,'compression'),'E02 strict predicate');
 assert(saved.unknown.nested.keep===42&&saved.nodeEvidence.compression.passedAt===100,'E03 unknown and passedAt');
 assert(storage.stats.keys.filter(k=>k===COURSE_KEY).length===1,'E04 one successful map write');
 const second=memoryStorage({[COURSE_KEY]:JSON.stringify(saved)});assert(commitCompressionEvidence(exact,Object.assign({},runtime,{attempts:2}),second,200),'E05 replay commit function');const saved2=JSON.parse(second.getItem(COURSE_KEY));assert(saved2.nodeEvidence.compression.passedAt===100&&saved2.nodeEvidence.compression.lastPassedAt===200,'E06 timestamp retention');
 const corrupt=memoryStorage({[COURSE_KEY]:JSON.stringify(map)},{corruptAfterWrite:COURSE_KEY});assert(!commitCompressionEvidence(exact,runtime,corrupt,100),'E07 corrupt readback fails');assert(corrupt.data.get(COURSE_KEY)===JSON.stringify(map),'E08 exact rollback');
 const invalid=memoryStorage({[COURSE_KEY]:JSON.stringify(map)});assert(!commitCompressionEvidence(exact,Object.assign({},runtime,{search:'?test'}),invalid,100)&&invalid.stats.writes===0,'E09 debug no write');
 const corpus=JSON.stringify(TASKS).toLowerCase();assert(!/\b(?:ack|huffman|lzw|deflate|jpeg|dct|mp3|codec|protocol)\b|compression ratio/.test(corpus),'S01 scored corpus exclusions');
 assert(FACT_NAMES.length===9&&same(FACT_NAMES,GenesisSequence.NODE_FACTS.compression),'S02 nine facts exact');
 window.__chapter4TestResults={passed:results.every(x=>x.passed),count:results.length,failed:results.filter(x=>!x.passed),results};
 document.documentElement.dataset.testPassed=String(window.__chapter4TestResults.passed);document.documentElement.dataset.testCount=String(results.length);
 console.info('[CHAPTER4 COMPRESSION TEST]',window.__chapter4TestResults);
}
$('guideBtn').addEventListener('click',()=>showGuide('game'));$('referenceBtn').addEventListener('click',showReference);$('hintBtn').addEventListener('click',hint);$('mapBtn').addEventListener('click',()=>location.href='course-map.html');
$('overlay').addEventListener('click',event=>{if(event.target===$('overlay'))closeOverlay()});
addEventListener('resize',resize);
addEventListener('keydown',event=>{
 if($('overlay').classList.contains('open')){
  if(event.key==='Escape'){event.preventDefault();event.stopImmediatePropagation();closeOverlay();return}
  if(event.key==='Tab'){const list=focusables();if(!list.length){event.preventDefault();$('panel').focus();return}const first=list[0],last=list[list.length-1];if(document.activeElement===$('panel')){event.preventDefault();(event.shiftKey?last:first).focus()}else if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus()}else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus()}}
  return;
 }
 const key=event.key.toLowerCase();
 if(key==='h'){event.preventDefault();hint()}else if(key==='g'){event.preventDefault();showGuide('game')}else if(key==='arrowleft'||key==='a'){event.preventDefault();cycleChoice(-1)}else if(key==='arrowright'||key==='d'){event.preventDefault();cycleChoice(1)}else if(key==='arrowup'||key==='w'){const t=currentTask();if(t){event.preventDefault();S.activeField=Math.max(0,S.activeField-1);render()}}else if(key==='arrowdown'||key==='s'){const t=currentTask();if(t){event.preventDefault();S.activeField=Math.min(t.fields.length-1,S.activeField+1);render()}}else if((event.key==='Enter'||key==='e')&&currentTask()){event.preventDefault();verifyTask()}
});
const query=new URLSearchParams(location.search),debugStage=query.get('stage')||query.get('scene');
if(!NORMAL_ROUTE&&debugStage)prepareDebug(debugStage);
resize();render();
if(S.stage==='course_card')showCourseCard();else if(S.stage==='evidence'||S.stage==='evidence_retry')showEvidence();
if(TEST_ROUTE)runTests();
</script>
