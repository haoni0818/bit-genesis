<!doctype html>
<html lang="zh-CN">
<head>
<link rel="icon" href="data:,">
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>IT://SAMPLING · 第2章</title>
<style>
:root{--green:#8dffab;--dim:#83a98c;--line:#347d48;--panel:#031008e8;--amber:#e7bd62;--red:#ff8178}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#010302;color:#d9ffe4;font-family:Consolas,"Microsoft YaHei",monospace}button{font:inherit}button:focus-visible{outline:2px solid #fff;outline-offset:3px}
#bg{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;image-rendering:pixelated;filter:brightness(.52) saturate(.72);transition:filter 1.2s}#wave{position:fixed;inset:0;width:100%;height:100%;image-rendering:pixelated}.shade{position:fixed;inset:0;pointer-events:none;background:linear-gradient(180deg,#0009 0,transparent 28%,transparent 72%,#000b),repeating-linear-gradient(0deg,#fff0 0,#fff0 3px,#6aff8a0b 4px);mix-blend-mode:screen}
#hud{position:fixed;left:18px;top:16px;width:min(440px,calc(100vw - 36px));padding:11px 14px;border:1px solid #285f38;background:#020905dc;box-shadow:0 0 24px #06170c}.top{display:flex;justify-content:space-between;gap:10px;font-size:11px;color:#83b08f}.goal{margin-top:8px;line-height:1.5;font-size:13px}.signal{height:7px;border:1px solid #285f38;margin:7px 0;background:#020302}.signal i{display:block;height:100%;width:0;background:var(--green);box-shadow:0 0 12px var(--green);transition:.8s}
.keys{position:fixed;right:18px;top:16px;padding:8px 10px;border:1px solid #285f38;background:#020905dc;color:#8bb897;font-size:11px}#toast{position:fixed;left:50%;bottom:13%;transform:translateX(-50%);max-width:82vw;padding:9px 14px;border:1px solid #3b8b51;background:#04110ae8;color:#e3ffe9;text-align:center;opacity:0;transition:.2s;pointer-events:none}.show{opacity:1!important}
#lab{position:fixed;left:50%;bottom:8%;transform:translateX(-50%);width:min(780px,92vw);padding:14px 18px;border:1px solid #347d48;background:#020a06e8;box-shadow:0 0 28px #092713;display:none}.readout{display:grid;grid-template-columns:1fr 1fr 1.25fr;gap:10px}.dial{border:1px solid #285f38;padding:9px;text-align:center;color:#9bc9a6}.dial b{display:block;color:var(--green);font-size:19px;margin-top:4px}.formula{border:1px solid #41674a;padding:10px;text-align:center;font-size:14px}.good{color:var(--green)}.bad{color:var(--red)}.hint{color:#a9c7b0;font-size:11px;margin-top:9px;text-align:center}
#overlay{position:fixed;inset:0;display:none;place-items:center;background:#000a;padding:22px}.panel{width:min(790px,94vw);max-height:90vh;overflow:auto;border:1px solid #3d9154;background:var(--panel);padding:22px;box-shadow:0 0 42px #123f20}.panel h1,.panel h2{margin:0 0 13px;color:var(--green)}.panel p{line-height:1.65;color:#c0dbc6}.callout{border:1px solid #385b40;padding:13px;margin:14px 0;text-align:center;color:#d8ffe1}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.btn{padding:9px 14px;border:1px solid #58cf79;background:#0b2c15;color:#e5ffeb;cursor:pointer}.btn:hover{background:#1c6531}.sub{border-color:#49644f;background:#071109;color:#a4bca9}.end{text-align:center}.records{line-height:1.65}.pulse{height:5px;background:var(--green);box-shadow:0 0 22px var(--green);animation:p 1.3s infinite;margin:22px auto;width:65%}@keyframes p{0%,100%{opacity:.2;transform:scaleX(.08)}50%{opacity:1;transform:scaleX(1)}}
@media(max-width:640px){.keys{display:none}.panel{padding:16px}.readout{grid-template-columns:1fr}.formula{grid-column:1}.lab{bottom:2%}}
</style>
</head>
<body>
<img id="bg" src="assets/sampling_chamber.webp" alt="废弃的声音采样室"><canvas id="wave"></canvas><div class="shade"></div>
<div id="hud"><div class="top"><span>CH.2 · THE FIRST SOUND</span><span id="beat">ARRIVAL</span></div><div class="signal"><i id="signalFill"></i></div><div class="top"><span>SIGNAL RESTORATION</span><span id="signalText">0%</span></div><div class="goal" id="goal"></div></div>
<div class="keys">A/D 调 sample rate · W/S 调 resolution · E 锁定 · H 提示 · Esc</div>
<div id="lab"><div class="readout"><div class="dial">SAMPLE RATE<b id="rateV">4 Hz</b></div><div class="dial">SAMPLE RESOLUTION<b id="bitsV">2-bit</b></div><div class="formula" id="formula"></div></div><div class="hint" id="constraint"></div></div>
<div id="toast"></div><div id="overlay"><div class="panel" id="panel"></div></div>
<script>
const SAVE='genesis_ch2_v1',RECORDS='genesis_ch2_records_v1',cv=document.getElementById('wave'),ctx=cv.getContext('2d'),overlay=document.getElementById('overlay'),panel=document.getElementById('panel'),lab=document.getElementById('lab');
const rates=[4,8,16],depths=[2,4,8],stages=['arrival','rate','resolution','mix','awakening','end'];let VW=0,VH=0,dpr=1,last=performance.now(),toastTimer=0,audioCtx=null;
const S={stage:'arrival',rate:4,bits:2,signal:0,fails:0,startedAt:Date.now(),recorded:false};
function resize(){dpr=Math.min(2,devicePixelRatio||1);VW=innerWidth;VH=innerHeight;cv.width=VW*dpr;cv.height=VH*dpr;cv.style.width=VW+'px';cv.style.height=VH+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',resize);resize();
function safeSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}function save(){safeSet(SAVE,JSON.stringify({stage:S.stage,rate:S.rate,bits:S.bits,signal:S.signal,fails:S.fails,startedAt:S.startedAt,recorded:S.recorded}))}
function load(){try{const x=JSON.parse(localStorage.getItem(SAVE)||'null');if(!x||!stages.includes(x.stage))return;S.stage=x.stage;S.rate=rates.includes(x.rate)?x.rate:4;S.bits=depths.includes(x.bits)?x.bits:2;S.signal=Math.max(0,Math.min(100,Number.isFinite(x.signal)?x.signal:0));S.fails=Math.max(0,Number.isInteger(x.fails)?x.fails:0);S.startedAt=Number.isFinite(x.startedAt)?x.startedAt:Date.now();S.recorded=x.recorded===true}catch(e){}}
function records(){try{const a=JSON.parse(localStorage.getItem(RECORDS)||'[]');return Array.isArray(a)?a.filter(x=>Number.isFinite(x.sec)).slice(0,5):[]}catch(e){return []}}
function addRecord(){const q=new URLSearchParams(location.search);if(S.recorded||q.has('test')||q.has('stage')||q.has('scene'))return;const rec={sec:Math.max(1,Math.round((Date.now()-S.startedAt)/1000)),fails:S.fails,ts:Date.now()},a=records();a.push(rec);a.sort((x,y)=>x.sec-y.sec||x.fails-y.fails);safeSet(RECORDS,JSON.stringify(a.slice(0,5)));S.recorded=true;save()}
function recordHtml(){const a=records();return '<div class="callout records"><b>本机纪录 · LOCAL SIGNALS</b><br>'+(a.length?a.map((r,i)=>(i+1)+'. '+Math.floor(r.sec/60)+':'+String(r.sec%60).padStart(2,'0')+' · '+r.fails+' retries').join('<br>'):'完成本章后记录成绩')+'</div>'}
function toast(t,d=2800){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>e.classList.remove('show'),d)}function open(h){panel.innerHTML=h;overlay.style.display='grid'}function close(){overlay.style.display='none'}
function stageConfig(){if(S.stage==='rate')return{seconds:1,limit:8,needRate:8,needBits:8,title:'时钟校准 · SAMPLING RATE',goal:'找到不丢失波形、又能装进 8-byte relay 的采样率。'};if(S.stage==='resolution')return{seconds:1,limit:4,needRate:8,needBits:4,title:'幅度校准 · SAMPLE RESOLUTION',goal:'让幅度不再粗糙，同时装进 4-byte relay。'};return{seconds:4,limit:16,needRate:8,needBits:4,title:'完整信号 · FILE SIZE',goal:'把 4 秒 mono 信号装进 16 bytes，并保持可辨识。'}}
function bytes(){const c=stageConfig();return S.rate*S.bits*c.seconds/8}function fits(){const c=stageConfig();return S.rate>=c.needRate&&S.bits>=c.needBits&&bytes()<=c.limit}
function setStage(s){S.stage=s;S.fails=0;if(s==='rate'){S.rate=4;S.bits=8;S.signal=18}else if(s==='resolution'){S.rate=8;S.bits=2;S.signal=42}else if(s==='mix'){S.rate=4;S.bits=2;S.signal=68}else if(s==='awakening')S.signal=92;else if(s==='end')S.signal=100;updateUI();save()}
function updateUI(){const goals={arrival:'这里保存着世界还没学会发出的声音。',rate:'调 sample rate：每秒取多少个样本。',resolution:'调 sample resolution：每个样本可使用多少 bits。',mix:'同时平衡保真度、时长与文件大小。',awakening:'信号完整了。让它第一次穿过扬声器。',end:'第2章完成。声音已经存在。'};document.getElementById('beat').textContent=S.stage.toUpperCase();document.getElementById('goal').textContent=goals[S.stage];document.getElementById('signalFill').style.width=S.signal+'%';document.getElementById('signalText').textContent=S.signal+'%';document.getElementById('bg').style.filter='brightness('+(0.50+S.signal*.0045)+') saturate('+(0.68+S.signal*.006)+')';if(['rate','resolution','mix'].includes(S.stage)){const c=stageConfig(),b=bytes();lab.style.display='block';document.getElementById('rateV').textContent=S.rate+' Hz';document.getElementById('bitsV').textContent=S.bits+'-bit · '+Math.pow(2,S.bits)+' levels';document.getElementById('formula').innerHTML=S.rate+' samples/s × '+S.bits+' bits × '+c.seconds+' s ÷ 8 = <b class="'+(b<=c.limit?'good':'bad')+'">'+b+' bytes</b>';document.getElementById('constraint').textContent=c.goal+'  BUFFER ≤ '+c.limit+' bytes · pixel/audio header ignored in this model.'}else lab.style.display='none'}
function arrival(){open('<h1>第 2 章 · 第一声</h1><p>波形已经存在了很久。但连续的震动无法被这台数字机器直接记住。</p><p>它只能在一个个离散时刻伸手，取走当时的幅度——把连续变成样本，把空气变成数字。</p><div class="callout">ANALOGUE → SAMPLE → DIGITAL</div><p>采得太少，声音会认不出自己；每个样本记得太粗，声音会长出棱角；两者都太高，磁盘又会被填满。</p><div class="actions"><button class="btn" id="touch">触碰示波祭坛</button><button class="btn sub" id="prev">返回第1章</button></div>');document.getElementById('touch').onclick=()=>{ensureAudio();close();setStage('rate');toast('先只调整 A/D：sample rate 决定每秒取样次数。',4200)};document.getElementById('prev').onclick=()=>location.href='chapter1.html'}
function ensureAudio(){try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}catch(e){}}
function moveRate(d){if(!['rate','mix'].includes(S.stage))return;let i=rates.indexOf(S.rate);S.rate=rates[(i+d+rates.length)%rates.length];updateUI();save()}
function moveBits(d){if(!['resolution','mix'].includes(S.stage))return;let i=depths.indexOf(S.bits);S.bits=depths[(i+d+depths.length)%depths.length];updateUI();save()}
function lock(){if(!['rate','resolution','mix'].includes(S.stage))return;const c=stageConfig();if(!fits()){S.fails++;const tooLarge=bytes()>c.limit;toast(tooLarge?'波形更细了，但 relay 装不下。降低一个维度。':S.fails>=4?'换个信号想：每秒变化两次的波形，至少要在变化之间留下样本；幅度台阶越多，量化越细。':S.fails>=2?'观察亮绿重建线：横向断裂看 sample rate，纵向台阶看 resolution。':'重建波形还没有贴住原始曲线。');return}if(S.stage==='rate'){toast('8 samples/s：重建线重新认出了波形。',3500);setTimeout(()=>setStage('resolution'),900)}else if(S.stage==='resolution'){toast('4-bit = 16 amplitude levels：量化台阶变细。',3800);setTimeout(()=>setStage('mix'),900)}else{toast('8 × 4 × 4 ÷ 8 = 16 bytes。完整信号写入。',4200);setTimeout(()=>{setStage('awakening');awakening()},1100)}}
function awakening(){open('<h2>扬声器仍然没有动</h2><p>样本已经完整，时钟也在走。数字世界第一次拥有了一段能够被重建的声音。</p><p>但浏览器和这个世界遵守同一条规则：声音必须由你亲手允许。</p><div class="callout">SIGNAL READY · OUTPUT MUTED</div><div class="actions"><button class="btn" id="hear">让世界发出第一声</button></div>');document.getElementById('hear').onclick=()=>{ensureAudio();playFirstSound();close();document.getElementById('bg').style.filter='brightness(1.05) saturate(1.25)';toast('声音诞生了。',3200);setTimeout(finish,2600)}}
function playFirstSound(){if(!audioCtx)return;const now=audioCtx.currentTime;[261.63,329.63,392].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=i===0?'sine':'triangle';o.frequency.value=f;g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.055,now+.18+i*.08);g.gain.exponentialRampToValueAtTime(.001,now+2.3);o.connect(g).connect(audioCtx.destination);o.start(now+i*.08);o.stop(now+2.4)})}
function finish(){setStage('end');addRecord();save();open('<div class="end"><h1>第 2 章 · 第一声</h1><p>世界不再寂静。</p><p>连续的波被切成离散样本；sample rate 决定横向有多密，sample resolution 决定纵向有多细。文件大小则记下这份代价。</p><div class="callout">sample rate × sample resolution × duration × channels<br>UNCOMPRESSED DIGITAL SAMPLE MODEL · header excluded</div>'+recordHtml()+'<div class="pulse"></div><p>声音越过采样室，撞上了一扇由直线和圆弧构成的门。无论它离你多近，边缘都没有碎。</p><p class="hint">NEXT: VECTOR GRAPHICS</p><div class="actions" style="justify-content:center"><button class="btn" id="chapter3">进入第 3 章</button><button class="btn sub" id="again">重玩本章</button><button class="btn sub" id="one">返回第1章</button></div></div>');document.getElementById('chapter3').onclick=()=>location.href='chapter3.html';document.getElementById('again').onclick=()=>{try{localStorage.removeItem(SAVE)}catch(e){}location.reload()};document.getElementById('one').onclick=()=>location.href='chapter1.html'}
function reopen(){if(S.stage==='arrival')arrival();else if(S.stage==='awakening')awakening();else if(S.stage==='end')finish()}
function continuous(x){return Math.sin(x*Math.PI*4)*.62+Math.sin(x*Math.PI*8+.7)*.13}
function quantize(v,bits){const n=Math.pow(2,bits)-1;return Math.round(((v+1)/2)*n)/n*2-1}
function draw(t){ctx.clearRect(0,0,VW,VH);const active=['rate','resolution','mix'].includes(S.stage),x0=VW*.23,x1=VW*.77,y0=VH*.47,amp=Math.min(120,VH*.16);ctx.save();ctx.lineWidth=2;ctx.strokeStyle='rgba(130,230,165,.22)';ctx.beginPath();for(let i=0;i<=260;i++){const x=i/260,px=x0+x*(x1-x0),py=y0-continuous(x)*amp;i?ctx.lineTo(px,py):ctx.moveTo(px,py)}ctx.stroke();if(active){const count=S.rate+1,pts=[];for(let i=0;i<count;i++){const x=i/(count-1),v=quantize(continuous(x),S.bits);pts.push([x0+x*(x1-x0),y0-v*amp])}ctx.strokeStyle='rgba(118,255,159,.95)';ctx.lineWidth=3;ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));ctx.stroke();pts.forEach(p=>{ctx.fillStyle='#e5ffeb';ctx.fillRect(p[0]-3,p[1]-3,6,6)});const levels=Math.min(16,Math.pow(2,S.bits));ctx.strokeStyle='rgba(231,189,98,.14)';ctx.lineWidth=1;for(let i=0;i<levels;i++){const yy=y0-amp+(i/(levels-1))*amp*2;ctx.beginPath();ctx.moveTo(x0,yy);ctx.lineTo(x1,yy);ctx.stroke()}}ctx.restore()}
function frame(t){last=t;draw(t);requestAnimationFrame(frame)}
addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='d'||k==='arrowright'){e.preventDefault();moveRate(1)}if(k==='a'||k==='arrowleft'){e.preventDefault();moveRate(-1)}if(k==='w'||k==='arrowup'){e.preventDefault();moveBits(1)}if(k==='s'||k==='arrowdown'){e.preventDefault();moveBits(-1)}if(k==='e'||e.key==='Enter'){e.preventDefault();if(overlay.style.display!=='grid'&&['arrival','awakening','end'].includes(S.stage))reopen();else lock()}if(k==='h')toast('横向样本太疏会漏掉变化；纵向幅度等级太少会出现台阶；两者都会增加文件大小。',4400);if(e.key==='Escape'&&overlay.style.display==='grid'&&S.stage!=='end'){close();toast('按 E 可重新打开当前终端。')}});
load();const qs=new URLSearchParams(location.search),qstage=qs.get('stage')||qs.get('scene');if(qstage&&stages.includes(qstage)){S.stage=qstage;if(qstage==='rate'){S.rate=4;S.bits=8}else if(qstage==='resolution'){S.rate=8;S.bits=2}else if(qstage==='mix'){S.rate=4;S.bits=2}}
if(qs.has('test')){console.assert(8*4*4/8===16,'file size');console.assert(quantize(.31,8)!==quantize(.31,2),'resolution');console.assert(rates.includes(8)&&depths.includes(4),'target configuration')}
updateUI();requestAnimationFrame(frame);if(S.stage==='arrival')arrival();else if(S.stage==='awakening')awakening();else if(S.stage==='end')finish();else toast('信号进度已恢复。');
</script>
<script src="course-guide.js"></script>
</body></html>
