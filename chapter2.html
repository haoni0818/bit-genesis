function continuous(x){return Math.sin(x*Math.PI*4)*.62+Math.sin(x*Math.PI*8+.7)*.13}
function quantize(v,bits){const n=Math.pow(2,bits)-1;return Math.round(((v+1)/2)*n)/n*2-1}

function wavePanel(cx,cy,w,h,rate,bits,caption){const left=cx-w/2,right=cx+w/2,top=cy-h/2,bottom=cy+h/2,amp=h*.34;ctx.save();ctx.fillStyle='rgba(2,14,7,.62)';ctx.strokeStyle='rgba(141,255,171,.65)';ctx.fillRect(left,top,w,h);ctx.strokeRect(left,top,w,h);ctx.strokeStyle='rgba(160,210,170,.28)';ctx.lineWidth=1.5;ctx.beginPath();for(let i=0;i<=180;i++){const x=i/180,px=left+x*w,py=cy-continuous(x)*amp;i?ctx.lineTo(px,py):ctx.moveTo(px,py)}ctx.stroke();const levels=Math.min(16,Math.pow(2,bits));ctx.strokeStyle='rgba(231,189,98,.16)';for(let i=0;i<levels;i++){const yy=top+h*.16+(i/Math.max(1,levels-1))*h*.68;ctx.beginPath();ctx.moveTo(left,yy);ctx.lineTo(right,yy);ctx.stroke()}const pts=[];for(let i=0;i<rate;i++){const x=(i+.5)/rate,v=quantize(continuous(x),bits);pts.push([left+x*w,cy-v*amp])}ctx.strokeStyle='#8dffab';ctx.lineWidth=2.5;ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));ctx.stroke();pts.forEach(p=>{ctx.fillStyle='#effff2';ctx.fillRect(p[0]-3,p[1]-3,6,6)});ctx.restore();label(cx,bottom+20,caption)}
