<!doctype html>
<html lang="zh-CN">
<head>
<link rel="icon" href="data:,">
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>IT://COMPRESSION · 第1章</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020403;color:#d9ffe4;font-family:Consolas,"Microsoft YaHei",monospace}button{font:inherit}
#world{position:fixed;inset:0;width:100%;height:100%;image-rendering:pixelated}.scan{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.018) 0,rgba(255,255,255,.018) 1px,transparent 1px,transparent 4px);mix-blend-mode:screen}
#hud{position:fixed;left:18px;top:16px;width:min(430px,calc(100vw - 36px));padding:12px 14px;border:1px solid #245c34;background:rgba(2,9,5,.86);box-shadow:0 0 20px #071b0d}
.top{display:flex;justify-content:space-between;gap:10px;font-size:12px;color:#80bf90}.bar{height:8px;margin:8px 0 5px;border:1px solid #6e332f;background:#160707}.bar i{display:block;height:100%;width:99%;background:#e35c4d;box-shadow:0 0 10px #e35c4d;transition:.8s}.goal{font-size:13px;color:#bfffcf;min-height:34px;line-height:1.5}.keys{position:fixed;right:18px;top:16px;font-size:11px;color:#73a27e;background:#020a05cc;border:1px solid #1c4d29;padding:8px 10px}
#toast{position:fixed;left:50%;bottom:23%;transform:translateX(-50%);max-width:min(680px,86vw);text-align:center;padding:9px 14px;background:#06140bbb;border:1px solid #327b45;color:#d8ffe2;opacity:0;transition:.25s;pointer-events:none}.show{opacity:1!important}
#overlay{position:fixed;inset:0;display:none;place-items:center;background:rgba(0,0,0,.7);padding:22px}.panel{width:min(780px,94vw);max-height:90vh;overflow:auto;border:1px solid #398d51;background:#031008;box-shadow:0 0 40px #123c1f;padding:22px}.panel h1,.panel h2{margin:0 0 12px;color:#8dffab}.panel p{line-height:1.65;color:#b7d9c0}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.btn{border:1px solid #58cf79;background:#0b2c15;color:#dfffe7;padding:9px 14px;cursor:pointer}.btn:hover,.btn.sel{background:#1d6832}.sub{border-color:#48664e;background:#09130b;color:#9ebaa5}.formula{font-size:19px;text-align:center;padding:14px;border:1px solid #255a32;background:#020704;margin:15px 0}.depths{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.preview{display:grid;grid-template-columns:repeat(16,1fr);gap:2px;margin:14px auto;width:min(560px,100%)}.preview i{aspect-ratio:1;background:#44a45b}.rowview{display:grid;gap:3px;margin:12px 0}.px{height:42px;border:1px solid #ffffff26;display:grid;place-items:center;color:#071008;font-weight:bold}.caps{display:flex;gap:7px;min-height:43px;flex-wrap:wrap;margin:10px 0}.cap{padding:8px 10px;border:1px solid #a9ffc0;background:#12331c}.choices{display:grid;grid-template-columns:1fr 1fr;gap:14px}.choice{border:1px solid #285b35;padding:12px;cursor:pointer}.choice:hover{border-color:#72e992}.meter{font-size:12px;color:#91bf9e}.good{color:#82f5a0}.bad{color:#ff8e82}.end{text-align:center}.wave{height:70px;margin:18px 0;display:flex;align-items:center;justify-content:center;gap:5px}.wave i{display:block;width:4px;background:#63e684;animation:w 1.2s ease-in-out infinite}.wave i:nth-child(2n){animation-delay:-.45s}.wave i:nth-child(3n){animation-delay:-.8s}@keyframes w{0%,100%{height:6px;opacity:.25}50%{height:52px;opacity:.9}}
@media(max-width:640px){.choices{grid-template-columns:1fr}.keys{display:none}.panel{padding:16px}.depths{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<canvas id="world"></canvas><div class="scan"></div>
<div id="hud"><div class="top"><span>CH.1 · THE WEIGHT OF COLOUR</span><span id="beat">ARRIVAL</span></div><div class="bar"><i id="storage"></i></div><div class="top"><span>STORAGE</span><span id="storageText">99%</span></div><div class="goal" id="goal"></div></div>
<div class="keys">D/→ 扫描 · A/← 段内回退 · E 封装 · H 提示 · Esc</div><div id="toast"></div><div id="overlay"><div class="panel" id="panel"></div></div>
<script>
const SAVE='genesis_ch1_v1', RECORDS='genesis_ch1_records_v1', cv=document.getElementById('world'),ctx=cv.getContext('2d'),overlay=document.getElementById('overlay'),panel=document.getElementById('panel');
let VW=0,VH=0,dpr=1,last=performance.now(),toastTimer=0;
const C={G:'#58d477',B:'#5887dc',P:'#db79b9',Y:'#e3ca65',K:'#28332b',W:'#d7e6da'};
const stages=['arrival','weight','scan','contrast','mural','end'];
const S={stage:'arrival',depth:8,row:0,pos:0,start:0,caps:[],fails:0,contrast:null,muralRow:0,doneRows:[],storage:99,flash:0,startedAt:Date.now(),recorded:false};
const ROWS={tutorial:['G','G','G','G','B','B','P','P'], sky:['B','B','B','B','Y','Y','Y','Y'], noise:['B','Y','B','Y','B','Y','B','Y'], mural:[['K','K','Y','Y','Y','Y','K','K'],['K','Y','Y','K','K','Y','Y','K'],['K','Y','Y','Y','K','Y','Y','K']]};
function resize(){dpr=Math.min(2,devicePixelRatio||1);VW=innerWidth;VH=innerHeight;cv.width=VW*dpr;cv.height=VH*dpr;cv.style.width=VW+'px';cv.style.height=VH+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',resize);resize();
function save(){try{localStorage.setItem(SAVE,JSON.stringify({stage:S.stage,depth:S.depth,contrast:S.contrast,doneRows:S.doneRows,muralRow:S.muralRow,storage:S.storage,startedAt:S.startedAt,recorded:S.recorded}))}catch(e){}}
function load(){try{const x=JSON.parse(localStorage.getItem(SAVE)||'null');if(!x||!stages.includes(x.stage))return;S.stage=x.stage;S.depth=[1,2,4,8].includes(x.depth)?x.depth:8;S.contrast=['sky','noise'].includes(x.contrast)?x.contrast:null;S.doneRows=Array.isArray(x.doneRows)?x.doneRows.slice(0,3):[];S.muralRow=Math.max(0,Math.min(3,Number.isInteger(x.muralRow)?x.muralRow:0));S.storage=Math.max(0,Math.min(100,Number.isFinite(x.storage)?x.storage:99));S.startedAt=Number.isFinite(x.startedAt)?x.startedAt:Date.now();S.recorded=x.recorded===true;if(S.stage==='mural'&&S.muralRow>=3)S.stage='end'}catch(e){}}
function readRecords(){try{const a=JSON.parse(localStorage.getItem(RECORDS)||'[]');return Array.isArray(a)?a.filter(x=>Number.isFinite(x.sec)&&Number.isFinite(x.runs)).slice(0,5):[]}catch(e){return []}}
function addRecord(){const q=new URLSearchParams(location.search);if(S.recorded||q.has('test')||q.has('stage')||q.has('scene'))return;const rec={sec:Math.max(1,Math.round((Date.now()-S.startedAt)/1000)),runs:S.doneRows.reduce((a,b)=>a+(+b||0),0),ts:Date.now()};try{const a=readRecords();a.push(rec);a.sort((x,y)=>x.sec-y.sec||x.runs-y.runs);localStorage.setItem(RECORDS,JSON.stringify(a.slice(0,5)));S.recorded=true;save()}catch(e){}}
function recordHtml(){const a=readRecords();return '<div class="formula"><b>本机纪录 · LOCAL RUNS</b><br>'+(a.length?a.map((r,i)=>(i+1)+'. '+Math.floor(r.sec/60)+':'+String(r.sec%60).padStart(2,'0')+' · '+r.runs+' mural runs').join('<br>'):'完成一次本章后记录成绩')+'</div>'}
function setStage(s){S.stage=s;S.pos=0;S.start=0;S.caps=[];S.fails=0;document.getElementById('beat').textContent=s.toUpperCase();updateHud();save()}
function updateHud(){const goals={arrival:'传送完成。看看颜色给世界带来了什么。',weight:'让 16 × 8 位图装进 64-byte 缓冲区，并至少保留 16 colours。',scan:'沿像素带前进；每到颜色边界，按 E 把连续同色像素封成一个 run。',contrast:'预测：哪一种图案适合 RLE？',mural:'把三行损坏的亮窗壁画压成 runs，再无损重建。',end:'第1章完成。前方仍然没有声音。'};document.getElementById('beat').textContent=S.stage.toUpperCase();document.getElementById('goal').textContent=goals[S.stage];document.getElementById('storage').style.width=S.storage+'%';document.getElementById('storageText').textContent=S.storage+'%';document.getElementById('storage').style.background=S.storage>85?'#e35c4d':'#58d477'}
function toast(t,d=2600){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),d)}
function open(html){panel.innerHTML=html;overlay.style.display='grid'}function close(){overlay.style.display='none'}
function rawBytes(w,h,d){return w*h*d/8}function runs(row){const out=[];for(const v of row){const q=out[out.length-1];if(q&&q.v===v)q.n++;else out.push({n:1,v})}return out}function decode(rr){return rr.flatMap(q=>Array(q.n).fill(q.v))}
function same(a,b){return a.length===b.length&&a.every((v,i)=>v===b[i])}
function arrival(){open('<h1>第 1 章 · 颜色的重量</h1><p>传送没有把你送出世界。</p><p>它把你送进了刚刚创造出的颜色内部。每一个 PIXEL 都很亮，也都很重。磁盘只剩最后一点空间，彩色道路正一格格掉回黑暗。</p><div class="formula bad">STORAGE 99% · WRITE FAILED</div><div class="actions"><button class="btn" id="go">接住正在掉落的颜色</button><button class="btn sub" id="back">返回第0章</button></div>');document.getElementById('go').onclick=()=>{close();setStage('weight');weightPanel()};document.getElementById('back').onclick=()=>location.href='index.html'}
function weightPanel(){const bytes=rawBytes(16,8,S.depth),ok=bytes<=64&&Math.pow(2,S.depth)>=16;open('<h2>称重门 · BITMAP PIXEL DATA</h2><p>colour depth 是每个像素用于表示颜色的位数。请让这张 16 × 8 位图装进 <b>64-byte</b> 缓冲区，并至少保留 <b>16 colours</b>。</p><div class="depths">'+[1,2,4,8].map(d=>'<button class="btn '+(d===S.depth?'sel':'')+'" data-d="'+d+'">'+d+'-bit<br><small>'+Math.pow(2,d)+' colours</small></button>').join('')+'</div><div class="formula">16 × 8 × <b>'+S.depth+'</b> bits ÷ 8 = <b class="'+(bytes<=64?'good':'bad')+'">'+bytes+' bytes</b></div><div class="preview">'+Array.from({length:128},(_,i)=>'<i style="filter:saturate('+(S.depth/4)+');opacity:'+(0.45+(i%4)*.15)+'"></i>').join('')+'</div><p class="meter">未压缩 pixel data 估算；不包含 file header。</p><div class="actions"><button class="btn" id="weigh" '+(!ok?'disabled':'')+'>写入当前图像</button></div>');panel.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>{S.depth=+b.dataset.d;save();weightPanel()});document.getElementById('weigh').onclick=()=>{S.storage=92;close();toast('16 × 8 × 4 ÷ 8 = 64 bytes。像素数据写入成功。');setTimeout(()=>{setStage('scan');startScan()},900)}}
function rowForStage(){if(S.stage==='scan')return ROWS.tutorial;if(S.stage==='mural')return ROWS.mural[S.muralRow];return ROWS.sky}
function resetScan(){S.pos=0;S.start=0;S.caps=[];S.fails=0}
function startScan(){resetScan();toast('向右走。颜色变化处会挡住你——按 E 封装刚走过的 run。',4200)}
function seal(){if(!['scan','mural'].includes(S.stage))return;const row=rowForStage(),end=S.pos,atBoundary=end===row.length-1||row[end+1]!==row[S.start];if(!atBoundary){S.fails++;S.flash=performance.now();toast(S.fails>=4?'换一条例子：XXXYY 可以封成 [3×X] [2×Y]。':S.fails>=2?'一个 run 只能包含连续、相同的颜色。先走到颜色变化处。':'这里还没有到颜色边界。');return}const n=end-S.start+1,v=row[S.start];S.caps.push({n,v});if(end===row.length-1){finishRow(row);return}S.start=end+1;S.pos=end+1;toast('封装 ['+n+' × '+v+']')}
function finishRow(row){const rebuilt=decode(S.caps);if(!same(row,rebuilt)){S.fails++;toast('解码后的像素与原图不同。像素喷回去了。');resetScan();return}if(S.stage==='scan'){S.storage=78;save();toast('本关模型：8 raw units → '+S.caps.length+' runs = '+(S.caps.length*2)+' storage units；解码完全相同。',4800);setTimeout(()=>{setStage('contrast');contrastPanel()},1900)}else{S.doneRows[S.muralRow]=S.caps.length;S.muralRow++;S.storage=Math.max(54,70-S.muralRow*5);if(S.muralRow>=ROWS.mural.length){save();toast('三行全部无损重建。压缩规则已部署到彩色道路。',3800);setTimeout(finishChapter,1600)}else{save();resetScan();toast('第 '+S.muralRow+' 行完成。继续下一行。')}}}
function contrastPanel(){const show=S.contrast;const card=(id,label,row)=>{const rr=runs(row),raw=row.length,packed=rr.length*2;return '<div class="choice" data-choice="'+id+'"><b>'+label+'</b><div class="rowview" style="grid-template-columns:repeat(8,1fr)">'+row.map(v=>'<i class="px" style="background:'+C[v]+'"></i>').join('')+'</div>'+(show?'<div class="meter">raw '+raw+' units → RLE '+rr.length+' runs = '+packed+' units <b class="'+(packed<raw?'good':'bad')+'">'+(packed<raw?'变小':'膨胀')+'</b></div>':'<div class="meter">点击选择把哪一行送入压缩器</div>')+'</div>'};open('<h2>反例室 · RLE 不是魔法</h2><p>本关简化存储模型：每个 <b>count</b> 和 <b>value</b> 各占 1 storage unit。先预测哪一行更适合 RLE。</p><div class="choices">'+card('sky','大片天空',ROWS.sky)+card('noise','噪点花丛',ROWS.noise)+'</div><div class="actions">'+(show?'<button class="btn" id="next" '+(show!=='sky'?'disabled':'')+'>把天空 runs 写入磁盘</button>':'')+'</div>');panel.querySelectorAll('[data-choice]').forEach(x=>x.onclick=()=>{S.contrast=x.dataset.choice;S.fails+=S.contrast==='noise'?1:0;contrastPanel();if(S.contrast==='noise')toast('按本关模型：8 pixels → 8 runs → 16 units，反而膨胀。',4200);else toast('连续同色形成长 run，RLE 才省空间。',3200)});const n=document.getElementById('next');if(n)n.onclick=()=>{S.storage=70;close();setStage('mural');resetScan();toast('最后任务：重建三行亮窗壁画。')}}
function finishChapter(){S.storage=42;setStage('end');addRecord();save();open('<div class="end"><h1>第 1 章 · 颜色的重量</h1><p>你没有删除任何一个像素。</p><p>你只是把连续的相同之物，记成了它们的数量与颜色。世界被完整地保留下来，却不再那么沉重。</p><div class="formula">RLE stores repeated consecutive values as count + value.<br>LOSSLESS · but not always smaller.</div>'+recordHtml()+'<div class="wave">'+Array.from({length:25},()=>'<i></i>').join('')+'</div><p>远处，一条波形正在跳动。你仍然听不见它。</p><p class="meter">NEXT: SOUND · SAMPLING</p><div class="actions" style="justify-content:center"><button class="btn" id="chapter2">进入第 2 章</button><button class="btn sub" id="again">重玩本章</button><button class="btn sub" id="zero">返回第0章</button></div></div>');document.getElementById('chapter2').onclick=()=>location.href='chapter2.html';document.getElementById('again').onclick=()=>{try{localStorage.removeItem(SAVE)}catch(e){}location.reload()};document.getElementById('zero').onclick=()=>location.href='index.html'}
function reopenStagePanel(){if(S.stage==='arrival')arrival();else if(S.stage==='weight')weightPanel();else if(S.stage==='contrast')contrastPanel();else if(S.stage==='end')finishChapter()}
function currentRowDraw(row,y){const cell=Math.min(68,(VW-90)/row.length),w=cell*row.length,x=(VW-w)/2;for(let i=0;i<row.length;i++){ctx.fillStyle=C[row[i]];ctx.globalAlpha=i<S.start ? .28 : 1;ctx.fillRect(x+i*cell,y,cell-3,cell-3);ctx.globalAlpha=1;if(i===S.pos){ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.strokeRect(x+i*cell-2,y-2,cell+1,cell+1)}}const px=x+S.pos*cell+cell/2,boundary=S.pos===row.length-1||row[S.pos+1]!==row[S.start];ctx.fillStyle='#dfffe7';ctx.fillRect(px-7,y-22,14,16);ctx.fillStyle='#7dffa0';ctx.fillRect(px-3,y-29,6,7);ctx.font=(boundary?'bold 16px ':'12px ')+'monospace';ctx.textAlign='center';ctx.fillStyle=boundary?'#fff':'#bfffcf';ctx.fillText(boundary?'[ E ]':'D →',px,boundary?y-42:y+cell+20);ctx.strokeStyle=boundary?'#fff9':'#72d98a66';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x+S.start*cell,y+cell+8);ctx.lineTo(x+(S.pos+1)*cell-3,y+cell+8);ctx.stroke();ctx.textAlign='left';return{x,w,cell}}
function draw(t){ctx.fillStyle='#020403';ctx.fillRect(0,0,VW,VH);const mid=VH*.58;for(let i=0;i<80;i++){const x=(i*137+t*.012)%VW,y=(i*71)%VH;ctx.fillStyle='rgba(80,215,115,'+(.025+(i%4)*.012)+')';ctx.fillText(i%2?'0':'1',x,y)}if(S.storage>85&&Math.floor(t/180)%13===0){ctx.fillStyle='rgba(255,70,70,.045)';ctx.fillRect((t*.17)%VW,0,7,VH)}ctx.strokeStyle='rgba(70,185,95,.25)';ctx.beginPath();ctx.moveTo(0,mid+80);ctx.lineTo(VW,mid+80);ctx.stroke();if(['scan','mural'].includes(S.stage)){const row=rowForStage();currentRowDraw(row,mid-20);ctx.font='14px monospace';ctx.fillStyle='#8fd4a0';ctx.textAlign='center';ctx.fillText(S.stage==='mural'?'MURAL ROW '+(S.muralRow+1)+' / 3':'SCAN THE COLOUR RUNS',VW/2,mid-65);let cx=VW/2-(S.caps.length*76)/2;S.caps.forEach(q=>{ctx.fillStyle=C[q.v];ctx.fillRect(cx,mid+105,64,28);ctx.fillStyle='#061008';ctx.fillText(q.n+' × '+q.v,cx+32,mid+124);cx+=76});ctx.textAlign='left'}if(S.stage==='end'){ctx.strokeStyle='#5de57d';ctx.lineWidth=2;ctx.strokeRect(VW*.32,VH*.32,VW*.36,VH*.28);for(let r=0;r<3;r++)for(let c=0;c<8;c++){ctx.fillStyle=C[ROWS.mural[r][c]];ctx.fillRect(VW*.4+c*18,VH*.39+r*18,16,16)}}}
function update(dt){}
function step(dir){if(!['scan','mural'].includes(S.stage)||overlay.style.display==='grid')return;const row=rowForStage();if(dir>0){const next=Math.min(row.length-1,S.pos+1);if(row[next]===row[S.start])S.pos=next;else toast('颜色变了。在边界按 E 封装这个 run。',1800)}else S.pos=Math.max(S.start,S.pos-1)}
const keys={};addEventListener('keydown',e=>{const k=e.key.toLowerCase();keys[k]=true;if(!e.repeat&&(k==='d'||k==='arrowright')){e.preventDefault();step(1)}if(!e.repeat&&(k==='a'||k==='arrowleft')){e.preventDefault();step(-1)}if(k==='e'||e.key==='Enter'){e.preventDefault();if(overlay.style.display!=='grid'&&['arrival','weight','contrast','end'].includes(S.stage))reopenStagePanel();else seal()}if(k==='h'){S.fails=Math.max(S.fails,2);toast(S.fails>=4?'同构例：XXXYY → [3×X] [2×Y]。':'观察相邻像素；颜色不再相同时，一个 run 才结束。',4200)}if(e.key==='Escape'&&overlay.style.display==='grid'&&S.stage!=='end'){close();toast('按 E 可重新打开当前终端。')}});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
function frame(t){const dt=Math.min(.05,(t-last)/1000);last=t;update(dt);draw(t);requestAnimationFrame(frame)}
load();
const qs=new URLSearchParams(location.search),qstage=qs.get('stage')||qs.get('scene');
if(qstage&&stages.includes(qstage)){S.stage=qstage;S.pos=0;S.start=0;S.caps=[];if(qstage==='mural'){S.muralRow=0;S.doneRows=[]}}
if(qs.has('test')){
  console.assert(rawBytes(16,8,4)===64,'bitmap size');
  console.assert(runs(ROWS.tutorial).length===3,'tutorial runs');
  console.assert(same(decode(runs(ROWS.tutorial)),ROWS.tutorial),'lossless roundtrip');
  console.assert(runs(ROWS.sky).length*2<ROWS.sky.length,'RLE suitable');
  console.assert(runs(ROWS.noise).length*2>ROWS.noise.length,'RLE expansion');
}
updateHud();requestAnimationFrame(frame);if(S.stage==='arrival')arrival();else if(S.stage==='weight')weightPanel();else if(S.stage==='contrast')contrastPanel();else if(S.stage==='end')finishChapter();else toast('进度已恢复。');
</script>
<script src="course-guide.js"></script>
</body></html>
