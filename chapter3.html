function drawObjects(){const x=VW*.5,y=VH*.45,size=Math.min(270,VH*.38),have=S.stage==='guided_g1_objects'?selectedCorrectObjects():new Set(['RECT','CIRCLE','LINE']);ctx.save();ctx.globalAlpha=.17;glyph(ctx,x,y,size,1,2);ctx.restore();if(have.has('RECT')){ctx.save();ctx.strokeStyle='#7dfff5';ctx.lineWidth=3;ctx.strokeRect(x-size*.32,y-size*.30,size*.64,size*.66);ctx.restore()}if(have.has('CIRCLE')){ctx.save();ctx.fillStyle='#91ffad';ctx.strokeStyle='#dffffa';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y-size*.30,size*.075,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore()}if(have.has('LINE')){ctx.save();ctx.strokeStyle='#91ffad';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x-size*.22,y+size*.18);ctx.lineTo(x,y-size*.07);ctx.lineTo(x+size*.22,y+size*.18);ctx.stroke();ctx.restore()}label(x,y+size*.44,have.size+' / 3 OBJECT TYPES')}

function trapOverlayKey(e){if($('overlay').style.display!=='grid')return false;if(e.key==='Tab'){const items=[...$('panel').querySelectorAll('button,a,[tabindex]:not([tabindex="-1"])')].filter(x=>!x.disabled);if(items.length){const first=items[0],last=items[items.length-1],active=document.activeElement;if(active===$('overlayTitle')){e.preventDefault();(e.shiftKey?last:first).focus()}else if(e.shiftKey&&active===first){e.preventDefault();last.focus()}else if(!e.shiftKey&&active===last){e.preventDefault();first.focus()}}return true}if(e.key==='Escape'&&!['course','evidence'].includes(overlayKind)){e.preventDefault();e.stopImmediatePropagation();returnFromHelp();return true}return true}

function memoryStorage(initial,failSet){const data=new Map(Object.entries(initial||{}));let reads=0,writes=0;return{getItem(key){reads++;return data.has(key)?data.get(key):null},setItem(key,value){if(failSet)throw new Error('set failed');writes++;data.set(key,String(value))},removeItem(key){data.delete(key)},stats(){return{reads,writes,data}}}}

exclusions');assert(corpus.includes('drawing object')&&corpus.includes('property')&&corpus.includes('drawing list')&&corpus.includes('bitmap')&&corpus.includes('vector'),'S02 required terms');const map=bitmapFixture(),storage=memoryStorage({[COURSE_KEY]:JSON.stringify(map)}),runtime={phase:'CHECKPOINT',stage:'checkpoint_p4',inputSource:'PLAYER_VERIFY',search:'',hash:'',usedSafetyNet:false,attempts:1};assert(commitVectorEvidence(exact,runtime,storage,100),'E01 commit');const saved=safeParse(storage.getItem(COURSE_KEY));assert(Seq.nodeEvidencePassed(saved,'vector'),'E02 predicate');assert(saved.sentinel.keep===true&&Object.keys(saved.nodeEvidence.vector.facts).length===4,'E03 preserve + four facts');const noPre=memoryStorage({[COURSE_KEY]:JSON.stringify({version:1,nodes:{bitmap:true},nodeEvidence:{}})});assert(!commitVectorEvidence(exact,runtime,noPre,100)&&noPre.stats().writes===0,'E04 prerequisite');const debug=memoryStorage({[COURSE_KEY]:JSON.stringify(map)});assert(!commitVectorEvidence(exact,Object.assign({},runtime,{search:'?test'}),debug,100)&&debug.stats().reads===0&&debug.stats().writes===0,'E05 debug zero IO');const auto=memoryStorage({[COURSE_KEY]:JSON.stringify(map)});assert(!commitVectorEvidence(exact,Object.assign({},runtime,{inputSource:'MILESTONE_AUTO'}),auto,100)&&auto.stats().writes===0,'E06 milestone rejected');const failed=memoryStorage({[COURSE_KEY]:JSON.stringify(map)},true);assert(!commitVectorEvidence(exact,runtime,failed,100),'E07 write failure');const reset=defaultState();reset.stage='checkpoint_p4';reset.taskSelections.checkpoint_p4={medium:'BITMAP'};const clean=serializableState(reset);assert(clean.stage==='checkpoint_p1'&&!clean.taskSelections.checkpoint_p4,'E08 checkpoint reload reset');assert(!Seq.nodeEvidencePassed({version:1,nodes:{ACK:true},nodeEvidence:{ACK:{checkpointId:undefined,answerSetVersion:1,passed:true,facts:{}}}},'ACK'),'E09 unknown node rejected');assert(recordHtml().includes('LOCAL RUNS · THIS DEVICE'),'U05 local label');window.__chapter2TestResults={passed:results.every(x=>x.passed),count:results.length,failed:results.filter(x=>!x.passed),results};document.documentElement.dataset.testPassed=String(window.__chapter2TestResults.passed);document.documentElement.dataset.testCount=String(results.length);console.info('[CHAPTER2 VECTOR TEST]',window.__chapter2TestResults)}
