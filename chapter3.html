<script>
'use strict';
const Seq=globalThis.GenesisSequence;if(!Seq)throw new Error('sequence-schema.js required');
function isNormalRoute(search,hash){const entries=[...new URLSearchParams(search).entries()];return hash===''&&(entries.length===0||(entries.length===1&&entries[0][0]==='from'&&entries[0][1]==='course-map'))}
const NORMAL_ROUTE=isNormalRoute(location.search,location.hash),SAVE='genesis_vector_v2',RECORDS='genesis_vector_records_v2',LEGACY_SAVE='genesis_ch3_v1',LEGACY_RECORDS='genesis_ch3_records_v1',COURSE_KEY='genesis_course_map_v1',cv=document.getElementById('draw'),ctx=cv.getContext('2d'),overlay=document.getElementById('overlay'),panel=document.getElementById('panel'),lab=document.getElementById('lab');
const stages=['arrival','objects','scale','medium','awakening','plot','end'],needed=['RECT','CIRCLE','LINE'],zooms=[1,2,4],cases=[{name:'指路标志',desc:'少量形状、纯色；要在手表与塔门之间反复缩放。',answer:'VECTOR'},{name:'废墟全景',desc:'连续色调、光影与成千上万处细节。',answer:'BITMAP'}];
let VW=0,VH=0,dpr=1,toastTimer=0,plotStart=0;
const S={stage:'arrival',objects:[],zoom:1,medium:'VECTOR',caseIndex:0,integrity:0,fails:0,startedAt:Date.now(),recorded:false,legacySource:false,evidenceRecorded:false,milestones:{objects:false,scale:false,vectorCase:false,bitmapCase:false,plot:false}};
const raster=document.createElement('canvas');raster.width=raster.height=48;const rx=raster.getContext('2d');
function resize(){dpr=Math.min(2,devicePixelRatio||1);VW=innerWidth;VH=innerHeight;cv.width=VW*dpr;cv.height=VH*dpr;cv.style.width=VW+'px';cv.style.height=VH+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',resize);resize();
function safeGet(k){if(!NORMAL_ROUTE)return null;try{return localStorage.getItem(k)}catch(e){return null}}function safeSet(k,v){if(!NORMAL_ROUTE)return false;try{localStorage.setItem(k,v);return true}catch(e){return false}}
function validSave(x){return x&&stages.includes(x.stage)}
function save(){if(!NORMAL_ROUTE||S.legacySource)return false;return safeSet(SAVE,JSON.stringify({version:2,contentId:Seq.IDS.vector,stage:S.stage,objects:S.objects,zoom:S.zoom,medium:S.medium,caseIndex:S.caseIndex,integrity:S.integrity,fails:S.fails,startedAt:S.startedAt,recorded:S.recorded,evidenceRecorded:S.evidenceRecorded,milestones:S.milestones}))}
function load(){if(!NORMAL_ROUTE)return;try{let x=JSON.parse(safeGet(SAVE)||'null'),semantic=validSave(x)&&x.version===2&&x.contentId===Seq.IDS.vector;if(!semantic){x=JSON.parse(safeGet(LEGACY_SAVE)||'null');if(validSave(x))S.legacySource=true}if(!validSave(x))return;S.stage=x.stage;S.objects=Array.isArray(x.objects)?x.objects.filter(v=>needed.includes(v)).filter((v,i,a)=>a.indexOf(v)===i):[];S.zoom=zooms.includes(x.zoom)?x.zoom:1;S.medium=['VECTOR','BITMAP'].includes(x.medium)?x.medium:'VECTOR';S.caseIndex=Math.max(0,Math.min(1,Number.isInteger(x.caseIndex)?x.caseIndex:0));S.integrity=Math.max(0,Math.min(100,Number.isFinite(x.integrity)?x.integrity:0));S.fails=Math.max(0,Number.isInteger(x.fails)?x.fails:0);S.startedAt=Number.isFinite(x.startedAt)?x.startedAt:Date.now();S.recorded=x.recorded===true;if(!S.legacySource&&semantic){const m=x.milestones||{};S.milestones={objects:m.objects===true,scale:m.scale===true,vectorCase:m.vectorCase===true,bitmapCase:m.bitmapCase===true,plot:m.plot===true};S.evidenceRecorded=x.evidenceRecorded===true}}catch(e){}}
function cleanRecords(key){try{const a=JSON.parse(safeGet(key)||'[]');return Array.isArray(a)?a.filter(x=>Number.isFinite(x.sec)).slice(0,5):[]}catch(e){return []}}
function records(){return NORMAL_ROUTE?cleanRecords(RECORDS):[]}function legacyRecords(){return NORMAL_ROUTE?cleanRecords(LEGACY_RECORDS):[]}
function isObject(v){return Boolean(v)&&typeof v==='object'&&!Array.isArray(v)}function clone(v){return JSON.parse(JSON.stringify(v))}
function parseCourse(raw){if(typeof raw!=='string'||!raw)return null;try{const map=JSON.parse(raw);return isObject(map)&&map.version===1?map:null}catch(e){return null}}
function completionReady(){return S.milestones.objects&&S.milestones.scale&&S.milestones.vectorCase&&S.milestones.bitmapCase&&S.milestones.plot}
function commitVectorEvidence(now=Date.now()){
 if(!NORMAL_ROUTE||S.legacySource||!completionReady())return{committed:false,verified:false,reason:NORMAL_ROUTE?'INCOMPLETE_OR_LEGACY':'PREVIEW'};
 const raw=safeGet(COURSE_KEY),map=parseCourse(raw);if(!map)return{committed:false,verified:false,reason:'COURSE_MAP_UNAVAILABLE'};
 const already=Seq.nodeEvidencePassed(map,'vector');if(!Seq.nodeEvidencePassed(map,'bitmap'))return{committed:false,verified:already,reason:'BITMAP_PREREQUISITE'};
 const next=clone(map);next.nodes=isObject(next.nodes)?next.nodes:{};next.nodeEvidence=isObject(next.nodeEvidence)?next.nodeEvidence:{};const old=isObject(next.nodeEvidence.vector)?next.nodeEvidence.vector:{},oldFacts=isObject(old.facts)?old.facts:{};
 next.nodes.vector=true;next.nodeEvidence.vector=Object.assign({},old,{checkpointId:Seq.IDS.vector,answerSetVersion:1,passed:true,scaffolded:old.scaffolded===true,attempts:Math.max(1,Number(old.attempts)||0),passedAt:Number.isFinite(old.passedAt)?old.passedAt:now,lastPassedAt:now,facts:Object.assign({},oldFacts,Object.fromEntries(Seq.NODE_FACTS.vector.map(name=>[name,true])))});next.updatedAt=now;
 const encoded=JSON.stringify(next);if(!safeSet(COURSE_KEY,encoded))return{committed:false,verified:already,reason:'WRITE_FAILED'};const back=safeGet(COURSE_KEY),verified=parseCourse(back);if(back===encoded&&Seq.nodeEvidencePassed(verified,'vector'))return{committed:true,verified:true,reason:'VERIFIED'};if(typeof raw==='string')safeSet(COURSE_KEY,raw);return{committed:false,verified:already,reason:'READBACK_FAILED'};
}
function addRecord(){if(!NORMAL_ROUTE||S.recorded||!S.evidenceRecorded)return false;const rec={sec:Math.max(1,Math.round((Date.now()-S.startedAt)/1000)),fails:S.fails,ts:Date.now()},a=records();a.push(rec);a.sort((x,y)=>x.sec-y.sec||x.fails-y.fails||x.ts-y.ts);if(!safeSet(RECORDS,JSON.stringify(a.slice(0,5))))return false;S.recorded=true;save();return true}
function rows(a){return a.length?a.map((r,i)=>(i+1)+'. '+Math.floor(r.sec/60)+':'+String(r.sec%60).padStart(2,'0')+' · '+r.fails+' retries').join('<br>'):'none'}
function recordHtml(){const current=records(),legacy=legacyRecords();return '<div class="callout records"><b>LOCAL RUNS · THIS DEVICE</b><br>'+rows(current)+(legacy.length?'<br><br><b>LEGACY RUNS · VECTOR</b><br>'+rows(legacy):'')+'</div>'}
function toast(t,d=3000){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>e.classList.remove('show'),d)}function open(h){panel.innerHTML=h;overlay.style.display='grid'}function close(){overlay.style.display='none'}
function setStage(s){S.stage=s;if(s==='objects'){S.objects=[];S.integrity=18}else if(s==='scale'){S.zoom=1;S.integrity=46}else if(s==='medium'){S.caseIndex=0;S.medium='VECTOR';S.integrity=70}else if(s==='awakening')S.integrity=88;else if(s==='plot')S.integrity=96;else if(s==='end')S.integrity=100;updateUI();save()}
function button(label,fn,active=false){const b=document.createElement('button');b.className='mini'+(active?' active':'');b.textContent=label;b.onclick=fn;return b}
function updateUI(){const goals={arrival:'第 2 章 · §1.2 Vector：用 drawing objects 和 properties 表示图形。',objects:'教学 1/3 · 把图形拆成对象；每个对象保存自己的属性。',scale:'教学 2/3 · 放大同一图形，比较复制像素与重新执行绘图指令。',medium:'应用 3/3 · 为简单图形与复杂连续色调选择合适表示法。',awakening:'绘图列表、缩放规则与表示法都已恢复。',plot:'机械臂正在逐条执行对象指令。',end:'第 2 章完成。Vector 表示已经建立。'};document.getElementById('beat').textContent=S.stage.toUpperCase();document.getElementById('goal').textContent=goals[S.stage];document.getElementById('integrityFill').style.width=S.integrity+'%';document.getElementById('integrityText').textContent=S.integrity+'%';document.getElementById('bg').style.filter='brightness('+(0.46+S.integrity*.0046)+') saturate('+(0.70+S.integrity*.005)+')';const active=['objects','scale','medium'].includes(S.stage);lab.style.display=active?'block':'none';if(!active)return;const lines=S.objects.map((v,i)=>(i+1).toString().padStart(2,'0')+'  '+(v==='RECT'?'RECT x:18 y:18 w:64 h:70 fill:none':v==='CIRCLE'?'CIRCLE cx:50 cy:18 r:7 fill:cyan':'LINE x1:28 y1:62 x2:50 y2:42 stroke:green')).join('<br>');document.getElementById('programLines').innerHTML=lines||'// waiting for objects';const controls=document.getElementById('controls');controls.innerHTML='';if(S.stage==='objects'){document.getElementById('missionText').innerHTML='<b>OBJECT PROPERTIES</b><br>用三个对象恢复门：矩形保存位置与宽高；圆保存圆心与半径；线保存两个端点。';[['1 · RECT','RECT'],['2 · CIRCLE','CIRCLE'],['3 · LINE','LINE']].forEach(x=>controls.appendChild(button(x[0],()=>addObject(x[1]),S.objects.includes(x[1]))));controls.appendChild(button('E · COMPILE',compileObjects));document.getElementById('constraint').textContent='对象不是像素清单；它是一条带属性的绘图指令。'}else if(S.stage==='scale'){document.getElementById('missionText').innerHTML='<b>SCALE TEST · '+S.zoom+'×</b><br>左：复制已经画好的像素。右：按对象属性重新计算边缘。';zooms.forEach(z=>controls.appendChild(button(z+'×',()=>setZoom(z),S.zoom===z)));controls.appendChild(button('E · CONFIRM',confirmScale));document.getElementById('constraint').textContent='至少放大到 4×，观察左侧阶梯边缘和右侧连续轮廓。'}else{const c=cases[S.caseIndex];document.getElementById('missionText').innerHTML='<b>CARGO '+(S.caseIndex+1)+' / 2 · '+c.name+'</b><br>'+c.desc;['VECTOR','BITMAP'].forEach(m=>controls.appendChild(button(m,()=>chooseMedium(m),S.medium===m)));controls.appendChild(button('E · LOAD',lockMedium));document.getElementById('constraint').textContent='矢量适合简单图形与缩放；位图适合照片和复杂连续色调。'}}
function arrival(){open('<h1>第 2 章 · 没有碎掉的门</h1><div class="callout"><b>CAIE 9618 (2026) §1.2 · VECTOR GRAPHICS</b><br>PRIOR · Chapter 1 Bitmap<br>THIS CHAPTER · drawing objects/properties → scalable redraw → suitable use<br>NEXT · Chapter 3 Sound</div><p>这扇门没有像远处的像素壁画那样露出方格。它离得越近，边缘只是变得更清楚。</p><p>绘图机从不逐点记住整幅图。它记住的是对象：在哪里开始、延伸多远、填什么颜色、边线多粗。</p><div class="callout">DRAWING LIST = OBJECTS + PROPERTIES</div><p>把门写回绘图列表。然后亲眼确认，为什么一种图像能够不受尺寸束缚。</p><div class="actions"><button class="btn" id="enter">开始教学 · 唤醒绘图机</button><button class="btn sub" id="prev">返回第 1 章 · Bitmap</button></div>');document.getElementById('enter').onclick=()=>{close();setStage('objects');toast('教学 1/3：用 1、2、3 添加 drawing objects。',3800)};document.getElementById('prev').onclick=()=>location.href='chapter1.html'}
function addObject(v){if(S.stage!=='objects'||S.objects.includes(v))return;S.objects.push(v);S.integrity=18+S.objects.length*8;updateUI();save();toast(v+' 已写入绘图列表。')}
function compileObjects(){if(S.stage!=='objects')return;const missing=needed.filter(x=>!S.objects.includes(x));if(missing.length){S.fails++;toast('列表还缺 '+missing.join(' / ')+'。每种对象承担不同的轮廓。',3800);return}S.milestones.objects=true;save();toast('三条对象指令重建了同一扇门。下一步：改变尺寸。',3600);setTimeout(()=>setStage('scale'),900)}
function setZoom(z){if(S.stage!=='scale')return;S.zoom=z;updateUI();save()}function shiftZoom(d){const i=zooms.indexOf(S.zoom);setZoom(zooms[Math.max(0,Math.min(zooms.length-1,i+d))])}
function confirmScale(){if(S.stage!=='scale')return;if(S.zoom<4){S.fails++;toast('再放大一些。边缘的差别还没有完全暴露。');return}S.milestones.scale=true;save();toast('位图放大复制像素；矢量放大后重新计算对象轮廓。',4100);setTimeout(()=>setStage('medium'),1000)}
function chooseMedium(m){if(S.stage!=='medium')return;S.medium=m;updateUI();save()}function shiftMedium(){chooseMedium(S.medium==='VECTOR'?'BITMAP':'VECTOR')}
function lockMedium(){if(S.stage!=='medium')return;const c=cases[S.caseIndex];if(S.medium!==c.answer){S.fails++;toast(c.answer==='VECTOR'?'这件货物只由少量几何形状组成，还要反复缩放。试试保存对象指令。':'照片没有少数几何对象可以描述；逐像素保存更合适。',4200);return}if(S.caseIndex===0){S.milestones.vectorCase=true;S.caseIndex=1;S.medium='VECTOR';updateUI();save();toast('标志装入 VECTOR。下一件货物包含连续光影。',3200)}else{S.milestones.bitmapCase=true;save();toast('全景装入 BITMAP。表示法选择完成。',3200);setTimeout(()=>{setStage('awakening');awakening()},900)}}
function awakening(){open('<h2>绘图机等待最后一条命令</h2><p>门不再是一张固定尺寸的图片。它是一个对象列表：矩形、圆、直线，以及每个对象的坐标、尺寸、填充与边线属性。</p><p>每当尺寸改变，绘图机都会重新执行这些指令，所以边缘不需要复制旧像素。</p><div class="callout">VECTOR FILE = OBJECTS + PROPERTIES<br>best for simple graphics · not photographs</div><div class="actions"><button class="btn" id="plot">运行绘图指令</button></div>');document.getElementById('plot').onclick=()=>{close();beginPlot()}}
function beginPlot(resume=false){setStage('plot');S.milestones.plot=true;save();plotStart=performance.now();if(!resume)toast('机械臂正在执行 RECT → CIRCLE → LINE。',3500);setTimeout(finish,3000)}
function evidenceHtml(){if(!NORMAL_ROUTE)return'<div class="callout">PREVIEW COMPLETE · FORMAL SAVE / RECORDS / COURSE EVIDENCE DISABLED</div>';if(S.legacySource)return'<div class="callout">LEGACY PLAYTHROUGH · VECTOR · NO CANONICAL EVIDENCE<br>Replay this chapter to create the new semantic checkpoint.</div>';const map=parseCourse(safeGet(COURSE_KEY));if(Seq.nodeEvidencePassed(map,'vector'))return'<div class="callout">VECTOR CHECKPOINT · EVIDENCED<br>'+Seq.IDS.vector+'<br>'+Seq.NODE_FACTS.vector.join(' · ')+'</div>';return'<div class="callout">PLAYTHROUGH COMPLETE · EVIDENCE NOT SAVED<br>CH.01 Bitmap full evidence and verified Course Map storage are required.</div>'}
function finish(){if(S.stage==='end'){showEnd();return}setStage('end');const result=commitVectorEvidence();S.evidenceRecorded=result.committed===true;if(result.committed)addRecord();save();showEnd()}
function restartVector(){S.stage='arrival';S.objects=[];S.zoom=1;S.medium='VECTOR';S.caseIndex=0;S.integrity=0;S.fails=0;S.startedAt=Date.now();S.recorded=false;S.legacySource=false;S.evidenceRecorded=false;S.milestones={objects:false,scale:false,vectorCase:false,bitmapCase:false,plot:false};save();location.reload()}
function showEnd(){open('<div class="end"><h1>第 2 章 · 没有碎掉的门</h1><p>门被重新绘制，而不是被放大。</p><p>位图保存像素；矢量图保存绘图对象及属性。简单图形可以用更少的数据自由缩放，照片般复杂的连续色调仍属于位图。</p><div class="callout">coordinates · dimensions · fill · stroke · line width<br>SCALABLE · EDITABLE · OBJECT-BASED</div>'+evidenceHtml()+recordHtml()+'<div class="doorline"></div><p>门后传来一条连续波形。下一章要把 analogue sound 转换成数字样本，并观察 sampling choices 对质量与文件大小的影响。</p><p class="hint">NEXT: §1.2 SOUND</p><div class="actions" style="justify-content:center"><button class="btn" id="chapter3">进入第 3 章 · Sound</button><button class="btn sub" id="again">重玩本章</button><button class="btn sub" id="one">返回第 1 章 · Bitmap</button><button class="btn sub" id="zero">返回第 0 章</button></div></div>');document.getElementById('chapter3').onclick=()=>location.href='chapter2.html';document.getElementById('again').onclick=restartVector;document.getElementById('one').onclick=()=>location.href='chapter1.html';document.getElementById('zero').onclick=()=>location.href='index.html'}
function reopen(){if(S.stage==='arrival')arrival();else if(S.stage==='awakening')awakening();else if(S.stage==='end')showEnd()}
function glyph(c,x,y,size,alpha=1,line=2.2){c.save();c.globalAlpha=alpha;c.translate(x-size/2,y-size/2);c.strokeStyle='#86fff5';c.fillStyle='#8effaa';c.lineWidth=line;c.lineJoin='round';c.strokeRect(size*.18,size*.20,size*.64,size*.66);c.beginPath();c.arc(size*.5,size*.20,size*.075,0,Math.PI*2);c.fill();c.stroke();c.strokeStyle='#91ffad';c.beginPath();c.moveTo(size*.28,size*.68);c.lineTo(size*.5,size*.43);c.lineTo(size*.72,size*.68);c.stroke();c.restore()}
function makeRaster(){rx.clearRect(0,0,48,48);glyph(rx,24,24,44,1,1.4)}makeRaster();
function label(x,y,t,color='#a7d8d1'){ctx.save();ctx.font='12px Consolas,monospace';ctx.textAlign='center';ctx.fillStyle=color;ctx.fillText(t,x,y);ctx.restore()}
function drawObjects(){const x=VW*.5,y=VH*.47,size=Math.min(280,VH*.42),have=new Set(S.objects);ctx.save();ctx.globalAlpha=.18;glyph(ctx,x,y,size,1,2);ctx.restore();if(have.has('RECT')){ctx.save();ctx.strokeStyle='#7dfff5';ctx.lineWidth=3;ctx.strokeRect(x-size*.32,y-size*.30,size*.64,size*.66);ctx.restore()}if(have.has('CIRCLE')){ctx.save();ctx.fillStyle='#91ffad';ctx.strokeStyle='#dffffa';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y-size*.30,size*.075,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore()}if(have.has('LINE')){ctx.save();ctx.strokeStyle='#91ffad';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x-size*.22,y+size*.18);ctx.lineTo(x,y-size*.07);ctx.lineTo(x+size*.22,y+size*.18);ctx.stroke();ctx.restore()}label(x,y+size*.44,S.objects.length+' / 3 OBJECTS')}
function drawScale(){const size=Math.min(48*S.zoom,VH*.31),y=VH*.46,lx=VW*.32,rxp=VW*.68;ctx.save();ctx.imageSmoothingEnabled=false;ctx.drawImage(raster,lx-size/2,y-size/2,size,size);ctx.restore();glyph(ctx,rxp,y,size,1,Math.max(1.6,size*.018));label(lx,y+size/2+27,'BITMAP · COPY PIXELS',S.zoom===4?'#ff9b87':'#a7d8d1');label(rxp,y+size/2+27,'VECTOR · REDRAW OBJECTS','#91ffad')}
function drawMedium(){const c=cases[S.caseIndex],x=VW*.5,y=VH*.43,size=Math.min(260,VH*.34);ctx.save();ctx.fillStyle='rgba(1,12,10,.7)';ctx.strokeStyle=S.medium==='VECTOR'?'#7dfff5':'#e6b75b';ctx.lineWidth=2;ctx.fillRect(x-size*.75,y-size*.52,size*1.5,size*1.04);ctx.strokeRect(x-size*.75,y-size*.52,size*1.5,size*1.04);if(S.caseIndex===0)glyph(ctx,x,y,size*.66,1,2.4);else{const bg=document.getElementById('bg');if(bg.complete&&bg.naturalWidth){ctx.globalAlpha=.88;ctx.drawImage(bg,x-size*.64,y-size*.40,size*1.28,size*.80);ctx.globalAlpha=1}}ctx.restore();label(x,y+size*.68,c.name+' → '+S.medium,S.medium==='VECTOR'?'#7dfff5':'#e6b75b')}
function drawPlot(t){const p=Math.max(0,Math.min(1,(t-plotStart)/2600)),x=VW*.5,y=VH*.47,size=Math.min(300,VH*.44);ctx.save();ctx.globalAlpha=.22;glyph(ctx,x,y,size,1,2);ctx.restore();if(p>.08){ctx.save();ctx.strokeStyle='#7dfff5';ctx.lineWidth=3;ctx.globalAlpha=Math.min(1,(p-.08)/.28);ctx.strokeRect(x-size*.32,y-size*.30,size*.64,size*.66);ctx.restore()}if(p>.38){ctx.save();ctx.fillStyle='#91ffad';ctx.strokeStyle='#e4fffb';ctx.globalAlpha=Math.min(1,(p-.38)/.22);ctx.beginPath();ctx.arc(x,y-size*.30,size*.075,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore()}if(p>.62){ctx.save();ctx.strokeStyle='#91ffad';ctx.lineWidth=3;ctx.globalAlpha=Math.min(1,(p-.62)/.28);ctx.beginPath();ctx.moveTo(x-size*.22,y+size*.18);ctx.lineTo(x,y-size*.07);ctx.lineTo(x+size*.22,y+size*.18);ctx.stroke();ctx.restore()}label(x,y+size*.45,'EXECUTING OBJECT '+Math.min(3,Math.max(1,Math.ceil(p*3)))+' / 3')}
function draw(t){ctx.clearRect(0,0,VW,VH);if(S.stage==='objects')drawObjects();else if(S.stage==='scale')drawScale();else if(S.stage==='medium')drawMedium();else if(S.stage==='plot')drawPlot(t);else if(S.stage==='end'){const glow=.75+Math.sin(t*.003)*.2;glyph(ctx,VW*.5,VH*.47,Math.min(310,VH*.45),glow,3)}}function frame(t){draw(t);requestAnimationFrame(frame)}
addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(S.stage==='objects'&&['1','2','3'].includes(k)){e.preventDefault();addObject(needed[Number(k)-1])}if((k==='d'||k==='arrowright')&&overlay.style.display!=='grid'){e.preventDefault();if(S.stage==='scale')shiftZoom(1);else if(S.stage==='medium')shiftMedium()}if((k==='a'||k==='arrowleft')&&overlay.style.display!=='grid'){e.preventDefault();if(S.stage==='scale')shiftZoom(-1);else if(S.stage==='medium')shiftMedium()}if(k==='e'||e.key==='Enter'){e.preventDefault();if(overlay.style.display!=='grid'&&['arrival','awakening','end'].includes(S.stage))reopen();else if(overlay.style.display!=='grid'){if(S.stage==='objects')compileObjects();else if(S.stage==='scale')confirmScale();else if(S.stage==='medium')lockMedium()}}if(k==='h')toast(S.stage==='objects'?'位置、尺寸、填充、边线都是对象的属性。':S.stage==='scale'?'位图只能把已有像素变大；矢量会在新尺寸重新计算边缘。':'标志通常可拆成少量对象；照片的颜色与细节无法这样简写。',4400);if(e.key==='Escape'&&overlay.style.display==='grid'&&S.stage!=='end'){close();toast('按 E 可重新打开当前终端。')}});
if(NORMAL_ROUTE)load();const qs=new URLSearchParams(location.search),qstage=qs.get('stage')||qs.get('scene');if(qstage&&stages.includes(qstage)){S.stage=qstage;S.integrity={arrival:0,objects:18,scale:46,medium:70,awakening:88,plot:96,end:100}[qstage];if(qstage==='objects')S.objects=[];if(qstage==='scale'){S.objects=needed.slice();S.zoom=1}if(qstage==='medium'){S.objects=needed.slice();S.caseIndex=0;S.medium='VECTOR'}}
if(qs.has('test')){console.assert(needed.length===3&&new Set(needed).size===3,'three unique objects');console.assert(zooms[zooms.length-1]===4,'comparison reaches 4x');console.assert(cases[0].answer==='VECTOR'&&cases[1].answer==='BITMAP','representation suitability');console.assert(raster.width===48&&raster.height===48,'raster source');console.assert(Seq.IDS.vector==='vector_encoding_suitability_v1'&&Seq.NODE_FACTS.vector.join(',')==='vectorEncoding,drawingObjectPropertyList,bitmapVectorSuitability,taskJustification','canonical Vector contract');console.assert(isNormalRoute('','')&&isNormalRoute('?from=course-map','')&&!isNormalRoute('?test','')&&!isNormalRoute('?stage=plot','')&&!isNormalRoute('?debug','')&&!isNormalRoute('?from=course-map&debug=1','')&&!isNormalRoute('','#debug'),'strict route guard');const f=Object.fromEntries(Seq.NODE_FACTS.vector.map(name=>[name,true])),fixture={version:1,nodes:{vector:true},nodeEvidence:{vector:{checkpointId:Seq.IDS.vector,answerSetVersion:1,passed:true,facts:f}}};console.assert(Seq.nodeEvidencePassed(fixture,'vector'),'full Vector predicate');fixture.nodeEvidence.vector.facts.taskJustification=false;console.assert(!Seq.nodeEvidencePassed(fixture,'vector'),'Vector false fact rejected')}
updateUI();requestAnimationFrame(frame);if(S.stage==='arrival')arrival();else if(S.stage==='awakening')awakening();else if(S.stage==='plot')beginPlot(true);else if(S.stage==='end')showEnd();else toast(NORMAL_ROUTE?'绘图进度已恢复。':'PREVIEW ROUTE · FORMAL STORAGE DISABLED');
</script>
