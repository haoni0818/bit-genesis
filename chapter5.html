 try{let rows=JSON.parse(localStorage.getItem(RECORDS_KEY)||'[]');if(!Array.isArray(rows))rows=[];rows.push(run);rows.sort((a,b)=>a.sec-b.sec||a.hints-b.hints||a.errors-b.errors);localStorage.setItem(RECORDS_KEY,JSON.stringify(rows.slice(0,5)));S.recordWritten=true}catch(_){recordsUnavailable=true}
 try{localStorage.setItem(SAVE_KEY,JSON.stringify(Object.assign(serializableState(),{stage:'evidence',evidenceRecorded:true,recordWritten:S.recordWritten})));saveUnavailable=false}catch(_){saveUnavailable=true}
}
function commitValidated(){
 S.stage='commit_evidence';render();let ok=false;
 if(PREDECESSOR_OK&&validatedSubmission&&validatedRuntime)ok=commitNetworkFoundationsEvidence(validatedSubmission,validatedRuntime,localStorage);
 if(ok){
  const retainedReplay=replayRetained;S.evidenceRecorded=true;ALREADY_PASSED=true;S.stage='evidence';refreshEligibility();writeRunAndFinalSave();render();showEvidence(retainedReplay);return;
 }
 if(ALREADY_PASSED){S.evidenceRecorded=true;S.stage='evidence';render();showEvidence(true);return}
 S.evidenceRecorded=false;S.stage=PREDECESSOR_OK?'evidence_retry':'evidence';render();showEvidence(false);
}
function retryEvidence(){if(validatedSubmission&&validatedRuntime)commitValidated();else beginCheckpoint()}
function showEvidence(retained=false,source=null){
 const ok=ALREADY_PASSED&&S.evidenceRecorded,title=ok?'CH.05 CHECKPOINT · 5 / 5 PASSED':S.stage==='evidence_retry'?'PLAYTHROUGH COMPLETE · EVIDENCE NOT SAVED':'PREVIEW COMPLETE · EVIDENCE NOT RECORDED';
 openOverlay('<h1 id="overlayTitle">'+title+'</h1>'+(ok?'<div class="callout"><b>OFFICIAL EVIDENCE · network_foundations_v1</b><br>answer set 1 · network_foundations_checkpoint_p1_p5_v1</div>'+FACT_NAMES.map(name=>'<div class="evidence-row">✓ '+name+'</div>').join('')+'<div class="callout boundary"><b>§2.1 STATUS · PARTIAL</b><br>N1 COMPLETE · N2 NEXT NETWORK NODE UNLOCKED<br>The rest of §2.1 is not evidenced by this checkpoint.</div><p>'+(retained?'Prior strict evidence retained; this replay was not ranked.':'Exact local evidence was committed after Compression v2 was rechecked.')+'</p>'+recordHtml():'<div class="callout boundary"><b>NO FORMAL EVIDENCE WRITTEN</b><br>Course Map, ranked records and final save were not created by this result.</div>')+(recordsUnavailable?'<div class="callout boundary" role="alert">LOCAL RUN HISTORY UNAVAILABLE · evidence saved, but this run could not be ranked on this device.</div>':'')+(saveUnavailable?'<div class="callout boundary" role="alert">LOCAL SAVE UNAVAILABLE · Course Map evidence remains verified.</div>':'')+'<div class="actions">'+(ok?'<button class="btn" id="nextChapter">NEXT · N2</button>':'')+(S.stage==='evidence_retry'?'<button class="btn" id="retryEvidence">RETRY EVIDENCE</button>':'')+'<button class="btn sub" id="replay">REPLAY CHAPTER</button><button class="btn sub" id="retryCheckpoint">RETRY CHECKPOINT</button><button class="btn sub" id="evidenceMap">COURSE MAP</button></div>',source||document.activeElement||$('guideBtn'));
 if($('nextChapter'))$('nextChapter').onclick=()=>location.href='course-map.html';
 if($('retryEvidence'))$('retryEvidence').onclick=retryEvidence;
 $('replay').onclick=replayChapter;$('retryCheckpoint').onclick=()=>{closeOverlay(false);beginCheckpoint()};$('evidenceMap').onclick=()=>location.href='course-map.html';
}
function replayChapter(){
 const retained=ALREADY_PASSED;closeOverlay(false);S=defaultState();S.stage='teach_purpose';S.evidenceRecorded=retained;S.recordWritten=retained;replayRetained=retained;validatedSubmission=null;validatedRuntime=null;render();focusPrimary();
}
function advanceApply(){
 if(!S.applyPassed.A1||!S.applyPassed.A2||!S.applyPassed.A3){toast('Complete all three Apply tasks first.');return}
 beginCheckpoint();
}
function prepareDebug(stage){
 S=defaultState();S.stage=STAGES.includes(stage)?stage:'checkpoint_p1';
 const checkpointStages=['checkpoint_p1','checkpoint_p2','checkpoint_p3','checkpoint_p4','checkpoint_p5'],index=checkpointStages.indexOf(S.stage);
 for(let cursor=0;cursor<index;cursor++){const taskNow=TASKS[checkpointStages[cursor]];S.checkpointAnswers[taskNow.id]=Object.assign({id:taskNow.id},taskNow.expected)}
}
function runTests(){
 const results=[],assert=(value,id)=>{results.push({id,passed:Boolean(value)});console.assert(value,id)};
 assert(isNormalNetworkFoundationsRoute('','')&&isNormalNetworkFoundationsRoute('?from=course-map',''),'R01 normal routes');
 for(const search of ['?test','?debug','?stage=x','?from=course-map&x=1','?from=course-map&from=course-map','?unknown'])assert(!isNormalNetworkFoundationsRoute(search,''),'R02 reject '+search);
 assert(!isNormalNetworkFoundationsRoute('','#x'),'R03 reject hash');
 const exact={answerSetVersion:1,validationContract:VALIDATION_CONTRACT,tasks:EXPECTED_NETWORK_FOUNDATIONS_CHECKPOINT.map((expected,index)=>Object.assign({id:expected.id},TASKS['checkpoint_p'+(index+1)].expected))};
 assert(judgeNetworkFoundationsCheckpoint(exact).passed&&judgeNetworkFoundationsCheckpoint(exact).score===5,'J01 exact 5/5');
 const wrong=clone(exact);wrong.tasks[4].path='A_B_D_C';assert(!judgeNetworkFoundationsCheckpoint(wrong).passed,'J02 invalid path answer');
 const extra=clone(exact);extra.tasks[0].extra=true;assert(!judgeNetworkFoundationsCheckpoint(extra).passed,'J03 extra task field');
 const extraTop=clone(exact);extraTop.extra=true;assert(!judgeNetworkFoundationsCheckpoint(extraTop).passed,'J04 extra top-level field');
 const reordered=clone(exact);reordered.tasks.reverse();assert(!judgeNetworkFoundationsCheckpoint(reordered).passed,'J05 reordered parts');
 const map=fullCompressionMap(),storage=memoryStorage({[COURSE_KEY]:JSON.stringify(map)});
 const runtime={phase:'CHECKPOINT',stage:'checkpoint_p5',inputSource:'PLAYER_VERIFY',search:'',hash:'',usedSafetyNet:false,attempts:1};
 assert(commitNetworkFoundationsEvidence(exact,runtime,storage,100),'E01 transactional commit');
 const saved=JSON.parse(storage.getItem(COURSE_KEY));
 assert(networkFoundationsPassed(saved),'E02 strict local predicate');
 assert(saved.unknown.keep.value===42&&saved.nodeEvidence[NODE_ID].passedAt===100&&saved.nodeEvidence[NODE_ID].sectionProgress==='PARTIAL','E03 unknown, timestamp and partial status');
 assert(storage.stats.keys.filter(key=>key===COURSE_KEY).length===1,'E04 one successful map write');
 const replay=memoryStorage({[COURSE_KEY]:JSON.stringify(saved)});assert(commitNetworkFoundationsEvidence(exact,Object.assign({},runtime,{attempts:2}),replay,200),'E05 strict replay');const replayed=JSON.parse(replay.getItem(COURSE_KEY));
 assert(replayed.nodeEvidence[NODE_ID].passedAt===100&&replayed.nodeEvidence[NODE_ID].lastPassedAt===200,'E06 preserve first timestamp');
 const corrupt=memoryStorage({[COURSE_KEY]:JSON.stringify(map)},{corruptAfterWrite:COURSE_KEY});assert(!commitNetworkFoundationsEvidence(exact,runtime,corrupt,100),'E07 corrupt readback fails');assert(corrupt.data.get(COURSE_KEY)===JSON.stringify(map),'E08 exact rollback');
 const invalid=memoryStorage({[COURSE_KEY]:JSON.stringify(map)});assert(!commitNetworkFoundationsEvidence(exact,Object.assign({},runtime,{search:'?test'}),invalid,100)&&invalid.stats.writes===0,'E09 non-normal route no write');
 const noPredecessor=memoryStorage({[COURSE_KEY]:JSON.stringify({version:1,nodes:{},nodeEvidence:{}})});assert(!commitNetworkFoundationsEvidence(exact,runtime,noPredecessor,100)&&noPredecessor.stats.writes===0,'E10 predecessor required');
 assert(FACT_NAMES.length===8&&new Set(FACT_NAMES).size===8,'S01 eight exact facts');
 assert(['G1','G2','G3','G4'].every(id=>TASKS[Object.keys(TASKS).find(key=>TASKS[key].id===id)])&&['A1','A2','A3'].every(id=>TASKS[Object.keys(TASKS).find(key=>TASKS[key].id===id)]),'S02 guided and apply complete');
 const phasePrompts={guided:Object.values(TASKS).filter(item=>item.id.startsWith('G')).map(item=>item.prompt),apply:Object.values(TASKS).filter(item=>item.id.startsWith('A')).map(item=>item.prompt),checkpoint:Object.values(TASKS).filter(item=>item.id.startsWith('P')).map(item=>item.prompt)};
 assert(new Set([].concat(phasePrompts.guided,phasePrompts.apply,phasePrompts.checkpoint)).size===phasePrompts.guided.length+phasePrompts.apply.length+phasePrompts.checkpoint.length,'S03 independent prompts');
 window.__chapter5TestResults={passed:results.every(result=>result.passed),count:results.length,failed:results.filter(result=>!result.passed),results};
 document.documentElement.dataset.testPassed=String(window.__chapter5TestResults.passed);document.documentElement.dataset.testCount=String(results.length);
 console.info('[CHAPTER5 NETWORK FOUNDATIONS TEST]',window.__chapter5TestResults);
}
$('guideBtn').addEventListener('click',()=>showGuide('game'));$('referenceBtn').addEventListener('click',showReference);$('contextBtn').addEventListener('click',()=>showContext('game'));$('hintBtn').addEventListener('click',hint);$('mapBtn').addEventListener('click',()=>location.href='course-map.html');
$('overlay').addEventListener('click',event=>{if(event.target===$('overlay'))dismissOverlay()});
addEventListener('resize',resize);
addEventListener('keydown',event=>{
 if($('overlay').classList.contains('open')){
  if(event.key==='Escape'){event.preventDefault();event.stopImmediatePropagation();dismissOverlay();return}
  if(event.key==='Tab'){const list=focusables();if(!list.length){event.preventDefault();$('panel').focus();return}const first=list[0],last=list[list.length-1];if(document.activeElement===$('panel')){event.preventDefault();(event.shiftKey?last:first).focus()}else if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus()}else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus()}}
  return;
 }
 const key=event.key.toLowerCase();
 if(key==='h'){event.preventDefault();hint()}else if(key==='g'){event.preventDefault();showGuide('game')}else if(key==='arrowleft'||key==='a'){event.preventDefault();cycleChoice(-1)}else if(key==='arrowright'||key==='d'){event.preventDefault();cycleChoice(1)}else if(key==='arrowup'||key==='w'){const taskNow=currentTask();if(taskNow){event.preventDefault();S.activeField=Math.max(0,S.activeField-1);render()}}else if(key==='arrowdown'||key==='s'){const taskNow=currentTask();if(taskNow){event.preventDefault();S.activeField=Math.min(taskNow.fields.length-1,S.activeField+1);render()}}else if((event.key==='Enter'||key==='e')&&currentTask()){event.preventDefault();verifyTask()}
});
const query=new URLSearchParams(location.search),debugStage=query.get('stage')||query.get('scene');
if(!NORMAL_ROUTE&&debugStage)prepareDebug(debugStage);
resize();render();
if(S.stage==='course_card')showCourseCard($('openCourseCard'));else if(S.stage==='evidence'||S.stage==='evidence_retry')showEvidence(false,$('openEvidence'));
if(TEST_ROUTE)runTests();
